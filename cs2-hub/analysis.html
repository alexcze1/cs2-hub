<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="images/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Analysis — MIDROUND</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* Override body gradient — full-screen analysis needs uniform dark bg */
    body { background: #000000; }

    /* ── Page shell ──────────────────────────────────────────── */
    .analysis-shell {
      display: flex; flex-direction: column;
      height: 100vh; box-sizing: border-box;
    }
    .analysis-header {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 16px;
      padding: 12px 18px;
      background: rgba(0,0,0,0.92);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .analysis-title {
      font-size: 13px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.12em;
    }
    .team-pick-wrap { flex: 0 0 280px; }
    .team-pick-input {
      width: 100%; box-sizing: border-box;
      padding: 7px 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 6px;
      color: #fff; font-size: 13px;
    }
    .mode-pills {
      display: flex; gap: 4px; margin-left: auto;
      background: rgba(255,255,255,0.04);
      padding: 3px; border-radius: 7px;
    }
    .mode-pill {
      padding: 5px 14px; font-size: 11px;
      color: var(--muted); cursor: pointer; border: none;
      background: transparent; border-radius: 5px;
      transition: background 0.12s, color 0.12s;
    }
    .mode-pill.active { background: rgba(0,255,156,0.18); color: #fff; }

    /* ── Body: filters | canvas (| grenade panel) ────────────── */
    .analysis-body {
      flex: 1; min-height: 0;
      display: flex;
    }
    .filter-rail {
      flex: 0 0 200px;
      padding: 14px 12px; box-sizing: border-box;
      overflow-y: auto;
      background: rgba(0,0,0,0.78);
      border-right: 1px solid rgba(255,255,255,0.05);
    }
    .filter-rail .label {
      font-size: 9px; color: #555;
      text-transform: uppercase; letter-spacing: 0.1em;
      margin: 14px 0 5px;
    }
    .filter-rail .label:first-child { margin-top: 0; }
    .filter-rail select,
    .filter-rail input[type="date"] {
      width: 100%; box-sizing: border-box;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 5px;
      padding: 5px 7px; font-size: 12px;
      color: #ddd;
    }
    .seg-row { display: flex; gap: 3px; }
    .seg-btn {
      flex: 1; padding: 5px 0;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 4px;
      font-size: 10px; color: #888;
      cursor: pointer;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }
    .seg-btn.active {
      background: rgba(0,255,156,0.18);
      border-color: rgba(0,255,156,0.45);
      color: #fff;
    }
    .filter-readout {
      margin-top: 18px; padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 11px; color: #888;
    }
    .filter-readout .num { color: #fff; font-weight: 700; }
    .reset-filters-btn {
      margin-top: 10px;
      width: 100%; padding: 6px 0;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 5px;
      color: #888; font-size: 10px;
      cursor: pointer;
    }
    .reset-filters-btn:hover { color: #fff; border-color: rgba(0,255,156,0.45); }

    /* Matches multi-select */
    .match-list {
      max-height: 180px;
      overflow-y: auto;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 5px;
      background: rgba(255,255,255,0.02);
    }
    .match-row {
      display: flex; align-items: center; gap: 7px;
      padding: 5px 7px;
      font-size: 11px; color: #bbb;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .match-row:last-child { border-bottom: none; }
    .match-row:hover { background: rgba(255,255,255,0.04); color: #fff; }
    .match-row input[type="checkbox"] {
      accent-color: #00ff9c;
      cursor: pointer;
      flex: 0 0 auto;
    }
    .match-row .meta { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .match-list-actions {
      display: flex; gap: 4px; margin-top: 5px;
    }
    .match-list-actions button {
      flex: 1; padding: 3px 0;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 4px;
      color: #888; font-size: 10px;
      cursor: pointer;
    }
    .match-list-actions button:hover { color: #fff; border-color: rgba(0,255,156,0.45); }

    /* ── Canvas area ──────────────────────────────────────────── */
    .canvas-wrap {
      flex: 1; min-width: 0;
      position: relative; overflow: hidden;
      background: #000000;
    }
    #map-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      display: block;
    }
    .canvas-empty {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: #444; font-size: 14px;
      pointer-events: none;
    }
    .canvas-chips {
      position: absolute; top: 10px; left: 10px;
      display: flex; flex-direction: column; gap: 6px;
      z-index: 10; pointer-events: none;
    }
    .chip {
      padding: 4px 9px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 4px;
      font-size: 10px; color: #fff;
    }
    .chip.warn { color: #ffc56b; border-color: rgba(255,180,80,0.30); }
    .chip.error { color: #ff7676; border-color: rgba(255,100,100,0.30); }

    /* ── Bottom timeline (overlay only) ──────────────────────── */
    .analysis-bottom {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 10px;
      padding: 8px 14px;
      background: rgba(0,0,0,0.95);
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .analysis-bottom.hidden { display: none; }
    .play-btn {
      width: 30px; height: 30px;
      background: rgba(0,255,156,0.20);
      border: 1px solid rgba(0,255,156,0.50);
      border-radius: 50%;
      color: #66ffc2; font-size: 12px;
      cursor: pointer; padding: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .play-btn:hover { background: rgba(0,255,156,0.36); }
    .tl-track {
      flex: 1; position: relative; height: 26px; cursor: pointer;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 5px;
    }
    .tl-fill {
      position: absolute; left: 0; top: 0; bottom: 0;
      background: rgba(0,255,156,0.16);
      border-radius: 5px 0 0 5px;
      pointer-events: none;
    }
    .tl-thumb {
      position: absolute; top: 50%;
      transform: translate(-50%, -50%);
      width: 12px; height: 12px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 0 3px rgba(0,255,156,0.4);
      pointer-events: none;
    }
    .tl-time {
      font-family: "SF Mono", "Consolas", monospace;
      font-size: 10px; color: #555;
      flex-shrink: 0;
    }
    .speed-buttons { display: flex; gap: 3px; flex-shrink: 0; }
    .speed-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 4px;
      padding: 3px 8px; font-size: 10px;
      color: #666; cursor: pointer;
    }
    .speed-btn.active {
      background: rgba(0,255,156,0.16);
      border-color: rgba(0,255,156,0.50);
      color: #fff;
    }
    .trail-toggle {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 4px;
      padding: 4px 10px; font-size: 10px;
      color: #666; cursor: pointer;
      flex-shrink: 0;
    }
    .trail-toggle.active { color: #fff; border-color: rgba(0,255,156,0.50); }

    /* ── Grenade side panel ──────────────────────────────────── */
    .grenade-panel {
      flex: 0 0 280px;
      display: none; flex-direction: column;
      background: rgba(0,0,0,0.85);
      border-left: 1px solid rgba(255,255,255,0.06);
    }
    .grenade-panel.show { display: flex; }
    .gp-header {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .gp-count { font-size: 12px; font-weight: 700; color: #fff; }
    .gp-controls {
      display: flex; gap: 6px; margin-top: 8px; align-items: center;
    }
    .gp-controls select {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 4px;
      padding: 3px 6px;
      font-size: 11px; color: #ddd;
    }
    .gp-section { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .gp-section-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px;
      color: #888; margin-bottom: 6px;
    }
    .gp-time-readout {
      float: right; font-size: 10px; color: #fff;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .dual-range {
      position: relative; height: 22px; margin-top: 2px;
    }
    .dual-range::before {
      content: ''; position: absolute; left: 0; right: 0; top: 10px;
      height: 2px; background: rgba(255,255,255,0.10); border-radius: 1px;
    }
    .dual-range input[type=range] {
      position: absolute; top: 0; left: 0; width: 100%; height: 22px;
      background: transparent; pointer-events: none;
      -webkit-appearance: none; appearance: none; margin: 0;
    }
    .dual-range input[type=range]::-webkit-slider-thumb {
      pointer-events: auto; -webkit-appearance: none; appearance: none;
      width: 14px; height: 14px; border-radius: 50%;
      background: #00ff9c; border: 2px solid #000000;
      cursor: pointer; margin-top: 0;
    }
    .dual-range input[type=range]::-moz-range-thumb {
      pointer-events: auto;
      width: 14px; height: 14px; border-radius: 50%;
      background: #00ff9c; border: 2px solid #000000;
      cursor: pointer;
    }
    .dual-range input[type=range]::-webkit-slider-runnable-track {
      background: transparent; border: none;
    }
    .gp-play-selection {
      margin: 10px 12px;
      padding: 8px 10px;
      background: linear-gradient(135deg, #00ff9c, #006e44);
      color: #002414; font-size: 12px; font-weight: 700;
      border: none; border-radius: 4px; cursor: pointer;
      letter-spacing: 0.3px;
    }
    .gp-play-selection:hover { filter: brightness(1.1); }
    .gp-hint {
      padding: 0 12px 12px;
      font-size: 10px; color: #777; font-style: italic;
    }
    .gp-selection {
      border-top: 1px solid rgba(255,255,255,0.05);
      padding: 10px 0 12px;
      flex: 1; min-height: 0;
      display: flex; flex-direction: column;
    }
    .gp-selection .gp-section-label { padding: 0 12px 6px; }
    .gp-sel-list {
      flex: 1; overflow-y: auto;
      padding: 0 12px;
    }
    .gp-sel-row {
      display: grid; grid-template-columns: 8px 1fr auto;
      gap: 8px; align-items: center;
      padding: 6px 0;
      font-size: 11px; color: #fff;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .gp-sel-row:last-child { border-bottom: none; }
    .gp-sel-dot {
      width: 8px; height: 8px; border-radius: 50%;
    }
    .gp-sel-dot.smoke   { background: #b3b3b3; }
    .gp-sel-dot.molotov { background: #ff7a30; }
    .gp-sel-dot.flash   { background: #ffeb55; }
    .gp-sel-dot.he      { background: #6cd070; }
    .gp-sel-meta {
      display: flex; flex-direction: column; gap: 1px; min-width: 0;
    }
    .gp-sel-name { font-weight: 600; color: #fff; }
    .gp-sel-sub  { font-size: 10px; color: #888; }
    .gp-sel-time {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 10px; color: #999;
    }
    .gp-item {
      padding: 6px 8px; cursor: pointer;
      border-radius: 4px;
      font-size: 11px; color: #aaa;
      display: flex; align-items: center; gap: 8px;
    }
    .gp-item:hover { background: rgba(255,255,255,0.04); }
    .gp-item.active { background: rgba(0,255,156,0.16); color: #fff; }
    .gp-item-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .gp-item-dot.smoke   { background: #b3b3b3; }
    .gp-item-dot.molotov { background: #ff7a30; }
    .gp-item-dot.flash   { background: #ffeb55; }
    .gp-item-dot.he      { background: #6cd070; }

    /* ── Player legend panel (overlay mode) ─────────────────── */
    .player-panel {
      flex: 0 0 220px;
      display: none; flex-direction: column;
      background: rgba(0,0,0,0.85);
      border-left: 1px solid rgba(255,255,255,0.06);
    }
    .player-panel.show { display: flex; }
    .pp-header {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-size: 11px; font-weight: 700; color: #fff;
      text-transform: uppercase; letter-spacing: 0.1em;
    }
    .pp-list { flex: 1; overflow-y: auto; padding: 6px; }
    .pp-item {
      padding: 8px 10px; cursor: pointer;
      border-radius: 4px;
      font-size: 12px; color: #aaa;
      display: flex; align-items: center; gap: 10px;
    }
    .pp-item:hover { background: rgba(255,255,255,0.04); color: #ddd; }
    .pp-item.active { background: rgba(255,255,255,0.08); color: #fff; }
    .pp-swatch { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; border: 1.5px solid rgba(255,255,255,0.4); }
    .pp-clear {
      margin: 6px; padding: 6px 0;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 4px;
      font-size: 10px; color: #888;
      cursor: pointer;
    }
    .pp-clear:hover { color: #fff; border-color: rgba(0,255,156,0.45); }
    .pp-round-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin: 6px; padding: 6px 8px;
      background: rgba(0,255,156,0.10);
      border: 1px solid rgba(0,255,156,0.30);
      border-radius: 4px;
    }
    .pp-nav-btn {
      background: transparent; border: none; cursor: pointer;
      color: #fff; font-size: 12px; padding: 2px 8px;
    }
    .pp-nav-btn:hover { color: #fff; }
    .pp-round-label { font-size: 11px; color: #fff; font-weight: 600; }
  </style>
</head>
<body>
<div class="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main-content" style="padding:0;overflow:hidden;position:relative;height:100vh">
    <div class="analysis-shell" id="analysis-shell">
      <header class="analysis-header">
        <span class="analysis-title">Analysis</span>
        <div class="team-pick-wrap">
          <input id="team-pick" class="team-pick-input" type="text" placeholder="Pick a team…" autocomplete="off">
        </div>
        <div class="mode-pills">
          <button class="mode-pill active" data-mode="overlay">Overlay</button>
          <button class="mode-pill"        data-mode="grenade">Grenade</button>
        </div>
      </header>

      <div class="analysis-body">
        <aside class="filter-rail" id="filter-rail">
          <!-- Filter UI populated by analysis.js once a team is picked -->
        </aside>

        <div class="canvas-wrap" id="canvas-wrap">
          <canvas id="map-canvas"></canvas>
          <div class="canvas-empty" id="canvas-empty">Pick a team to begin.</div>
          <div class="canvas-chips" id="canvas-chips"></div>
        </div>

        <aside class="player-panel" id="player-panel">
          <div class="pp-header">Players</div>
          <div class="pp-list" id="pp-list"></div>
          <div class="pp-round-nav" id="pp-round-nav" style="display:none">
            <button class="pp-nav-btn" id="pp-round-prev">◀</button>
            <span class="pp-round-label" id="pp-round-label">Round 1 / 1</span>
            <button class="pp-nav-btn" id="pp-round-next">▶</button>
          </div>
          <button class="pp-clear" id="pp-clear" style="display:none">Clear solo</button>
          <div class="pp-header" style="border-top:1px solid rgba(255,255,255,0.06)">Utility</div>
          <div class="pp-list" id="pp-util-list"></div>
          <button class="pp-clear" id="pp-util-clear" style="display:none">Clear util filter</button>
        </aside>

        <aside class="grenade-panel" id="grenade-panel">
          <div class="gp-section">
            <div class="gp-count" id="gp-count">0 grenades</div>
          </div>
          <div class="gp-section">
            <div class="gp-section-label">Utility type</div>
            <div class="seg-row" id="gp-type-pills">
              <button class="seg-btn" data-v="smoke">Smoke</button>
              <button class="seg-btn" data-v="molotov">Molotov</button>
              <button class="seg-btn" data-v="flash">Flash</button>
              <button class="seg-btn" data-v="he">HE</button>
            </div>
          </div>
          <div class="gp-section">
            <div class="gp-section-label">
              Throw time
              <span class="gp-time-readout" id="gp-time-readout">0–30s</span>
            </div>
            <div class="dual-range">
              <input type="range" id="gp-time-min" min="0" max="120" value="0">
              <input type="range" id="gp-time-max" min="0" max="120" value="30">
            </div>
          </div>
          <div class="gp-hint">Drag a box on the map to select trajectories.</div>
          <div class="gp-selection" id="gp-selection" style="display:none">
            <div class="gp-section-label">
              Selection
              <span class="gp-time-readout" id="gp-sel-stat">0 / 0 rounds</span>
            </div>
            <div class="gp-sel-list" id="gp-sel-list"></div>
            <button class="gp-play-selection" id="gp-play-selection">Play round</button>
          </div>
        </aside>
      </div>

      <div class="analysis-bottom hidden" id="analysis-bottom">
        <button class="play-btn" id="play-btn">▶</button>
        <span class="tl-time" id="tl-current">0:00</span>
        <div class="tl-track" id="tl-track">
          <div class="tl-fill" id="tl-fill"></div>
          <div class="tl-thumb" id="tl-thumb"></div>
        </div>
        <span class="tl-time" id="tl-end">0:00</span>
        <button class="trail-toggle" id="trail-toggle">Trails</button>
        <div class="speed-buttons">
          <button class="speed-btn" data-speed="0.5">½×</button>
          <button class="speed-btn active" data-speed="1">1×</button>
          <button class="speed-btn" data-speed="2">2×</button>
          <button class="speed-btn" data-speed="4">4×</button>
        </div>
      </div>
    </div>
  </main>
</div>
<script type="module" src="analysis.js"></script>
</body>
</html>
