<!DOCTYPE html>
<html>
<body>
<script type="module">
import {
  PUB_FILTER_LS_KEY, PUB_DEFAULT_FILTER,
  loadPubFilter, savePubFilter, pubGroupMatchesFilter,
} from './demos-pub-filter.js'

function assert(cond, msg) {
  if (!cond) { console.error('FAIL:', msg); return }
  console.log('PASS:', msg)
}

const today = new Date()
const daysAgo = (n) => new Date(today.getTime() - n * 86400000).toISOString()

const demoMirage = {
  id: '1', map: 'de_mirage', played_at: daysAgo(2),
  team_a_name: 'Vitality', team_b_name: 'G2', event_name: 'IEM Katowice',
}
const demoNuke = {
  id: '2', map: 'de_nuke', played_at: daysAgo(2),
  team_a_name: 'Vitality', team_b_name: 'G2', event_name: 'IEM Katowice',
}
const oldDemo = {
  id: '3', map: 'de_mirage', played_at: daysAgo(45),
  team_a_name: 'NaVi', team_b_name: 'Heroic', event_name: 'BLAST Spring',
}

// Default filter matches every group
{
  const f = PUB_DEFAULT_FILTER
  assert(pubGroupMatchesFilter([demoMirage], f), 'default matches single-map group')
  assert(pubGroupMatchesFilter([demoMirage, demoNuke], f), 'default matches series group')
}

// loadPubFilter falls back when no LS entry
{
  localStorage.removeItem(PUB_FILTER_LS_KEY)
  const f = loadPubFilter()
  assert(f.window === 'all' && f.map === 'all' && f.event === 'all' && f.q === '',
         'loadPubFilter -> defaults when LS empty')
}

// loadPubFilter merges partial saved state
{
  localStorage.setItem(PUB_FILTER_LS_KEY, JSON.stringify({ map: 'de_nuke' }))
  const f = loadPubFilter()
  assert(f.map === 'de_nuke' && f.window === 'all',
         'loadPubFilter merges saved map onto default window')
}

// savePubFilter writes JSON
{
  savePubFilter({ window: '30d', map: 'all', event: 'all', q: '' })
  const raw = JSON.parse(localStorage.getItem(PUB_FILTER_LS_KEY))
  assert(raw.window === '30d', 'savePubFilter persists window')
}

// Window filter: 7d excludes anything older
{
  const f = { ...PUB_DEFAULT_FILTER, window: '7d' }
  assert(pubGroupMatchesFilter([demoMirage], f), '2-day-old demo in 7d window')
  assert(!pubGroupMatchesFilter([oldDemo], f), '45-day-old demo excluded from 7d window')
}

// Window filter: 30d
{
  const f = { ...PUB_DEFAULT_FILTER, window: '30d' }
  assert(pubGroupMatchesFilter([demoMirage], f), '2-day demo in 30d')
  assert(!pubGroupMatchesFilter([oldDemo], f), '45-day demo not in 30d')
}

// Window filter: 90d
{
  const f = { ...PUB_DEFAULT_FILTER, window: '90d' }
  assert(pubGroupMatchesFilter([oldDemo], f), '45-day demo in 90d')
}

// Map filter excludes non-matching map
{
  const f = { ...PUB_DEFAULT_FILTER, map: 'de_nuke' }
  assert(!pubGroupMatchesFilter([demoMirage], f), 'mirage-only group excluded by map=nuke')
  assert(pubGroupMatchesFilter([demoMirage, demoNuke], f),
         'series with nuke included by map=nuke even when other maps differ')
}

// Event filter
{
  const f = { ...PUB_DEFAULT_FILTER, event: 'IEM Katowice' }
  assert(pubGroupMatchesFilter([demoMirage], f), 'IEM Katowice group matches event filter')
  assert(!pubGroupMatchesFilter([oldDemo], f),  'BLAST Spring group excluded')
}

// Search q matches team name
{
  const f = { ...PUB_DEFAULT_FILTER, q: 'vita' }
  assert(pubGroupMatchesFilter([demoMirage], f), 'q=vita matches Vitality')
  assert(!pubGroupMatchesFilter([oldDemo], f),  'q=vita excludes NaVi/Heroic')
}

// Search q matches event name
{
  const f = { ...PUB_DEFAULT_FILTER, q: 'blast' }
  assert(pubGroupMatchesFilter([oldDemo], f), 'q=blast matches BLAST Spring')
  assert(!pubGroupMatchesFilter([demoMirage], f), 'q=blast excludes IEM Katowice')
}

// Search q is case-insensitive and trims
{
  const f = { ...PUB_DEFAULT_FILTER, q: '  G2  ' }
  assert(pubGroupMatchesFilter([demoMirage], f), 'q=" G2 " (trimmed) matches G2')
}

// Combined filters AND together
{
  const f = { window: '7d', map: 'de_mirage', event: 'IEM Katowice', q: 'vita' }
  assert(pubGroupMatchesFilter([demoMirage], f), 'all four filters satisfied')

  const f2 = { ...f, q: 'navi' }
  assert(!pubGroupMatchesFilter([demoMirage], f2), 'AND breaks when q does not match')
}

// Group falls back to created_at when played_at missing
{
  const noPlayedAt = { id: '4', map: 'de_dust', created_at: daysAgo(2),
                       team_a_name: 'X', team_b_name: 'Y', event_name: 'E' }
  const f = { ...PUB_DEFAULT_FILTER, window: '7d' }
  assert(pubGroupMatchesFilter([noPlayedAt], f), 'falls back to created_at')
}

// --- Series score-alignment logic (regression test for series-wide bug) ----
// renderPublicSeriesCard's `scoresAligned` resolves each map's (left, right)
// scores against the series header's canonical (teamA, teamB) pair. Failure
// mode it guards: legacy rows where team_a_name on one map points to a
// different team than on the next, which used to make the series header sum
// up scores belonging to different teams.
{
  // Inline the exact predicate from demos.js — copy-paste so the test stays
  // independent of the page wiring (renderPublicSeriesCard touches the DOM).
  function scoresAlignedFor(teamA, teamB, d) {
    const ta = d.team_a_score, tb = d.team_b_score
    if (ta == null || tb == null) return [null, null]
    if (d.team_a_name === teamA && d.team_b_name === teamB) return [ta, tb]
    if (d.team_a_name === teamB && d.team_b_name === teamA) return [tb, ta]
    return [ta, tb]
  }

  // BO3: legacy data where map 2's team_a_name is swapped (G2/Vitality instead of Vitality/G2).
  const m1 = { team_a_name:'Vitality', team_b_name:'G2', team_a_score:13, team_b_score:7 }   // Vitality 13-7
  const m2 = { team_a_name:'G2', team_b_name:'Vitality', team_a_score:13, team_b_score:11 }  // G2 13-11
  const m3 = { team_a_name:'Vitality', team_b_name:'G2', team_a_score:11, team_b_score:13 }  // G2 13-11

  const series = [m1, m2, m3]
  const teamA = series[0].team_a_name  // Vitality (canonical)
  const teamB = series[0].team_b_name  // G2

  // Map 1: same orientation → no swap
  let [l, r] = scoresAlignedFor(teamA, teamB, m1)
  assert(l === 13 && r === 7, 'm1 aligned: Vitality 13-7')

  // Map 2: row has names backwards → must swap scores
  ;[l, r] = scoresAlignedFor(teamA, teamB, m2)
  assert(l === 11 && r === 13, 'm2 swapped: Vitality 11-13')

  // Map 3: same orientation
  ;[l, r] = scoresAlignedFor(teamA, teamB, m3)
  assert(l === 11 && r === 13, 'm3 aligned: Vitality 11-13')

  // Series tally: Vitality won map 1 only → 1-2
  let aw = 0, bw = 0
  for (const m of series) {
    const [la, lb] = scoresAlignedFor(teamA, teamB, m)
    if (la > lb) aw++
    else if (lb > la) bw++
  }
  assert(aw === 1 && bw === 2, 'series Vitality 1-2 G2 (was previously summing wrong team\'s scores)')
}

// scoresAligned passes through nulls
{
  function scoresAlignedFor(teamA, teamB, d) {
    const ta = d.team_a_score, tb = d.team_b_score
    if (ta == null || tb == null) return [null, null]
    if (d.team_a_name === teamA && d.team_b_name === teamB) return [ta, tb]
    if (d.team_a_name === teamB && d.team_b_name === teamA) return [tb, ta]
    return [ta, tb]
  }
  const [l, r] = scoresAlignedFor('A','B', { team_a_name:'A', team_b_name:'B', team_a_score:null, team_b_score:null })
  assert(l === null && r === null, 'nulls passed through')
}

console.log('all done')
</script>
</body>
</html>
