<!DOCTYPE html>
<html>
<body>
<div id="root"></div>
<script type="module">
import { renderMatchReports } from './vods-match-reports.js'

function assert(cond, msg) {
  if (!cond) { console.error('FAIL:', msg); return }
  console.log('PASS:', msg)
}

// ---- BO1: single map ----
{
  const root = document.getElementById('root')
  root.innerHTML = ''
  const vods = [{
    id: 'v1', opponent: 'ROUNDS', result: 'win',
    match_type: 'scrim', match_date: '2026-05-13',
    maps: [{ map: 'mirage', score_us: 16, score_them: 8 }],
  }]
  renderMatchReports(root, { vods, demoToVod: new Map(), demoPlayersByDemoId: new Map(), teamStatsByDemoId: new Map(), mapFilter: null })

  const card = root.querySelector('.rr-match-card')
  assert(card !== null, 'card rendered')
  assert(card.dataset.result === 'win', 'data-result=win')
  assert(card.querySelector('.rr-match-score').textContent.trim().replace(/\s+/g, ' ') === '16 — 8', 'BO1 score')
  assert(card.querySelector('.rr-match-head').textContent.includes('ROUNDS'), 'opponent in header')
}

// ---- BO3: stacked per-map scores ----
{
  const root = document.getElementById('root')
  root.innerHTML = ''
  const vods = [{
    id: 'v2', opponent: 'SAMURAI', result: 'loss',
    match_type: 'tournament', match_date: '2026-05-11',
    maps: [
      { map: 'mirage', score_us: 16, score_them: 12 },
      { map: 'anubis', score_us: 9,  score_them: 16 },
      { map: 'nuke',   score_us: 11, score_them: 16 },
    ],
  }]
  renderMatchReports(root, { vods, demoToVod: new Map(), demoPlayersByDemoId: new Map(), teamStatsByDemoId: new Map(), mapFilter: null })
  const rows = root.querySelectorAll('.rr-match-bo-row')
  assert(rows.length === 3, 'BO3 → 3 score rows')
}

// ---- Top performer + round-diff highlights from linked demo ----
{
  const root = document.getElementById('root')
  root.innerHTML = ''
  const vods = [{
    id: 'v3', opponent: 'TEAM', result: 'win',
    match_type: 'scrim', match_date: '2026-05-10',
    maps: [{ map: 'mirage', score_us: 16, score_them: 5 }],  // +11 diff
  }]
  const demoToVod = new Map([['d1', vods[0]]])
  const demoPlayersByDemoId = new Map([['d1', [
    { steam_id: 'A', name: 'jXy',    rating: 1.22, rounds_played: 21, side: 'all' },
    { steam_id: 'B', name: 'Libra',  rating: 1.18, rounds_played: 21, side: 'all' },
    { steam_id: 'E', name: 'foo',    rating: 1.30, rounds_played: 21, side: 'ct' }, // excluded: side != 'all'
  ]]])
  renderMatchReports(root, { vods, demoToVod, demoPlayersByDemoId, teamStatsByDemoId: new Map(), mapFilter: null })

  const hl = root.querySelector('.rr-match-highlights').textContent
  assert(hl.includes('+11 round diff'), '+11 round diff highlight rendered')
  assert(hl.includes('jXy'),            'top performer (jXy) listed')
  assert(hl.includes('1.22'),           'top performer rating shown')
  assert(!hl.includes('foo'),           'side=ct row excluded from top performer')
}

// ---- Round-diff threshold (|diff| < 4 → no diff bullet) ----
{
  const root = document.getElementById('root')
  root.innerHTML = ''
  const vods = [{
    id: 'v', opponent: 'T', result: 'win',
    match_type: 'scrim', match_date: '2026-05-10',
    maps: [{ map: 'mirage', score_us: 13, score_them: 11 }],  // diff +2 → no bullet
  }]
  renderMatchReports(root, { vods, demoToVod: new Map(), demoPlayersByDemoId: new Map(), teamStatsByDemoId: new Map(), mapFilter: null })
  const hl = root.querySelector('.rr-match-highlights')
  // No demo means no top-performer; no |diff|>=4 means no diff. Whole highlights block absent.
  assert(hl === null, 'no highlights block when no eligible bullets')
}

// ---- Dominant side highlight from team-stats ----
{
  const root = document.getElementById('root')
  root.innerHTML = ''
  const vods = [{
    id: 'v', opponent: 'T', result: 'win',
    match_type: 'scrim', match_date: '2026-05-10',
    maps: [{ map: 'mirage', score_us: 13, score_them: 5 }],  // +8 diff
  }]
  const demoToVod = new Map([['d1', vods[0]]])
  // CT 10/12 = 83% (>= 65%, played >= 12)  → Strong CT side
  const teamStatsByDemoId = new Map([['d1', {
    ct_round_wins: 10, ct_rounds_played: 12,
    t_round_wins: 3,  t_rounds_played: 6,
  }]])
  renderMatchReports(root, { vods, demoToVod, demoPlayersByDemoId: new Map(), teamStatsByDemoId, mapFilter: null })
  const hl = root.querySelector('.rr-match-highlights').textContent
  assert(hl.includes('Strong CT side'), 'CT WR 83% with 12 rounds → "Strong CT side"')
  assert(hl.includes('+8 round diff'),  '+8 round diff still shown')
}

// ---- mapFilter narrows the list ----
{
  const root = document.getElementById('root')
  root.innerHTML = ''
  const vods = [
    { id: 'a', opponent: 'X', result: 'win',  match_type: 'scrim', match_date: '2026-05-10',
      maps: [{ map: 'mirage', score_us: 16, score_them: 8 }] },
    { id: 'b', opponent: 'Y', result: 'loss', match_type: 'scrim', match_date: '2026-05-09',
      maps: [{ map: 'anubis', score_us: 6, score_them: 16 }] },
    { id: 'c', opponent: 'Z', result: 'win',  match_type: 'scrim', match_date: '2026-05-08',
      maps: [
        { map: 'mirage', score_us: 16, score_them: 10 },
        { map: 'anubis', score_us: 8,  score_them: 16 },
      ] },
  ]
  renderMatchReports(root, { vods, demoToVod: new Map(), demoPlayersByDemoId: new Map(), teamStatsByDemoId: new Map(), mapFilter: 'mirage' })
  const cards = root.querySelectorAll('.rr-match-card')
  assert(cards.length === 2, 'mapFilter=mirage → 2 cards (a, c)')
}

// ---- PRACC badge ----
{
  const root = document.getElementById('root')
  root.innerHTML = ''
  const vods = [{
    id: 'p', opponent: 'X', result: 'win',
    match_type: 'scrim', match_date: '2026-05-13',
    external_uid: 'pracc-123',
    maps: [{ map: 'mirage', score_us: 13, score_them: 8 }],
  }]
  renderMatchReports(root, { vods, demoToVod: new Map(), demoPlayersByDemoId: new Map(), teamStatsByDemoId: new Map(), mapFilter: null })
  assert(root.querySelector('.rr-pracc-badge') !== null, 'PRACC badge rendered when external_uid set')
}

// ---- Empty state with mapFilter renders clear button + emits null on click ----
{
  const root = document.getElementById('root')
  root.innerHTML = ''
  renderMatchReports(root, { vods: [], demoToVod: new Map(), demoPlayersByDemoId: new Map(), teamStatsByDemoId: new Map(), mapFilter: 'mirage' })

  const clearBtn = root.querySelector('.rr-clear-map')
  assert(clearBtn !== null, 'clear button rendered in empty state when mapFilter active')

  let received = '__not_set__'
  root.addEventListener('rr:filter-map', (e) => { received = e.detail.map })
  clearBtn.click()
  assert(received === null, 'empty-state clear button emits map=null')
}

console.log('all done')
</script>
</body>
</html>
