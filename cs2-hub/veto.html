<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="apple-touch-icon" href="images/favicon.png">
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Map Veto — MIDROUND</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* ── Veto Simulator ──────────────────────────────────── */
    .vs-section { margin: 24px 0; }
    .vs-toolbar {
      display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
      padding: 12px 16px; margin-bottom: 16px;
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      border-radius: var(--r-lg); box-shadow: var(--shadow-card);
    }
    .vs-toolbar-label {
      font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
      font-weight: 700; color: var(--muted);
    }
    .vs-team-input-wrap { position: relative; flex: 1; min-width: 240px; max-width: 360px; }
    .vs-team-input {
      width: 100%;
      background: var(--surface-low); border: 1px solid var(--border);
      color: var(--text); border-radius: var(--r-md);
      padding: 8px 12px; font-size: 13px;
    }
    .vs-team-input:focus { outline: none; border-color: var(--accent); }
    .vs-status {
      font-size: 11px; color: var(--muted); letter-spacing: 0.04em;
      font-weight: 600; text-transform: uppercase;
    }

    .vs-grid {
      display: grid; gap: 16px;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr);
    }
    @media (max-width: 1000px) { .vs-grid { grid-template-columns: 1fr; } }
    .vs-card {
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      border-radius: var(--r-lg); padding: 18px; box-shadow: var(--shadow-card);
    }
    .vs-card-title {
      font-family: var(--display-font); font-size: 12px; font-weight: 700;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--text-variant); margin-bottom: 14px;
    }
    .vs-card-title-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 14px;
    }
    .vs-card-title-row .vs-card-title { margin-bottom: 0; }
    .vs-format-toggle {
      display: flex; gap: 4px; padding: 3px;
      background: var(--surface-low); border-radius: var(--r-md);
    }
    .vs-fmt-btn {
      background: transparent; border: 0; color: var(--text-variant);
      padding: 4px 12px; border-radius: var(--r-sm); cursor: pointer;
      font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
    }
    .vs-fmt-btn:hover { color: var(--text); }
    .vs-fmt-btn.is-active { background: var(--accent); color: var(--accent-on); }

    /* Empty/loading state */
    .vs-empty {
      padding: 32px; text-align: center; color: var(--muted);
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      border-radius: var(--r-lg); box-shadow: var(--shadow-card);
    }
    .vs-empty h3 { color: var(--text); font-size: 14px; margin: 0 0 6px; }
    .vs-empty p { font-size: 12px; max-width: 480px; margin: 0 auto; line-height: 1.5; }

    /* Ban-breakdown table */
    .vs-ban-table {
      width: 100%; border-collapse: collapse; font-size: 12px;
      font-variant-numeric: tabular-nums;
    }
    .vs-ban-table th {
      font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted); font-weight: 600; padding: 6px 4px; text-align: right;
      border-bottom: 1px solid var(--border);
    }
    .vs-ban-table th:first-child { text-align: left; }
    .vs-ban-table td {
      padding: 8px 4px; color: var(--text); text-align: right;
      border-bottom: 1px solid var(--hairline);
    }
    .vs-ban-table td:first-child { text-align: left; }
    .vs-map-cell { display: flex; align-items: center; gap: 8px; }
    .vs-map-badge { width: 22px; height: 22px; border-radius: 4px; overflow: hidden; flex-shrink: 0; }
    .vs-map-badge img { width: 100%; height: 100%; object-fit: cover; }
    .vs-bar { display: inline-block; vertical-align: middle; width: 80px; height: 4px;
              background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; margin-right: 6px; }
    .vs-bar > div { height: 100%; background: var(--danger); border-radius: 2px; }
    .vs-bar-label { color: var(--text-variant); font-size: 11px; }

    /* Simulated sequence */
    .vs-seq { display: flex; flex-direction: column; gap: 6px; }
    .vs-step {
      display: grid;
      grid-template-columns: 24px 120px 56px 1fr 50px;
      gap: 12px; align-items: center;
      padding: 8px 12px; border-radius: var(--r-md);
      background: rgba(255,255,255,0.015); border: 1px solid var(--hairline);
    }
    .vs-step-unknown { opacity: 0.55; }
    .vs-step-num {
      width: 24px; height: 24px; border-radius: 50%;
      background: var(--surface-low); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: var(--text-variant);
    }
    .vs-step-team { font-size: 12px; color: var(--text); font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .vs-step-action {
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
      padding: 3px 8px; border-radius: var(--r-sm); text-align: center;
    }
    .vs-act-ban { background: rgba(255,77,77,0.16); color: var(--danger); }
    .vs-act-pick { background: rgba(0,255,156,0.16); color: var(--success); }
    .vs-act-decider { background: rgba(58,160,255,0.16); color: var(--special); }
    .vs-step-map { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text); font-weight: 600; }
    .vs-step-map-badge {
      width: 32px; height: 24px; border-radius: 4px;
      background-size: cover; background-position: center;
      background-color: var(--surface);
    }
    .vs-step-conf { text-align: right; font-size: 11px; color: var(--text-variant); font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
<div class="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main-content">

    <section id="veto-hero"    class="dx-hero"><div class="dx-hero-loading">Loading…</div></section>

    <section class="vs-section">
      <div class="vs-toolbar">
        <span class="vs-toolbar-label">Simulate veto for</span>
        <div class="vs-team-input-wrap">
          <input id="vs-team-input" class="vs-team-input" placeholder="Pick a team (e.g. FaZe)" autocomplete="off"/>
        </div>
        <span class="vs-status" id="vs-status"></span>
      </div>
      <div id="vs-result"></div>
    </section>

    <section id="veto-filters" class="dx-filters"></section>

    <div class="modal-backdrop" id="modal" style="display:none">
      <div class="modal" style="max-width:560px;width:100%">
        <div class="modal-header">
          <div class="modal-title" id="modal-title">New Veto</div>
          <button class="modal-close" id="modal-close">×</button>
        </div>
        <div class="form-group">
          <label class="form-label">Title</label>
          <input class="form-input" id="f-title" placeholder="e.g. vs TEAM NAME"/>
        </div>
        <div class="form-group">
          <label class="form-label">Opponent</label>
          <div style="display:flex;align-items:center;gap:10px">
            <div id="veto-opp-logo"></div>
            <input class="form-input" id="f-opponent" placeholder="Opponent team name" style="flex:1"/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Format</label>
          <select class="form-select" id="f-format">
            <option value="bo1">BO1</option>
            <option value="bo3">BO3</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Home Team Label</label>
            <input class="form-input" id="f-home" placeholder="Us" value="Us"/>
          </div>
          <div class="form-group">
            <label class="form-label">Away Team Label</label>
            <input class="form-input" id="f-away" placeholder="Them" value="Them"/>
          </div>
        </div>
        <div id="veto-builder" style="margin-top:8px"></div>
        <div class="form-group" style="margin-top:16px">
          <label class="form-label">Notes</label>
          <textarea class="form-textarea" id="f-notes" placeholder="Reasoning, tendencies…" style="min-height:60px"></textarea>
        </div>
        <div class="error-msg" id="modal-error" style="display:none"></div>
        <div class="modal-actions">
          <button class="btn btn-danger btn-sm" id="delete-btn" style="display:none;margin-right:auto">Delete</button>
          <button class="btn btn-ghost" id="cancel-btn">Cancel</button>
          <button class="btn btn-primary" id="save-btn">Save</button>
        </div>
      </div>
    </div>

    <div id="veto-list"></div>
  </main>
</div>
<script type="module" src="veto.js"></script>
</body>
</html>
