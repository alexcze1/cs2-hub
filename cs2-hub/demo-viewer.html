<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="images/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Demo Viewer — MIDROUND</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* ── Layout shell ───────────────────────────────────────── */
    .viewer-shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
      gap: 6px;
      padding: 8px 12px;
      box-sizing: border-box;
    }

    /* ── Match header ───────────────────────────────────────── */
    .viewer-header {
      display: flex;
      align-items: center;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 0 20px;
      flex-shrink: 0;
      height: 46px;
    }
    .vh-left {
      display: flex;
      align-items: baseline;
      gap: 8px;
      min-width: 120px;
    }
    .vh-map {
      font-size: 13px;
      font-weight: 800;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .vh-mode {
      font-size: 9px;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .vh-center {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
    }
    .vh-team-block {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .vh-team-ct { flex-direction: row; }
    .vh-team-t  { flex-direction: row-reverse; }
    .vh-team-name {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.4);
    }
    .vh-score-ct {
      font-size: 26px;
      font-weight: 900;
      color: #4FC3F7;
      font-family: "SF Mono", "Consolas", monospace;
      line-height: 1;
    }
    .vh-score-t {
      font-size: 26px;
      font-weight: 900;
      color: #FF9500;
      font-family: "SF Mono", "Consolas", monospace;
      line-height: 1;
    }
    .vh-divider-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 20px;
    }
    .vh-round {
      font-size: 9px;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }
    .vh-right { min-width: 120px; }

    /* ── Mid row ────────────────────────────────────────────── */
    .viewer-mid {
      flex: 1;
      min-height: 0;
      display: flex;
      gap: 8px;
    }

    /* ── Map canvas ─────────────────────────────────────────── */
    .map-canvas-wrap {
      background: transparent;
      border-radius: 10px;
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    #map-canvas { display: block; max-width: 100%; max-height: 100%; }

    /* ── Player panels ──────────────────────────────────────── */
    .player-panel {
      width: 210px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px;
      margin-bottom: 5px;
      border-radius: 8px;
      flex-shrink: 0;
    }
    .panel-header.ct { background: rgba(79,195,247,0.08); border: 1px solid rgba(79,195,247,0.14); }
    .panel-header.t  { background: rgba(255,149,0,0.08);  border: 1px solid rgba(255,149,0,0.14); }
    .panel-team-label {
      font-size: 8px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }
    .panel-header.ct .panel-team-label { color: #4FC3F7; }
    .panel-header.t  .panel-team-label { color: #FF9500; }
    .panel-score {
      font-size: 11px;
      font-weight: 700;
      color: rgba(255,255,255,0.5);
      font-family: "SF Mono", "Consolas", monospace;
    }
    #ct-panel, #t-panel {
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow-y: auto;
      scrollbar-width: none;
    }
    #ct-panel::-webkit-scrollbar, #t-panel::-webkit-scrollbar { display: none; }

    .player-card {
      display: flex;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      overflow: hidden;
      transition: opacity 0.15s, filter 0.15s;
    }
    .player-card.dead {
      opacity: 0.18;
      filter: grayscale(0.7);
    }
    .card-num {
      width: 22px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      color: rgba(255,255,255,0.18);
      font-family: "SF Mono", "Consolas", monospace;
    }
    .card-accent-bar {
      width: 3px;
      flex-shrink: 0;
    }
    .ct-panel .card-accent-bar, #ct-panel .card-accent-bar { background: #4FC3F7; }
    .t-panel  .card-accent-bar, #t-panel  .card-accent-bar { background: #FF9500; }
    .card-body {
      flex: 1;
      min-width: 0;
      padding: 7px 9px 7px 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 4px;
    }
    .player-name {
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .hp-val {
      font-size: 10px;
      font-weight: 700;
      color: rgba(255,255,255,0.55);
      min-width: 22px;
      text-align: right;
      flex-shrink: 0;
      font-family: "SF Mono", "Consolas", monospace;
    }
    .hp-bar-wrap {
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.07);
      border-radius: 2px;
      overflow: hidden;
    }
    .hp-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.12s linear;
    }
    #ct-panel .hp-fill { background: #4FC3F7; }
    #t-panel  .hp-fill { background: #FF9500; }
    .dead-label {
      font-size: 8px;
      font-weight: 700;
      color: rgba(255,255,255,0.18);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }
    .card-bottom {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .weapon-icon {
      width: 26px;
      height: 16px;
      object-fit: contain;
      opacity: 0.6;
      flex-shrink: 0;
    }
    .weapon-name {
      font-size: 8px;
      color: rgba(255,255,255,0.35);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .player-money {
      font-size: 9px;
      color: #5DBF6E;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
      font-family: "SF Mono", "Consolas", monospace;
    }

    .util-spacer { flex: 1; }
    .util-dots   { display: flex; gap: 3px; flex-shrink: 0; }
    .util-dot {
      width: 16px; height: 16px; border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      padding: 2px; box-sizing: border-box;
    }
    .util-dot img { width: 100%; height: 100%; object-fit: contain; }
    .util-dot.smoke   { background: rgba(180,180,180,0.12); border: 1px solid rgba(180,180,180,0.2); }
    .util-dot.flash   { background: rgba(255,255,180,0.10); border: 1px solid rgba(255,255,150,0.2); }
    .util-dot.molotov { background: rgba(255,100,0,0.13);   border: 1px solid rgba(255,100,0,0.25); }
    .util-dot.he      { background: rgba(100,210,100,0.10); border: 1px solid rgba(100,210,100,0.22); }

    /* ── Kill feed ──────────────────────────────────────────── */
    .killfeed {
      position: absolute;
      top: 10px;
      right: 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      pointer-events: none;
      z-index: 10;
      min-width: 200px;
      max-width: 260px;
    }
    .kf-row {
      background: rgba(3,7,18,0.78);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.06);
      border-left: 2px solid transparent;
      border-radius: 6px;
      padding: 5px 9px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      font-size: 10px;
      transition: opacity 0.3s;
    }
    .kf-row.ct-kill { border-left-color: #4FC3F7; }
    .kf-row.t-kill  { border-left-color: #FF9500; }
    .kf-row.faded   { opacity: 0.3; }
    .kf-names { display: flex; align-items: center; gap: 4px; overflow: hidden; }
    .kf-killer, .kf-victim { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 76px; }
    .kf-killer.ct, .kf-victim.ct { color: #4FC3F7; }
    .kf-killer.t,  .kf-victim.t  { color: #FF9500; }
    .kf-arrow { color: rgba(255,255,255,0.25); flex-shrink: 0; }
    .kf-meta { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .kf-weapon-icon { width: 18px; height: 12px; object-fit: contain; opacity: 0.65; }
    .kf-hs { color: #FFD700; font-size: 8px; font-weight: 700; letter-spacing: 0.05em; }

    /* ── Loading overlay ────────────────────────────────────── */
    #viewer-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg, #030712);
      z-index: 10;
      font-size: 14px;
      color: var(--text-secondary, #A1A1AA);
    }

    /* ── Bottom controls ────────────────────────────────────── */
    .viewer-bottom {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex-shrink: 0;
    }

    /* ── Round row ──────────────────────────────────────────── */
    .round-row {
      display: flex;
      align-items: center;
      gap: 3px;
      overflow-x: auto;
      padding: 2px 0;
      scrollbar-width: none;
    }
    .round-row::-webkit-scrollbar { display: none; }
    .round-row-label {
      font-size: 9px;
      color: var(--text-secondary, #A1A1AA);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
      margin-right: 6px;
      flex-shrink: 0;
    }
    .round-halftime {
      width: 1px;
      height: 20px;
      background: rgba(255,255,255,0.15);
      flex-shrink: 0;
      margin: 0 4px;
    }
    .round-sq {
      width: 24px;
      height: 24px;
      border-radius: 5px;
      cursor: pointer;
      opacity: 0.8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      flex-shrink: 0;
      user-select: none;
      transition: opacity 0.1s, transform 0.1s;
    }
    .round-sq:hover    { opacity: 1; transform: scale(1.1); }
    .round-sq.current  { outline: 2px solid rgba(102,102,183,0.95); outline-offset: 1px; opacity: 1; }
    .round-sq.ct       { background: rgba(79,195,247,0.2); border: 1px solid rgba(79,195,247,0.35); color: #4FC3F7; }
    .round-sq.t        { background: rgba(255,149,0,0.18); border: 1px solid rgba(255,149,0,0.35); color: #FF9500; }

    /* ── Timeline ───────────────────────────────────────────── */
    .viewer-timeline {
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .play-btn {
      width: 32px;
      height: 32px;
      background: rgba(102,102,183,0.2);
      border: 1px solid rgba(102,102,183,0.5);
      border-radius: 50%;
      color: #9999dd;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
      padding: 0;
    }
    .play-btn:hover { background: rgba(102,102,183,0.36); border-color: rgba(102,102,183,0.75); }
    .timeline-track {
      flex: 1;
      position: relative;
      height: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 3px;
      cursor: pointer;
    }
    .timeline-fill {
      height: 100%;
      background: linear-gradient(90deg, #5555aa, #7777cc);
      border-radius: 3px;
      pointer-events: none;
      transition: width 0.05s linear;
    }
    .timeline-thumb {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      pointer-events: none;
      box-shadow: 0 0 8px rgba(102,102,183,0.8);
    }
    .tl-kill-mark {
      position: absolute;
      top: 0;
      width: 2px;
      height: 100%;
      border-radius: 1px;
      pointer-events: none;
      opacity: 0.45;
      transform: translateX(-50%);
    }
    .tl-kill-mark.ct { background: #4FC3F7; }
    .tl-kill-mark.t  { background: #FF9500; }
    .timeline-time {
      font-size: 10px;
      color: var(--text-secondary, #A1A1AA);
      min-width: 34px;
      font-family: "SF Mono", "Consolas", monospace;
    }
    .speed-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 5px;
      padding: 4px 8px;
      font-size: 10px;
      color: rgba(255,255,255,0.45);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .speed-btn:hover  { border-color: rgba(102,102,183,0.45); color: #9999dd; }
    .speed-btn.active { background: rgba(102,102,183,0.18); border-color: rgba(102,102,183,0.7); color: #aaaaee; }
  </style>
</head>
<body>
<div class="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main-content" style="padding:0;overflow:hidden;position:relative;height:100vh">

    <div id="viewer-loading">Loading demo…</div>

    <div class="viewer-shell" id="viewer-shell" style="display:none">

      <!-- Match header -->
      <div class="viewer-header" id="viewer-header">
        <div class="vh-left">
          <span class="vh-map" id="vh-map">—</span>
          <span class="vh-mode">Competitive</span>
        </div>
        <div class="vh-center">
          <div class="vh-team-block vh-team-ct">
            <span class="vh-team-name">Counter-Terrorists</span>
            <span class="vh-score-ct" id="vh-ct-score">0</span>
          </div>
          <div class="vh-divider-block">
            <span class="vh-round" id="vh-round">Round 1 / 24</span>
          </div>
          <div class="vh-team-block vh-team-t">
            <span class="vh-score-t" id="vh-t-score">0</span>
            <span class="vh-team-name">Terrorists</span>
          </div>
        </div>
        <div class="vh-right"></div>
      </div>

      <div class="viewer-mid">
        <div class="player-panel ct-panel">
          <div class="panel-header ct">
            <span class="panel-team-label">Counter-Terrorists</span>
            <span class="panel-score" id="panel-ct-score">0 – 0</span>
          </div>
          <div id="ct-panel"></div>
        </div>

        <div class="map-canvas-wrap" id="map-canvas-wrap">
          <canvas id="map-canvas"></canvas>
          <div class="killfeed" id="killfeed"></div>
        </div>

        <div class="player-panel t-panel">
          <div class="panel-header t">
            <span class="panel-team-label">Terrorists</span>
            <span class="panel-score" id="panel-t-score">0 – 0</span>
          </div>
          <div id="t-panel"></div>
        </div>
      </div>

      <div class="viewer-bottom">
        <div class="round-row" id="round-row">
          <span class="round-row-label">Rounds</span>
        </div>
        <div class="viewer-timeline">
          <button class="play-btn" id="play-btn">▶</button>
          <span class="timeline-time" id="timeline-current">0:00</span>
          <div class="timeline-track" id="timeline-track">
            <div class="timeline-fill"  id="timeline-fill"  style="width:0%"></div>
            <div class="timeline-thumb" id="timeline-thumb" style="left:0%"></div>
          </div>
          <span class="timeline-time" id="timeline-end">0:00</span>
          <button class="speed-btn" data-speed="0.5">½×</button>
          <button class="speed-btn" data-speed="0.75">¾×</button>
          <button class="speed-btn active" data-speed="1">1×</button>
          <button class="speed-btn" data-speed="2">2×</button>
          <button class="speed-btn" data-speed="4">4×</button>
        </div>
      </div>

    </div>
  </main>
</div>
<script type="module" src="demo-viewer.js"></script>
</body>
</html>
