<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="images/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Demo Viewer — MIDROUND</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* ── CMS design tokens ──────────────────────────────────── */
    :root {
      --cms-red:    #FF0B0B;
      --cms-gold:   #FFB915;
      --cms-ct:     #4FC3F7;
      --cms-t:      #FF9500;
      --cms-glass:  rgba(3,7,18,0.72);
      --cms-border: rgba(255,255,255,0.1);
      --cms-blur:   blur(12px);
    }

    /* ── Layout shell ───────────────────────────────────────── */
    .viewer-shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
      gap: 4px;
      padding: 8px;
      box-sizing: border-box;
    }

    /* ── Gradient border shell utility ─────────────────────── */
    .gbs {
      padding: 1px;
      background: linear-gradient(160deg, rgba(255,255,255,0.18), rgba(255,255,255,0.03));
      border-radius: 3px;
    }
    .gbs-inner {
      background: var(--cms-glass);
      backdrop-filter: var(--cms-blur);
      -webkit-backdrop-filter: var(--cms-blur);
      border-radius: 2px;
    }

    /* ── Match header ───────────────────────────────────────── */
    .viewer-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 32px;
      background: var(--cms-glass);
      backdrop-filter: var(--cms-blur);
      -webkit-backdrop-filter: var(--cms-blur);
      border: 1px solid var(--cms-border);
      border-radius: 2px;
      padding: 8px 20px;
      flex-shrink: 0;
      box-shadow: rgba(255,11,11,0.08) 0px 0px 20px 0px;
    }
    .vh-map {
      font-size: 9px;
      font-weight: 700;
      color: var(--cms-red);
      text-transform: uppercase;
      letter-spacing: 0.2em;
      min-width: 80px;
    }
    .vh-score {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 22px;
      font-weight: 300;
      font-family: "SF Mono", "Consolas", monospace;
      letter-spacing: -0.04em;
    }
    .vh-score-ct  { color: var(--cms-ct); }
    .vh-score-sep { color: rgba(255,255,255,0.15); font-size: 14px; font-weight: 300; }
    .vh-score-t   { color: var(--cms-t); }
    .vh-round {
      font-size: 9px;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      min-width: 80px;
      text-align: right;
    }

    /* ── Mid row ────────────────────────────────────────────── */
    .viewer-mid {
      flex: 1;
      min-height: 0;
      display: flex;
      gap: 4px;
    }

    /* ── Map canvas ─────────────────────────────────────────── */
    .map-canvas-wrap {
      background: transparent;
      border-radius: 2px;
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      border: 1px solid var(--cms-border);
    }
    #map-canvas { display: block; max-width: 100%; max-height: 100%; }

    /* ── Player panels ──────────────────────────────────────── */
    .player-panel {
      width: 168px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 3px;
      overflow-y: auto;
      padding: 0;
      scrollbar-width: none;
    }
    .player-panel::-webkit-scrollbar { display: none; }

    /* Gradient border shell on each card */
    .card-shell {
      padding: 1px;
      background: linear-gradient(160deg, rgba(255,255,255,0.14), rgba(255,255,255,0.02));
      border-radius: 3px;
      transition: opacity 0.15s, filter 0.15s;
    }
    .card-shell.dead { opacity: 0.18; filter: grayscale(0.7); }

    .player-card {
      display: flex;
      background: var(--cms-glass);
      backdrop-filter: var(--cms-blur);
      -webkit-backdrop-filter: var(--cms-blur);
      border-radius: 2px;
      overflow: hidden;
    }
    .card-accent-bar {
      width: 2px;
      flex-shrink: 0;
    }
    .ct-panel .card-accent-bar { background: var(--cms-ct); }
    .t-panel  .card-accent-bar { background: var(--cms-t); }
    .card-body {
      flex: 1;
      min-width: 0;
      padding: 6px 8px 6px 7px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 4px;
    }
    .player-name {
      font-size: 11px;
      font-weight: 400;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .player-money {
      font-size: 9px;
      color: #5DBF6E;
      font-weight: 400;
      white-space: nowrap;
      flex-shrink: 0;
      letter-spacing: 0.06em;
    }
    .hp-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .hp-bar-wrap {
      flex: 1;
      height: 2px;
      background: rgba(255,255,255,0.08);
      border-radius: 1px;
      overflow: hidden;
    }
    .hp-fill {
      height: 100%;
      border-radius: 1px;
      transition: width 0.12s linear;
    }
    .ct-panel .hp-fill { background: var(--cms-ct); }
    .t-panel  .hp-fill { background: var(--cms-t); }
    .hp-val {
      font-size: 9px;
      font-weight: 400;
      color: rgba(255,255,255,0.45);
      min-width: 20px;
      text-align: right;
      font-family: "SF Mono", "Consolas", monospace;
      letter-spacing: 0.04em;
    }
    .dead-label {
      font-size: 8px;
      font-weight: 400;
      color: rgba(255,255,255,0.2);
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }
    .card-bottom {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .weapon-icon {
      width: 22px;
      height: 14px;
      object-fit: contain;
      opacity: 0.55;
      flex-shrink: 0;
    }
    .weapon-name {
      font-size: 8px;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .util-spacer { flex: 1; }
    .util-dots   { display: flex; gap: 2px; flex-shrink: 0; }
    .util-dot {
      width: 15px; height: 15px; border-radius: 2px;
      display: flex; align-items: center; justify-content: center;
      padding: 2px; box-sizing: border-box;
    }
    .util-dot img { width: 100%; height: 100%; object-fit: contain; }
    .util-dot.smoke   { background: rgba(180,180,180,0.1); border: 1px solid rgba(180,180,180,0.18); }
    .util-dot.flash   { background: rgba(255,255,180,0.08); border: 1px solid rgba(255,255,150,0.18); }
    .util-dot.molotov { background: rgba(255,100,0,0.1);   border: 1px solid rgba(255,100,0,0.22); }
    .util-dot.he      { background: rgba(100,210,100,0.08); border: 1px solid rgba(100,210,100,0.2); }

    /* ── Kill feed ──────────────────────────────────────────── */
    .killfeed {
      position: absolute;
      top: 8px;
      right: 8px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      pointer-events: none;
      z-index: 10;
      min-width: 190px;
      max-width: 240px;
    }
    .kf-row {
      background: rgba(3,7,18,0.82);
      backdrop-filter: var(--cms-blur);
      -webkit-backdrop-filter: var(--cms-blur);
      border: 1px solid rgba(255,255,255,0.08);
      border-left: 2px solid transparent;
      border-radius: 2px;
      padding: 4px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      transition: opacity 0.15s ease;
    }
    .kf-row.ct-kill { border-left-color: var(--cms-ct); }
    .kf-row.t-kill  { border-left-color: var(--cms-t); }
    .kf-row.faded   { opacity: 0.25; }
    .kf-names { display: flex; align-items: center; gap: 4px; overflow: hidden; }
    .kf-killer, .kf-victim { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 70px; }
    .kf-killer.ct, .kf-victim.ct { color: var(--cms-ct); }
    .kf-killer.t,  .kf-victim.t  { color: var(--cms-t); }
    .kf-arrow { color: rgba(255,255,255,0.2); flex-shrink: 0; }
    .kf-meta { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .kf-weapon-icon { width: 16px; height: 10px; object-fit: contain; opacity: 0.55; }
    .kf-hs { color: var(--cms-gold); font-size: 7px; font-weight: 700; letter-spacing: 0.1em; }

    /* ── Loading overlay ────────────────────────────────────── */
    #viewer-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg, #030712);
      z-index: 10;
      font-size: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }

    /* ── Bottom controls ────────────────────────────────────── */
    .viewer-bottom {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex-shrink: 0;
    }

    /* ── Round row ──────────────────────────────────────────── */
    .round-row {
      display: flex;
      align-items: center;
      gap: 2px;
      overflow-x: auto;
      padding: 1px 0;
      scrollbar-width: none;
    }
    .round-row::-webkit-scrollbar { display: none; }
    .round-row-label {
      font-size: 8px;
      color: rgba(255,255,255,0.25);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      white-space: nowrap;
      margin-right: 6px;
      flex-shrink: 0;
    }
    .round-halftime {
      width: 1px;
      height: 16px;
      background: rgba(255,255,255,0.12);
      flex-shrink: 0;
      margin: 0 3px;
    }
    .round-sq {
      width: 22px;
      height: 22px;
      border-radius: 2px;
      cursor: pointer;
      opacity: 0.7;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      font-weight: 600;
      flex-shrink: 0;
      user-select: none;
      transition: opacity 0.15s ease;
    }
    .round-sq:hover   { opacity: 1; }
    .round-sq.current { outline: 1px solid var(--cms-red); outline-offset: 1px; opacity: 1; box-shadow: 0 0 8px rgba(255,11,11,0.35); }
    .round-sq.ct  { background: rgba(79,195,247,0.12); border: 1px solid rgba(79,195,247,0.25); color: var(--cms-ct); }
    .round-sq.t   { background: rgba(255,149,0,0.12);  border: 1px solid rgba(255,149,0,0.25);  color: var(--cms-t); }

    /* ── Timeline ───────────────────────────────────────────── */
    .viewer-timeline {
      background: var(--cms-glass);
      backdrop-filter: var(--cms-blur);
      -webkit-backdrop-filter: var(--cms-blur);
      border: 1px solid var(--cms-border);
      border-radius: 2px;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .play-btn {
      width: 28px;
      height: 28px;
      background: rgba(255,11,11,0.12);
      border: 1px solid rgba(255,11,11,0.35);
      border-radius: 2px;
      color: var(--cms-red);
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s ease, box-shadow 0.15s ease;
      padding: 0;
    }
    .play-btn:hover {
      background: rgba(255,11,11,0.22);
      box-shadow: 0 0 10px rgba(255,11,11,0.4);
    }
    .timeline-track {
      flex: 1;
      position: relative;
      height: 4px;
      background: rgba(255,255,255,0.07);
      border-radius: 1px;
      cursor: pointer;
    }
    .timeline-fill {
      height: 100%;
      background: var(--cms-red);
      border-radius: 1px;
      pointer-events: none;
      transition: width 0.05s linear;
    }
    .timeline-thumb {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 10px;
      height: 10px;
      background: #fff;
      border-radius: 1px;
      pointer-events: none;
      box-shadow: 0 0 8px rgba(255,11,11,0.7);
    }
    .tl-kill-mark {
      position: absolute;
      top: 0;
      width: 1px;
      height: 100%;
      pointer-events: none;
      opacity: 0.5;
      transform: translateX(-50%);
    }
    .tl-kill-mark.ct { background: var(--cms-ct); }
    .tl-kill-mark.t  { background: var(--cms-t); }
    .timeline-time {
      font-size: 9px;
      color: rgba(255,255,255,0.35);
      min-width: 32px;
      font-family: "SF Mono", "Consolas", monospace;
      letter-spacing: 0.06em;
    }
    .speed-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 2px;
      padding: 3px 7px;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.3);
      cursor: pointer;
      transition: border-color 0.15s ease, color 0.15s ease;
    }
    .speed-btn:hover  { border-color: rgba(255,11,11,0.4); color: var(--cms-red); }
    .speed-btn.active { border-color: rgba(255,11,11,0.6); color: var(--cms-red); box-shadow: 0 0 6px rgba(255,11,11,0.25); }
  </style>
</head>
<body>
<div class="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main-content" style="padding:0;overflow:hidden;position:relative;height:100vh">

    <div id="viewer-loading">Loading demo…</div>

    <div class="viewer-shell" id="viewer-shell" style="display:none">

      <!-- Match header -->
      <div class="viewer-header" id="viewer-header">
        <span class="vh-map" id="vh-map">—</span>
        <div class="vh-score">
          <span class="vh-score-ct" id="vh-ct-score">0</span>
          <span class="vh-score-sep">—</span>
          <span class="vh-score-t" id="vh-t-score">0</span>
        </div>
        <span class="vh-round" id="vh-round">Round 1</span>
      </div>

      <div class="viewer-mid">
        <div class="player-panel ct-panel" id="ct-panel"></div>

        <div class="map-canvas-wrap" id="map-canvas-wrap">
          <canvas id="map-canvas"></canvas>
          <div class="killfeed" id="killfeed"></div>
        </div>

        <div class="player-panel t-panel" id="t-panel"></div>
      </div>

      <div class="viewer-bottom">
        <div class="round-row" id="round-row">
          <span class="round-row-label">Rounds</span>
        </div>
        <div class="viewer-timeline">
          <button class="play-btn" id="play-btn">▶</button>
          <span class="timeline-time" id="timeline-current">0:00</span>
          <div class="timeline-track" id="timeline-track">
            <div class="timeline-fill"  id="timeline-fill"  style="width:0%"></div>
            <div class="timeline-thumb" id="timeline-thumb" style="left:0%"></div>
          </div>
          <span class="timeline-time" id="timeline-end">0:00</span>
          <button class="speed-btn" data-speed="0.5">½×</button>
          <button class="speed-btn" data-speed="0.75">¾×</button>
          <button class="speed-btn active" data-speed="1">1×</button>
          <button class="speed-btn" data-speed="2">2×</button>
          <button class="speed-btn" data-speed="4">4×</button>
        </div>
      </div>

    </div>
  </main>
</div>
<script type="module" src="demo-viewer.js"></script>
</body>
</html>
