<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="images/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Demo Viewer — MIDROUND</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* Override body gradient — full-screen viewer needs uniform dark bg */
    body { background: #000000; }

    /* ── Layout shell ───────────────────────────────────────── */
    .viewer-shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
      gap: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* ── Match header ── glass card, matches .stat-card / .hero-card chrome */
    .viewer-header {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: var(--r-md);
      padding: 8px 22px;
      white-space: nowrap;
      box-shadow:
        inset 1px 1px 0 rgba(255,255,255,0.04),
        0 8px 32px rgba(0,0,0,0.45);
    }
    .vh-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .vh-score {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 700;
      font-family: var(--display-font);
      letter-spacing: -0.01em;
      font-variant-numeric: tabular-nums;
    }
    .vh-score-ct  { color: var(--side-ct); }
    .vh-score-sep { color: var(--muted); font-size: 14px; font-weight: 300; opacity: 0.5; }
    .vh-score-t   { color: var(--side-t); }
    .vh-sub-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .vh-map {
      font-family: var(--display-font);
      font-size: 10px;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.18em;
    }
    .vh-sub-dot {
      font-size: 9px;
      color: var(--muted);
      opacity: 0.5;
    }
    .vh-round {
      font-family: var(--display-font);
      font-size: 10px;
      font-weight: 700;
      color: var(--text-variant);
      text-transform: uppercase;
      letter-spacing: 0.18em;
    }
    .vh-timer {
      font-size: 11px;
      font-weight: 700;
      font-family: var(--display-font);
      color: var(--text-variant);
      letter-spacing: 0.06em;
      font-variant-numeric: tabular-nums;
      transition: color 0.2s;
    }
    .vh-timer.bomb     { color: var(--warning); }
    .vh-timer.bomb-low { color: var(--danger); }

    /* ── Team name sections ─────────────────────────────────── */
    .vh-team {
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: 110px;
    }
    .vh-team-ct { justify-content: flex-end; }
    .vh-team-t  { justify-content: flex-start; }
    .vh-team-logo {
      width: 26px;
      height: 26px;
      object-fit: contain;
      border-radius: var(--r-sm);
      background: rgba(255,255,255,0.06);
      padding: 2px;
      flex-shrink: 0;
    }
    .vh-team-name {
      font-family: var(--display-font);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 90px;
    }
    .vh-team-ct .vh-team-name { color: var(--side-ct); text-align: right; }
    .vh-team-t  .vh-team-name { color: var(--side-t);  text-align: left;  }

    /* ── Map series switcher ────────────────────────────────── */
    /* ── Map series switcher (inline in bottom bar) ─────────── */
    .map-switcher {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
      padding-right: 10px;
      border-right: 1px solid var(--border-solid);
      margin-right: 6px;
    }
    .map-sw-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      background: transparent;
      border: 1px solid var(--border-solid);
      border-radius: var(--r-sm);
      cursor: pointer;
      transition: background-color 0.15s, border-color 0.15s, color 0.15s, transform 0.15s;
      text-decoration: none;
      white-space: nowrap;
      height: 26px;
    }
    .map-sw-pill:hover {
      background: rgba(0,255,156,0.06);
      border-color: var(--accent);
      transform: translateY(-1px);
    }
    .map-sw-pill.active {
      background: rgba(0,255,156,0.12);
      border-color: var(--accent);
      box-shadow: inset 0 -2px 0 var(--accent);
    }
    .map-sw-num {
      font-family: var(--display-font);
      font-size: 8px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.65;
    }
    .map-sw-name {
      font-family: var(--display-font);
      font-size: 10px;
      font-weight: 700;
      color: var(--text-variant);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }
    .map-sw-pill.active .map-sw-name { color: var(--text); }
    .map-sw-score {
      font-family: var(--display-font);
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      padding-left: 4px;
    }
    .map-sw-pill.active .map-sw-score { color: var(--accent); }

    /* ── Map canvas ─────────────────────────────────────────── */
    .map-canvas-wrap {
      flex: 1;
      min-height: 0;
      position: relative;
      overflow: hidden;
      background: #000000;
    }
    #map-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ── Player panels ──────────────────────────────────────── */
    .player-panel {
      position: absolute;
      top: 56px;
      bottom: 0;
      width: 220px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 0 8px 8px;
      overflow-y: auto;
      scrollbar-width: none;
      z-index: 10;
    }
    .player-panel::-webkit-scrollbar { display: none; }
    .ct-panel { left: 0; }
    .t-panel  { right: 0; }

    .player-card {
      display: flex;
      border-radius: var(--r-md);
      overflow: hidden;
      cursor: pointer;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      box-shadow:
        inset 1px 1px 0 rgba(255,255,255,0.04),
        0 6px 18px rgba(0,0,0,0.35);
      transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s, opacity 0.15s, filter 0.15s;
    }
    .ct-panel .player-card:hover {
      border-color: rgba(79,195,247,0.55);
      transform: translateY(-1px);
      box-shadow:
        inset 1px 1px 0 rgba(255,255,255,0.05),
        0 6px 18px rgba(0,0,0,0.4),
        0 0 18px rgba(79,195,247,0.10);
    }
    .t-panel .player-card:hover {
      border-color: rgba(255,149,0,0.55);
      transform: translateY(-1px);
      box-shadow:
        inset 1px 1px 0 rgba(255,255,255,0.05),
        0 6px 18px rgba(0,0,0,0.4),
        0 0 18px rgba(255,149,0,0.10);
    }
    .player-card.dead {
      opacity: 0.22;
      filter: grayscale(0.7);
    }
    .player-card.dead:hover { transform: none; }
    .card-accent-bar {
      width: 3px;
      flex-shrink: 0;
    }
    .ct-panel .card-accent-bar { background: var(--side-ct); box-shadow: 0 0 8px rgba(79,195,247,0.5); }
    .t-panel  .card-accent-bar { background: var(--side-t);  box-shadow: 0 0 8px rgba(255,149,0,0.5); }
    .card-body {
      flex: 1;
      min-width: 0;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 4px;
    }
    .player-name {
      font-family: var(--display-font);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .player-money {
      font-family: var(--display-font);
      font-size: 10px;
      color: var(--accent);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .hp-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .hp-bar-wrap {
      flex: 1;
      height: 4px;
      background: var(--surface-void);
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .hp-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.12s linear;
    }
    .ct-panel .hp-fill { background: var(--side-ct); box-shadow: 0 0 6px rgba(79,195,247,0.4); }
    .t-panel  .hp-fill { background: var(--side-t);  box-shadow: 0 0 6px rgba(255,149,0,0.4);  }
    .hp-val {
      font-family: var(--display-font);
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      min-width: 22px;
      text-align: right;
    }
    .dead-label {
      font-family: var(--display-font);
      font-size: 8px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      opacity: 0.6;
    }
    .card-bottom {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .weapon-icon {
      width: 24px;
      height: 15px;
      object-fit: contain;
      opacity: 0.65;
      flex-shrink: 0;
    }
    .weapon-name {
      font-family: var(--display-font);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .util-row {
      display: flex;
      gap: 3px;
      margin-top: 1px;
    }
    .util-pill {
      flex: 1;
      height: 20px;
      border-radius: var(--r-sm);
      background: var(--surface-void);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.1s, border-color 0.15s, background-color 0.15s;
      overflow: hidden;
    }
    .util-pill img { width: 16px; height: 14px; object-fit: contain; opacity: 0.85; }
    .util-pill.empty { opacity: 0.22; }
    .util-pill.smoke   { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.10); }
    .util-pill.flash   { background: rgba(255,235,100,0.08); border-color: rgba(255,235,100,0.18); }
    .util-pill.molotov { background: rgba(255,77,77,0.08);   border-color: rgba(255,77,77,0.20);   }
    .util-pill.he      { background: rgba(0,255,156,0.06);   border-color: rgba(0,255,156,0.18);   }

    /* ── Kill feed ──────────────────────────────────────────── */
    .killfeed {
      position: absolute;
      top: 56px;
      right: 228px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      pointer-events: none;
      z-index: 10;
      width: 220px;
    }
    .kf-row {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-left: 2px solid transparent;
      border-radius: var(--r-md);
      padding: 5px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      font-size: 10px;
      box-shadow:
        inset 1px 1px 0 rgba(255,255,255,0.04),
        0 4px 14px rgba(0,0,0,0.35);
      transition: opacity 0.3s;
    }
    .kf-row.ct-kill { border-left-color: var(--side-ct); }
    .kf-row.t-kill  { border-left-color: var(--side-t);  }
    .kf-row.faded   { opacity: 0.3; }
    .kf-names { display: flex; align-items: center; gap: 4px; overflow: hidden; }
    .kf-killer, .kf-victim {
      font-family: var(--display-font);
      font-weight: 700;
      letter-spacing: 0.02em;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 76px;
    }
    .kf-killer.ct, .kf-victim.ct { color: var(--side-ct); }
    .kf-killer.t,  .kf-victim.t  { color: var(--side-t); }
    .kf-arrow { color: var(--muted); opacity: 0.5; flex-shrink: 0; }
    .kf-meta { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .kf-weapon-icon { width: 18px; height: 12px; object-fit: contain; opacity: 0.65; }
    .kf-hs {
      font-family: var(--display-font);
      color: var(--warning);
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    /* ── Loading overlay ── matches site empty-state styling */
    #viewer-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      z-index: 10;
      font-family: var(--display-font);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
    }

    /* ── Bottom controls ── glass shelf */
    .viewer-bottom {
      flex-shrink: 0;
      background: rgba(11,15,20,0.78);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--glass-border);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.03),
        0 -8px 24px rgba(0,0,0,0.35);
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ── Round row ──────────────────────────────────────────── */
    .rounds-area {
      display: flex;
      align-items: center;
      gap: 0;
      overflow: hidden;
    }
    .round-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      overflow-x: auto;
      padding: 2px 0;
      scrollbar-width: none;
    }
    .round-row::-webkit-scrollbar { display: none; }
    .round-row-label {
      font-family: var(--display-font);
      font-size: 10px;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      white-space: nowrap;
      margin-right: 10px;
      flex-shrink: 0;
    }
    .round-halftime {
      width: 1px;
      height: 20px;
      background: var(--border-solid);
      flex-shrink: 0;
      margin: 0 4px;
    }
    .round-sq {
      width: 26px;
      height: 26px;
      border-radius: var(--r-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--display-font);
      font-size: 10px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
      user-select: none;
      transition: transform 0.15s, border-color 0.15s, background-color 0.15s;
    }
    .round-sq:hover   { transform: translateY(-1px); }
    .round-sq.current {
      box-shadow: 0 0 0 1px var(--accent), 0 0 12px rgba(0,255,156,0.3);
    }
    .round-sq.ct { background: rgba(79,195,247,0.10); border: 1px solid rgba(79,195,247,0.28); color: var(--side-ct); }
    .round-sq.t  { background: rgba(255,149,0,0.10);  border: 1px solid rgba(255,149,0,0.28);  color: var(--side-t);  }
    .round-sq.ct:hover { background: rgba(79,195,247,0.18); border-color: var(--side-ct); }
    .round-sq.t:hover  { background: rgba(255,149,0,0.18);  border-color: var(--side-t);  }

    /* ── Timeline ───────────────────────────────────────────── */
    .viewer-timeline {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .play-btn {
      width: 34px;
      height: 34px;
      background: var(--accent);
      color: var(--accent-on);
      border: none;
      border-radius: var(--r-sm);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background-color 0.15s, box-shadow 0.15s, transform 0.15s;
      padding: 0;
    }
    .play-btn:hover {
      background: var(--accent-light);
      box-shadow: var(--accent-glow);
      transform: translateY(-1px);
    }
    .tl-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }
    .tl-swimlane {
      position: relative;
      height: 34px;
      cursor: pointer;
    }
    .tl-lane-bg {
      position: absolute;
      inset: 0;
      background: var(--surface-void);
      border-radius: var(--r-sm);
      border: 1px solid var(--border-solid);
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.3);
    }
    .tl-lane-fill {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      background: linear-gradient(90deg, rgba(0,255,156,0.28), rgba(0,255,156,0.10));
      border-radius: var(--r-sm) 0 0 var(--r-sm);
      pointer-events: none;
    }
    .tl-scrub {
      position: absolute;
      top: 0; bottom: 0;
      width: 2px;
      background: rgba(255,255,255,0.85);
      border-radius: 1px;
      box-shadow: 0 0 6px rgba(0,255,156,0.6);
      pointer-events: none;
    }
    .tl-thumb {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 12px;
      height: 12px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 0 2px var(--bg), var(--accent-glow);
      pointer-events: none;
    }
    .tl-time-row {
      display: flex;
      justify-content: space-between;
    }
    .timeline-time {
      font-size: 9px;
      color: var(--muted);
      font-family: var(--display-font);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.06em;
    }
    .tl-kill-mark {
      position: absolute;
      width: 2px;
      border-radius: 1px;
      pointer-events: none;
      transform: translateX(-50%);
    }
    .tl-kill-mark.ct {
      top: 2px;
      height: calc(50% - 2px);
      background: rgba(79,195,247,0.65);
    }
    .tl-kill-mark.t {
      bottom: 2px;
      height: calc(50% - 2px);
      background: rgba(255,149,0,0.65);
    }
    .tl-kill-mark.bomb {
      top: 2px;
      height: calc(100% - 4px);
      width: 3px;
      background: var(--danger);
      opacity: 0.85;
    }
    .tl-speeds {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }
    .speed-btn {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border-solid);
      border-radius: var(--r-sm);
      padding: 5px 10px;
      font-family: var(--display-font);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background-color 0.15s, border-color 0.15s, color 0.15s;
    }
    .speed-btn:hover {
      background: rgba(0,255,156,0.06);
      border-color: var(--accent);
      color: var(--accent-light);
    }
    .speed-btn.active {
      background: rgba(0,255,156,0.12);
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: inset 0 -2px 0 var(--accent);
    }
  </style>
</head>
<body>
<div class="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main-content" style="padding:0;overflow:hidden;position:relative;height:100vh">

    <div id="viewer-loading">Loading demo…</div>

    <div class="viewer-shell" id="viewer-shell" style="display:none">

      <!-- Canvas area — full bleed, panels float on top -->
      <div class="map-canvas-wrap" id="map-canvas-wrap">
        <canvas id="map-canvas"></canvas>

        <!-- Match header pill -->
        <div class="viewer-header" id="viewer-header">
          <div class="vh-team vh-team-ct" id="vh-team-ct">
            <img class="vh-team-logo" id="vh-ct-logo" src="" alt="" style="display:none">
            <span class="vh-team-name" id="vh-ct-name">CT</span>
          </div>
          <div class="vh-center">
            <div class="vh-score">
              <span class="vh-score-ct" id="vh-ct-score">0</span>
              <span class="vh-score-sep">—</span>
              <span class="vh-score-t" id="vh-t-score">0</span>
            </div>
            <div class="vh-sub-row">
              <span class="vh-map" id="vh-map">—</span>
              <span class="vh-sub-dot">·</span>
              <span class="vh-timer" id="vh-timer">1:55</span>
              <span class="vh-sub-dot">·</span>
              <span class="vh-round" id="vh-round">R1</span>
            </div>
          </div>
          <div class="vh-team vh-team-t" id="vh-team-t">
            <span class="vh-team-name" id="vh-t-name">T</span>
            <img class="vh-team-logo" id="vh-t-logo" src="" alt="" style="display:none">
          </div>
        </div>


        <!-- Player panels (glass overlays) -->
        <div class="player-panel ct-panel" id="ct-panel"></div>
        <div class="player-panel t-panel"  id="t-panel"></div>

        <!-- Kill feed -->
        <div class="killfeed" id="killfeed"></div>
      </div>

      <!-- Bottom bar — solid strip -->
      <div class="viewer-bottom">
        <div class="rounds-area">
          <div class="map-switcher" id="map-switcher" style="display:none"></div>
          <div class="round-row" id="round-row">
            <span class="round-row-label">Rounds</span>
          </div>
        </div>
        <div class="viewer-timeline">
          <button class="play-btn" id="play-btn">▶</button>
          <div class="tl-main">
            <div class="tl-swimlane" id="timeline-track">
              <div class="tl-lane-bg"></div>
              <div class="tl-lane-fill" id="timeline-fill"></div>
              <div class="tl-scrub"    id="timeline-scrub"></div>
              <div class="tl-thumb"    id="timeline-thumb"></div>
            </div>
            <div class="tl-time-row">
              <span class="timeline-time" id="timeline-current">0:00</span>
              <span class="timeline-time" id="timeline-end">0:00</span>
            </div>
          </div>
          <div class="tl-speeds">
            <button class="speed-btn" data-speed="0.5">½×</button>
            <button class="speed-btn active" data-speed="1">1×</button>
            <button class="speed-btn" data-speed="2">2×</button>
            <button class="speed-btn" data-speed="4">4×</button>
          </div>
        </div>
      </div>

    </div>
  </main>
</div>
<script type="module" src="demo-viewer.js"></script>
</body>
</html>
