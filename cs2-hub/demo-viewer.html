<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="images/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Demo Viewer — MIDROUND</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .viewer-shell {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 40px);
      gap: 8px;
      padding: 8px 16px;
    }
    .viewer-mid {
      flex: 1;
      min-height: 0;
    }
    .map-canvas-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #map-canvas { display: block; max-width: 100%; max-height: 100%; }
    .viewer-bottom {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 8px;
      flex-shrink: 0;
    }
    .round-tracker {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
    }
    .round-tracker-label {
      font-size: 10px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 6px;
    }
    .round-squares { display: flex; flex-wrap: wrap; gap: 3px; }
    .round-sq {
      width: 16px;
      height: 16px;
      border-radius: 2px;
      cursor: pointer;
      opacity: 0.85;
    }
    .round-sq.current  { outline: 2px solid var(--text); outline-offset: 1px; }
    .round-sq.ct       { background: #4FC3F7; }
    .round-sq.t        { background: #EF5350; }
    .round-sq.unplayed { background: rgba(255,255,255,0.18); }
    .viewer-timeline {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .timeline-track {
      flex: 1;
      position: relative;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      cursor: pointer;
    }
    .timeline-fill  { height: 100%; background: var(--accent); border-radius: 2px; pointer-events: none; }
    .timeline-thumb {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 12px;
      height: 12px;
      background: #fff;
      border-radius: 50%;
      pointer-events: none;
      box-shadow: 0 0 4px rgba(0,0,0,.4);
    }
    .timeline-time  { font-size: 11px; color: var(--text-secondary); min-width: 36px; }
    .speed-btn {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 11px;
      color: var(--text-secondary);
      cursor: pointer;
    }
    .speed-btn.active { border-color: var(--accent); color: var(--accent); }
    .play-btn { background: none; border: none; color: var(--text); font-size: 18px; cursor: pointer; padding: 0 4px; }
    #viewer-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      z-index: 10;
      font-size: 14px;
      color: var(--text-secondary);
    }
    /* Side panels */
    .viewer-mid {
      display: flex;
      gap: 8px;
    }
    .player-panel {
      width: 160px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow-y: auto;
      padding: 4px 0;
    }
    .player-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 9px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: opacity 0.15s;
    }
    .player-card.dead { opacity: 0.3; }
    .player-card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
    }
    .player-card-name {
      font-weight: 600;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 90px;
    }
    .player-card-money { color: #4CAF50; font-size: 10px; }
    .player-hp-bar { height: 4px; background: var(--border); border-radius: 2px; }
    .player-hp-fill { height: 100%; border-radius: 2px; }
    .ct-panel .player-hp-fill { background: #4FC3F7; }
    .t-panel  .player-hp-fill { background: #EF5350; }
    .player-card-bottom {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--text-secondary);
    }
    /* Kill feed */
    .killfeed {
      position: absolute;
      bottom: 12px;
      right: 12px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      pointer-events: none;
      z-index: 10;
      min-width: 200px;
      max-width: 260px;
    }
    .kf-row {
      background: rgba(0,0,0,0.72);
      border-radius: 4px;
      padding: 4px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 10px;
      border-left: 2px solid transparent;
    }
    .kf-row.ct-kill { border-left-color: #4FC3F7; }
    .kf-row.t-kill  { border-left-color: #EF5350; }
    .kf-row.faded   { opacity: 0.4; }
    .kf-names { display: flex; align-items: center; gap: 5px; }
    .kf-killer.ct, .kf-victim.ct { color: #4FC3F7; }
    .kf-killer.t,  .kf-victim.t  { color: #EF5350; }
    .kf-meta { display: flex; align-items: center; gap: 4px; color: #888; font-size: 9px; }
    .kf-hs   { color: #FFD700; font-weight: 700; }
  </style>
</head>
<body>
<div class="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main-content" style="padding:0;overflow:hidden;position:relative">

    <div id="viewer-loading">Loading demo…</div>

    <div class="viewer-shell" id="viewer-shell" style="display:none">

      <div class="viewer-mid">
        <div class="player-panel ct-panel" id="ct-panel"></div>
        <div class="map-canvas-wrap" id="map-canvas-wrap">
          <canvas id="map-canvas"></canvas>
          <div class="killfeed" id="killfeed"></div>
        </div>
        <div class="player-panel t-panel" id="t-panel"></div>
      </div>

      <div class="viewer-bottom">
        <div class="round-tracker">
          <div class="round-tracker-label">
            Round <span id="round-num">—</span> / <span id="round-total">—</span>
          </div>
          <div class="round-squares" id="round-squares"></div>
        </div>
        <div class="viewer-timeline">
          <button class="play-btn" id="play-btn">▶</button>
          <span class="timeline-time" id="timeline-current">0:00</span>
          <div class="timeline-track" id="timeline-track">
            <div class="timeline-fill"  id="timeline-fill"  style="width:0%"></div>
            <div class="timeline-thumb" id="timeline-thumb" style="left:0%"></div>
          </div>
          <span class="timeline-time" id="timeline-end">0:00</span>
          <button class="speed-btn active" data-speed="1">1×</button>
          <button class="speed-btn" data-speed="2">2×</button>
          <button class="speed-btn" data-speed="4">4×</button>
        </div>
      </div>

    </div>
  </main>
</div>
<script type="module" src="demo-viewer.js"></script>
</body>
</html>
