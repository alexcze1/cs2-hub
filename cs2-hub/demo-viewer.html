<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="images/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Demo Viewer — MIDROUND</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* ── Layout shell ───────────────────────────────────────── */
    .viewer-shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
      gap: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* ── Match header ───────────────────────────────────────── */
    .viewer-header {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 32px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 0 24px;
      height: 36px;
      white-space: nowrap;
    }
    .vh-map {
      font-size: 10px;
      font-weight: 700;
      color: #7777cc;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      min-width: 90px;
    }
    .vh-score {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 22px;
      font-weight: 800;
      font-family: "SF Mono", "Consolas", monospace;
    }
    .vh-score-ct  { color: #4FC3F7; }
    .vh-score-sep { color: rgba(255,255,255,0.2); font-size: 18px; font-weight: 300; }
    .vh-score-t   { color: #FF9500; }
    .vh-round {
      font-size: 10px;
      color: var(--text-secondary, #A1A1AA);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      min-width: 90px;
      text-align: right;
    }

    /* ── Mid row ────────────────────────────────────────────── */
    .viewer-mid {
      flex: 1;
      min-height: 0;
      display: flex;
      gap: 8px;
    }

    /* ── Map canvas ─────────────────────────────────────────── */
    .map-canvas-wrap {
      flex: 1;
      min-height: 0;
      position: relative;
      overflow: hidden;
      background: #030712;
    }
    #map-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ── Player panels ──────────────────────────────────────── */
    .player-panel {
      position: absolute;
      top: 56px;
      bottom: 0;
      width: 192px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 0 8px 8px;
      overflow-y: auto;
      scrollbar-width: none;
      z-index: 10;
    }
    .player-panel::-webkit-scrollbar { display: none; }
    .ct-panel { left: 0; }
    .t-panel  { right: 0; }

    .player-card {
      display: flex;
      background: rgba(3,7,18,0.86);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 9px;
      overflow: hidden;
      transition: opacity 0.15s, filter 0.15s;
    }
    .player-card.dead {
      opacity: 0.16;
      filter: grayscale(0.7);
    }
    .card-accent-bar {
      width: 4px;
      flex-shrink: 0;
    }
    .ct-panel .card-accent-bar { background: linear-gradient(180deg, #4FC3F7, #2196F3); }
    .t-panel  .card-accent-bar { background: linear-gradient(180deg, #FF9500, #FF6B00); }
    .card-body {
      flex: 1;
      min-width: 0;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 4px;
    }
    .player-name {
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .player-money {
      font-size: 10px;
      color: #5DBF6E;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .hp-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .hp-bar-wrap {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.07);
      border-radius: 2px;
      overflow: hidden;
    }
    .hp-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.12s linear;
    }
    .ct-panel .hp-fill { background: linear-gradient(90deg, #29B6F6, #4FC3F7); }
    .t-panel  .hp-fill { background: linear-gradient(90deg, #FF6B00, #FF9500); }
    .hp-val {
      font-size: 10px;
      font-weight: 600;
      color: #666;
      min-width: 22px;
      text-align: right;
    }
    .dead-label {
      font-size: 8px;
      font-weight: 700;
      color: rgba(255,255,255,0.2);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }
    .card-bottom {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .weapon-icon {
      width: 24px;
      height: 15px;
      object-fit: contain;
      opacity: 0.65;
      flex-shrink: 0;
    }
    .weapon-name {
      font-size: 9px;
      color: rgba(255,255,255,0.35);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .util-row {
      display: flex;
      gap: 3px;
      margin-top: 1px;
    }
    .util-pill {
      flex: 1;
      height: 18px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 7.5px;
      font-weight: 700;
      letter-spacing: 0.04em;
      transition: opacity 0.1s;
    }
    .util-pill.empty { opacity: 0.18; }
    .util-pill.smoke   { background: rgba(180,180,180,0.14); border: 1px solid rgba(200,200,200,0.22); color: #bbb; }
    .util-pill.flash   { background: rgba(255,240,120,0.11); border: 1px solid rgba(255,235,100,0.20); color: #ddc; }
    .util-pill.molotov { background: rgba(255,90,0,0.15);    border: 1px solid rgba(255,110,0,0.25);   color: #f74; }
    .util-pill.he      { background: rgba(80,200,80,0.12);   border: 1px solid rgba(100,210,100,0.20); color: #8c8; }

    /* ── Kill feed ──────────────────────────────────────────── */
    .killfeed {
      position: absolute;
      top: 10px;
      right: 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      pointer-events: none;
      z-index: 10;
      min-width: 200px;
      max-width: 260px;
    }
    .kf-row {
      background: rgba(3,7,18,0.78);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.06);
      border-left: 2px solid transparent;
      border-radius: 6px;
      padding: 5px 9px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      font-size: 10px;
      transition: opacity 0.3s;
    }
    .kf-row.ct-kill { border-left-color: #4FC3F7; }
    .kf-row.t-kill  { border-left-color: #FF9500; }
    .kf-row.faded   { opacity: 0.3; }
    .kf-names { display: flex; align-items: center; gap: 4px; overflow: hidden; }
    .kf-killer, .kf-victim { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 76px; }
    .kf-killer.ct, .kf-victim.ct { color: #4FC3F7; }
    .kf-killer.t,  .kf-victim.t  { color: #FF9500; }
    .kf-arrow { color: rgba(255,255,255,0.25); flex-shrink: 0; }
    .kf-meta { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .kf-weapon-icon { width: 18px; height: 12px; object-fit: contain; opacity: 0.65; }
    .kf-hs { color: #FFD700; font-size: 8px; font-weight: 700; letter-spacing: 0.05em; }

    /* ── Loading overlay ────────────────────────────────────── */
    #viewer-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg, #030712);
      z-index: 10;
      font-size: 14px;
      color: var(--text-secondary, #A1A1AA);
    }

    /* ── Bottom controls ────────────────────────────────────── */
    .viewer-bottom {
      flex-shrink: 0;
      background: rgba(3,7,18,0.97);
      border-top: 1px solid rgba(255,255,255,0.07);
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* ── Round row ──────────────────────────────────────────── */
    .round-row {
      display: flex;
      align-items: center;
      gap: 3px;
      overflow-x: auto;
      padding: 2px 0;
      scrollbar-width: none;
    }
    .round-row::-webkit-scrollbar { display: none; }
    .round-row-label {
      font-size: 8px;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
      margin-right: 6px;
      flex-shrink: 0;
    }
    .round-halftime {
      width: 1px;
      height: 20px;
      background: rgba(255,255,255,0.12);
      flex-shrink: 0;
      margin: 0 4px;
    }
    .round-sq {
      width: 26px;
      height: 26px;
      border-radius: 5px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      flex-shrink: 0;
      user-select: none;
      transition: opacity 0.1s, transform 0.1s;
      opacity: 0.85;
    }
    .round-sq:hover    { opacity: 1; transform: scale(1.08); }
    .round-sq.current  { outline: 2px solid rgba(102,102,183,0.9); outline-offset: 1px; opacity: 1; }
    .round-sq.ct       { background: rgba(79,195,247,0.18); border: 1px solid rgba(79,195,247,0.32); color: #4FC3F7; }
    .round-sq.t        { background: rgba(255,149,0,0.16);  border: 1px solid rgba(255,149,0,0.32);  color: #FF9500; }

    /* ── Timeline ───────────────────────────────────────────── */
    .viewer-timeline {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .play-btn {
      width: 30px;
      height: 30px;
      background: rgba(102,102,183,0.2);
      border: 1px solid rgba(102,102,183,0.5);
      border-radius: 50%;
      color: #9999dd;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
      padding: 0;
    }
    .play-btn:hover { background: rgba(102,102,183,0.36); border-color: rgba(102,102,183,0.75); }
    .tl-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }
    .tl-swimlane {
      position: relative;
      height: 34px;
      cursor: pointer;
    }
    .tl-lane-bg {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.04);
      border-radius: 5px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .tl-lane-fill {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      background: rgba(102,102,183,0.14);
      border-radius: 5px 0 0 5px;
      pointer-events: none;
    }
    .tl-scrub {
      position: absolute;
      top: 0; bottom: 0;
      width: 2px;
      background: rgba(140,140,220,0.8);
      border-radius: 1px;
      box-shadow: 0 0 6px rgba(102,102,183,0.6);
      pointer-events: none;
    }
    .tl-thumb {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 0 3px rgba(102,102,183,0.4), 0 0 10px rgba(102,102,183,0.5);
      pointer-events: none;
    }
    .tl-time-row {
      display: flex;
      justify-content: space-between;
    }
    .timeline-time {
      font-size: 9px;
      color: #444;
      font-family: "SF Mono", "Consolas", monospace;
    }
    .tl-kill-mark {
      position: absolute;
      width: 2px;
      border-radius: 1px;
      pointer-events: none;
      transform: translateX(-50%);
    }
    .tl-kill-mark.ct {
      top: 2px;
      height: calc(50% - 2px);
      background: rgba(79,195,247,0.65);
    }
    .tl-kill-mark.t {
      bottom: 2px;
      height: calc(50% - 2px);
      background: rgba(255,149,0,0.65);
    }
    .tl-kill-mark.bomb {
      top: 2px;
      height: calc(100% - 4px);
      width: 3px;
      background: rgba(255,82,82,0.8);
    }
    .tl-speeds {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }
    .speed-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 4px;
      padding: 4px 9px;
      font-size: 9.5px;
      color: #444;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .speed-btn:hover  { border-color: rgba(102,102,183,0.45); color: #9999dd; }
    .speed-btn.active { background: rgba(102,102,183,0.16); border-color: rgba(102,102,183,0.55); color: #9999dd; }
  </style>
</head>
<body>
<div class="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main-content" style="padding:0;overflow:hidden;position:relative;height:100vh">

    <div id="viewer-loading">Loading demo…</div>

    <div class="viewer-shell" id="viewer-shell" style="display:none">

      <!-- Canvas area — full bleed, panels float on top -->
      <div class="map-canvas-wrap" id="map-canvas-wrap">
        <canvas id="map-canvas"></canvas>

        <!-- Match header pill -->
        <div class="viewer-header" id="viewer-header">
          <span class="vh-map" id="vh-map">—</span>
          <div class="vh-score">
            <span class="vh-score-ct" id="vh-ct-score">0</span>
            <span class="vh-score-sep">—</span>
            <span class="vh-score-t" id="vh-t-score">0</span>
          </div>
          <span class="vh-round" id="vh-round">Round 1</span>
        </div>

        <!-- Player panels (glass overlays) -->
        <div class="player-panel ct-panel" id="ct-panel"></div>
        <div class="player-panel t-panel"  id="t-panel"></div>

        <!-- Kill feed -->
        <div class="killfeed" id="killfeed"></div>
      </div>

      <!-- Bottom bar — solid strip -->
      <div class="viewer-bottom">
        <div class="round-row" id="round-row">
          <span class="round-row-label">Rounds</span>
        </div>
        <div class="viewer-timeline">
          <button class="play-btn" id="play-btn">▶</button>
          <div class="tl-main">
            <div class="tl-swimlane" id="timeline-track">
              <div class="tl-lane-bg"></div>
              <div class="tl-lane-fill" id="timeline-fill"></div>
              <div class="tl-scrub"    id="timeline-scrub"></div>
              <div class="tl-thumb"    id="timeline-thumb"></div>
            </div>
            <div class="tl-time-row">
              <span class="timeline-time" id="timeline-current">0:00</span>
              <span class="timeline-time" id="timeline-end">0:00</span>
            </div>
          </div>
          <div class="tl-speeds">
            <button class="speed-btn" data-speed="0.5">½×</button>
            <button class="speed-btn active" data-speed="1">1×</button>
            <button class="speed-btn" data-speed="2">2×</button>
            <button class="speed-btn" data-speed="4">4×</button>
          </div>
        </div>
      </div>

    </div>
  </main>
</div>
<script type="module" src="demo-viewer.js"></script>
</body>
</html>
