<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Issues — CS2 Hub</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main-content">
    <div class="page-header">
      <div>
        <div class="page-title">RECURRING ISSUES</div>
        <div class="page-subtitle" id="issues-sub">Track and tackle persistent problems</div>
      </div>
      <button class="btn btn-primary" id="add-btn">+ Add Issue</button>
    </div>

    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px" id="status-filters">
      <button class="tab active" data-status="all">All</button>
      <button class="tab" data-status="active">Active</button>
      <button class="tab" data-status="improving">Improving</button>
      <button class="tab" data-status="resolved">Resolved</button>
    </div>

    <div class="modal-backdrop" id="modal" style="display:none">
      <div class="modal" style="max-width:500px;width:100%">
        <div class="modal-header">
          <div class="modal-title" id="modal-title">Add Issue</div>
          <button class="modal-close" id="modal-close">×</button>
        </div>
        <div class="form-group">
          <label class="form-label">Issue Title</label>
          <input class="form-input" id="f-title" placeholder="e.g. Losing B site pistol rounds on Mirage"/>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="form-group">
            <label class="form-label">Category</label>
            <select class="form-select" id="f-category">
              <option value="tactical">Tactical</option>
              <option value="communication">Communication</option>
              <option value="mental">Mental</option>
              <option value="individual">Individual</option>
              <option value="teamplay">Teamplay</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Priority</label>
            <select class="form-select" id="f-priority">
              <option value="high">High</option>
              <option value="medium" selected>Medium</option>
              <option value="low">Low</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-select" id="f-status">
            <option value="active">Active</option>
            <option value="improving">Improving</option>
            <option value="resolved">Resolved</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea class="form-textarea" id="f-description" placeholder="Describe the issue in detail…" style="min-height:70px"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Current Actions / How We're Tackling It</label>
          <textarea class="form-textarea" id="f-actions" placeholder="What are we doing about this right now?" style="min-height:70px"></textarea>
        </div>
        <div class="error-msg" id="modal-error" style="display:none"></div>
        <div class="modal-actions">
          <button class="btn btn-danger btn-sm" id="delete-btn" style="display:none;margin-right:auto">Delete</button>
          <button class="btn btn-ghost" id="cancel-btn">Cancel</button>
          <button class="btn btn-primary" id="save-btn">Save</button>
        </div>
      </div>
    </div>

    <div id="issues-list"></div>
  </main>
</div>
<script type="module" src="issues.js"></script>
</body>
</html>
