<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Team Goals — MIDROUND</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main-content">
    <div class="page-header">
      <div>
        <div class="page-title">TEAM GOALS</div>
        <div class="page-subtitle" id="goals-sub">Loading…</div>
      </div>
      <button class="btn btn-primary" id="add-btn">+ Add Goal</button>
    </div>

    <!-- Stats summary -->
    <div id="goals-stats" style="display:flex;gap:12px;margin-bottom:24px"></div>

    <!-- Goal Modal -->
    <div class="modal-backdrop" id="modal" style="display:none">
      <div class="modal" style="max-width:520px;width:100%">
        <div class="modal-header">
          <div class="modal-title" id="modal-title">Add Goal</div>
          <button class="modal-close" id="modal-close">×</button>
        </div>
        <div class="form-group">
          <label class="form-label">Goal</label>
          <input class="form-input" id="f-title" placeholder="e.g. Reach top 100 national ranking"/>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Category</label>
            <select class="form-select" id="f-category">
              <option value="competition">Competition</option>
              <option value="strategy">Strategy</option>
              <option value="aim">Aim & Mechanics</option>
              <option value="communication">Communication</option>
              <option value="mental">Mental</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Owner</label>
            <input class="form-input" id="f-owner" placeholder="Team / player name"/>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Time Horizon</label>
            <select class="form-select" id="f-horizon">
              <option value="long_term">Long Term</option>
              <option value="monthly">Monthly</option>
              <option value="weekly">Weekly</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Status</label>
            <select class="form-select" id="f-status">
              <option value="active">Active</option>
              <option value="completed">Completed</option>
              <option value="dropped">Dropped</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Due Date (optional)</label>
          <input class="form-input" id="f-due" type="date"/>
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea class="form-textarea" id="f-description" placeholder="What does achieving this look like?" style="min-height:60px"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Action Steps</label>
          <textarea class="form-textarea" id="f-actions" placeholder="What will we actually do?&#10;• VOD review every Thursday&#10;• 30min aim training daily" style="min-height:80px"></textarea>
        </div>
        <div class="error-msg" id="modal-error" style="display:none"></div>
        <div class="modal-actions">
          <button class="btn btn-danger btn-sm" id="delete-btn" style="display:none;margin-right:auto">Delete</button>
          <button class="btn btn-ghost" id="cancel-btn">Cancel</button>
          <button class="btn btn-primary" id="save-btn">Save</button>
        </div>
      </div>
    </div>

    <div id="goals-container"></div>
  </main>
</div>
<script type="module" src="goals.js"></script>
</body>
</html>
