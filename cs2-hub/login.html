<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="apple-touch-icon" href="images/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MIDROUND — Login</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
      background-color: var(--bg);
      background-image:
        linear-gradient(rgba(59,130,246,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.035) 1px, transparent 1px);
      background-size: 44px 44px;
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 3px solid var(--accent);
      border-radius: 12px;
      padding: 40px 36px;
      animation: ts-enter 0.35s ease both;
    }

    @keyframes ts-enter {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-logo {
      display: block;
      width: 152px;
      filter: invert(1);
      margin: 0 auto 12px;
      opacity: 0.92;
    }

    .login-tagline {
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 36px;
      font-weight: 600;
    }
  </style>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <img src="images/logo-lettering.png" alt="MIDROUND" class="login-logo"/>
    <div class="login-tagline">Team access only</div>

    <div class="form-group">
      <label class="form-label" for="email">Email</label>
      <input class="form-input" type="email" id="email" placeholder="player@team.gg" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <div id="error-msg" class="error-msg" style="display:none"></div>
    <button class="btn btn-primary" style="width:100%;margin-top:8px" id="login-btn">Sign In</button>
  </div>
</div>
<script type="module">
  import { signIn } from './auth.js'
  import { supabase } from './supabase.js'

  const { data: { session } } = await supabase.auth.getSession()
  if (session) {
    window.location.href = 'dashboard.html'
  } else {
    const btn = document.getElementById('login-btn')
    const errEl = document.getElementById('error-msg')

    btn.addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value
      errEl.style.display = 'none'
      btn.textContent = 'Signing in…'
      btn.disabled = true
      try {
        await signIn(email, password)
        window.location.href = 'dashboard.html'
      } catch (e) {
        errEl.textContent = e.message || 'Invalid email or password'
        errEl.style.display = 'block'
        btn.textContent = 'Sign In'
        btn.disabled = false
      }
    })

    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') btn.click()
    })
  }
</script>
</body>
</html>
