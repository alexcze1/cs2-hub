<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="apple-touch-icon" href="images/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MIDROUND — Login</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
      background-color: var(--bg);
      background-image:
        linear-gradient(rgba(59,130,246,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.035) 1px, transparent 1px);
      background-size: 44px 44px;
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 3px solid var(--accent);
      border-radius: 12px;
      padding: 40px 36px;
      animation: ts-enter 0.35s ease both;
    }

    @keyframes ts-enter {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-logo {
      display: block;
      width: 152px;
      filter: invert(1);
      margin: 0 auto 12px;
      opacity: 0.92;
    }

    .login-tagline {
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 36px;
      font-weight: 600;
    }

    .steam-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 13px 20px;
      background: #1b2838;
      border: 1px solid #2a475e;
      border-radius: 8px;
      color: #c6d4df;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
    }
    .steam-btn:hover { background: #2a475e; border-color: #4c8db0; color: #fff; }
    .steam-btn svg { flex-shrink: 0; }

    .login-error {
      margin-top: 16px;
      color: var(--danger);
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <img src="images/logo-lettering.png" alt="MIDROUND" class="login-logo"/>
    <div class="login-tagline">Team access only</div>

    <a class="steam-btn" id="steam-btn" href="/api/steam-login">
      <svg width="22" height="22" viewBox="0 0 233 233" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M116.5 0C52.1 0 0 52.1 0 116.5c0 55.2 38.5 101.5 90.6 113.1l33.4-80.2c-1.3.1-2.6.2-3.9.2-22.4 0-40.6-18.2-40.6-40.6 0-22.4 18.2-40.6 40.6-40.6 22.4 0 40.6 18.2 40.6 40.6 0 19.1-13.2 35.2-31 39.6l-32.8 78.8c1.7.1 3.4.1 5.1.1 64.4 0 116.5-52.1 116.5-116.5S180.9 0 116.5 0z" fill="#c6d4df"/>
        <circle cx="120.1" cy="109.1" r="27.1" fill="#1b2838"/>
      </svg>
      Sign in with Steam
    </a>
    <div id="login-error" class="login-error" style="display:none"></div>
  </div>
</div>
<script type="module">
  import { supabase } from './supabase.js'

  const { data: { session } } = await supabase.auth.getSession()
  if (session) {
    window.location.href = 'dashboard.html'
  }

  const params = new URLSearchParams(location.search)
  const err = params.get('error')
  if (err) {
    const messages = {
      steam_failed: 'Steam verification failed. Please try again.',
      user_failed:  'Could not create your account. Please try again.',
      link_failed:  'Could not generate session. Please try again.',
      unexpected:   'An unexpected error occurred. Please try again.',
    }
    const el = document.getElementById('login-error')
    el.textContent = messages[err] || 'Login failed. Please try again.'
    el.style.display = 'block'
  }
</script>
</body>
</html>
