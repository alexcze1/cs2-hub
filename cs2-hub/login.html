<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="apple-touch-icon" href="images/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MIDROUND — Login</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
      background-color: var(--bg);
      background-image:
        linear-gradient(rgba(59,130,246,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.035) 1px, transparent 1px);
      background-size: 44px 44px;
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 3px solid var(--accent);
      border-radius: 12px;
      padding: 40px 36px;
      animation: ts-enter 0.35s ease both;
    }

    @keyframes ts-enter {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-logo {
      display: block;
      width: 152px;
      margin: 0 auto 12px;
      opacity: 0.92;
    }

    .login-tagline {
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 36px;
      font-weight: 600;
    }

    .steam-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 13px 20px;
      background: #1b2838;
      border: 1px solid #2a475e;
      border-radius: 8px;
      color: #c6d4df;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
    }
    .steam-btn:hover { background: #2a475e; border-color: #4c8db0; color: #fff; }
    .steam-btn svg { flex-shrink: 0; }

    .login-error {
      margin-top: 16px;
      color: var(--danger);
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <img src="images/logo-lettering.png" alt="MIDROUND" class="login-logo"/>
    <div class="login-tagline">Team access only</div>

    <a class="steam-btn" id="steam-btn" href="/api/steam-login">
      <svg width="24" height="24" viewBox="0 0 256 259" xmlns="http://www.w3.org/2000/svg"><path d="M127.779 0C60.385 0 5.02 52.412.254 118.593l68.621 28.396a36.113 36.113 0 0 1 20.456-6.331c.682 0 1.356.019 2.023.056l30.532-44.264v-.628c0-26.702 21.688-48.39 48.39-48.39 26.703 0 48.39 21.688 48.39 48.39 0 26.703-21.687 48.39-48.39 48.39-.36 0-.72-.008-1.077-.022l-43.59 31.11c.03.563.046 1.13.046 1.699 0 20.053-16.268 36.32-36.32 36.32-17.795 0-32.614-12.822-35.79-29.699L2.549 166.51C17.647 218.678 65.565 256.925 122.605 256.925c69.49 0 125.87-56.38 125.87-125.87C248.475 56.38 192.095 0 122.605 0h5.174z" fill="#00adee"/><path d="M90.3 196.662l-14.494-6.004c2.578 5.349 7.07 9.72 12.864 12.002 12.591 5.021 26.944-.993 31.988-13.585 2.434-6.098 2.388-12.775-.131-18.84-2.519-6.063-7.18-10.815-13.279-13.25-6.056-2.415-12.465-2.24-18.208.131l14.962 6.19c9.276 3.698 13.797 14.224 10.099 23.5-3.698 9.277-14.224 13.797-23.501 10.1l-.3-.244zm79.97-82.95c0-17.802-14.43-32.26-32.26-32.26-17.831 0-32.261 14.458-32.261 32.26 0 17.83 14.43 32.26 32.261 32.26 17.83 0 32.26-14.43 32.26-32.26zm-56.473.036c0-13.37 10.839-24.21 24.213-24.21 13.37 0 24.21 10.84 24.21 24.21 0 13.374-10.84 24.214-24.21 24.214-13.374 0-24.213-10.84-24.213-24.214z" fill="#fff"/></svg>
      Sign in with Steam
    </a>
    <div id="login-error" class="login-error" style="display:none"></div>
  </div>
</div>
<script type="module">
  import { supabase } from './supabase.js'

  const { data: { session } } = await supabase.auth.getSession()
  if (session) {
    window.location.href = 'dashboard.html'
  }

  const params = new URLSearchParams(location.search)
  const err = params.get('error')
  if (err) {
    const messages = {
      steam_failed: 'Steam verification failed. Please try again.',
      user_failed:  'Could not create your account. Please try again.',
      link_failed:  'Could not generate session. Please try again.',
      unexpected:   'An unexpected error occurred. Please try again.',
    }
    const el = document.getElementById('login-error')
    el.textContent = messages[err] || 'Login failed. Please try again.'
    el.style.display = 'block'
  }
</script>
</body>
</html>
