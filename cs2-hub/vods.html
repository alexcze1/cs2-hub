<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Match Results — CS2 Hub</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main-content">
    <div class="page-header">
      <div>
        <div class="page-title">Match Results</div>
        <div class="page-sub">Scores, stats and match notes</div>
      </div>
      <a class="btn btn-primary" href="vod-detail.html">+ Add Match</a>
    </div>

    <div id="stats-section" style="display:none">
      <div class="stats-grid" style="grid-template-columns:repeat(4,1fr)" id="top-stats"></div>
      <div class="section-label" style="margin-top:24px">Map Pool Performance</div>
      <div id="map-breakdown"></div>
    </div>

    <div class="section-label" style="margin-top:24px" id="history-label">Match History</div>
    <div id="vods-list"><div class="loading">Loading…</div></div>
  </main>
</div>
<script type="module" src="vods.js"></script>
</body>
</html>
