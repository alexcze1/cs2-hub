<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="images/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Demos — MIDROUND</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main-content">

    <section id="demos-hero" class="dx-hero">
      <div class="dx-hero-loading">Loading…</div>
    </section>

    <section id="demos-tabs" class="dx-tabs"></section>

    <input type="file" id="demo-file-input" accept=".dem" multiple style="display:none"/>

    <div id="upload-progress" style="display:none;margin-bottom:16px" class="card">
      <div id="upload-progress-text" style="margin-bottom:8px;font-size:14px;color:var(--text-variant)">Uploading…</div>
      <div style="height:4px;background:var(--border);border-radius:2px">
        <div id="upload-progress-bar" style="height:100%;background:var(--accent);border-radius:2px;width:0%;transition:width 0.2s"></div>
      </div>
    </div>

    <section id="demos-filters" class="dx-filters"></section>

    <section class="dl-playlists" id="dl-playlists" hidden></section>
    <div id="demos-list"></div>

  </main>
</div>
<script type="module" src="demos.js"></script>
</body>
</html>
