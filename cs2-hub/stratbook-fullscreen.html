<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="apple-touch-icon" href="images/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Match View — MIDROUND</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    * { box-sizing: border-box; }

    body { background: var(--bg); color: var(--text); margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

    .fs-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .fs-title {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-right: 4px;
      white-space: nowrap;
    }
    .fs-map-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
    .fs-tab {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text-secondary);
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      transition: all .12s;
    }
    .fs-tab:hover    { border-color: var(--accent); color: var(--accent); }
    .fs-tab.active   { background: var(--accent); border-color: var(--accent); color: #000; }
    .fs-tab-t.active  { background: #f87171; border-color: #f87171; color: #000; }
    .fs-tab-ct.active { background: var(--accent); border-color: var(--accent); color: #000; }

    .fs-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }

    .fs-right { margin-left: auto; display: flex; gap: 6px; align-items: center; }
    .fs-count { font-size: 11px; color: var(--muted); }
    .fs-fullscreen-btn {
      background: var(--border);
      border: none;
      border-radius: 5px;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      font-family: inherit;
      padding: 4px 10px;
      transition: background .12s;
    }
    .fs-fullscreen-btn:hover { background: var(--accent); color: #000; }

    .fs-body {
      flex: 1;
      overflow-y: auto;
      padding: 8px 10px;
      column-count: 4;
      column-gap: 8px;
    }

    .fs-card {
      display: inline-block;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--border);
      border-radius: 6px;
      padding: 7px 9px;
      margin-bottom: 6px;
      break-inside: avoid;
    }
    .fs-card-t  { border-left-color: #f87171; }
    .fs-card-ct { border-left-color: var(--accent); }

    .fs-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      margin-bottom: 5px;
    }
    .fs-strat-name {
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .fs-badges { display: flex; gap: 3px; flex-shrink: 0; }
    .fs-badge {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .04em;
      padding: 1px 5px;
      border-radius: 3px;
      text-transform: uppercase;
    }
    .fs-badge-t    { background: rgba(239,68,68,0.15);  color: #f87171; }
    .fs-badge-ct   { background: rgba(0,255,156,0.15); color: var(--accent); }
    .fs-badge-type { background: var(--border); color: var(--muted); }

    .fs-roles {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px 8px;
    }
    .fs-role-row {
      display: flex;
      gap: 5px;
      align-items: baseline;
      min-width: 0;
    }
    .fs-role-player {
      font-size: 9px;
      color: var(--muted);
      font-weight: 700;
      flex-shrink: 0;
      width: 22px;
      text-transform: uppercase;
    }
    .fs-role-name {
      font-size: 10px;
      color: var(--text);
      white-space: normal;
      word-break: break-word;
      min-width: 0;
    }

    .fs-empty {
      color: var(--muted);
      font-size: 13px;
      padding: 40px;
      text-align: center;
      column-span: all;
    }

    /* Split layout for antistrat panel */
    .fs-main-split {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    .fs-strats-col {
      flex: 1;
      overflow-y: auto;
      padding: 8px 10px;
      column-count: 3;
      column-gap: 8px;
    }
    .fs-antistrat-panel {
      width: 340px;
      flex-shrink: 0;
      border-left: 1px solid var(--border);
      background: var(--surface);
      overflow-y: auto;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .fs-panel-title {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    .fs-panel-gameplan { font-size: 11px; }
    .fs-panel-gameplan .gameplan-sheet { margin-top: 8px; }
    .fs-panel-gameplan .gameplan-textarea {
      overflow: visible !important; height: auto !important;
      white-space: pre-wrap; word-break: break-word; min-height: 24px;
    }

    /* Print header (hidden on screen) */
    .fs-print-header { display: none; font-size: 14pt; font-weight: 800; margin-bottom: 4mm; border-bottom: 2px solid #111; padding-bottom: 2mm; }

    @media (max-width: 1400px) { .fs-strats-col { column-count: 2; } }
    @media (max-width: 900px)  { .fs-strats-col { column-count: 1; } }
  </style>
</head>
<body>
  <div class="fs-header">
    <span class="fs-title">Match View</span>

    <div class="fs-map-tabs" id="map-tabs">
      <button class="fs-tab active" data-map="all">All</button>
      <button class="fs-tab" data-map="ancient">Ancient</button>
      <button class="fs-tab" data-map="mirage">Mirage</button>
      <button class="fs-tab" data-map="nuke">Nuke</button>
      <button class="fs-tab" data-map="anubis">Anubis</button>
      <button class="fs-tab" data-map="inferno">Inferno</button>
      <button class="fs-tab" data-map="overpass">Overpass</button>
      <button class="fs-tab" data-map="dust2">Dust2</button>
    </div>

    <div class="fs-sep"></div>

    <div class="fs-map-tabs" id="side-tabs">
      <button class="fs-tab active" data-side="all">Both</button>
      <button class="fs-tab fs-tab-t" data-side="t">T-Side</button>
      <button class="fs-tab fs-tab-ct" data-side="ct">CT-Side</button>
    </div>

    <div class="fs-sep"></div>

    <select class="form-select" id="player-filter" style="font-size:11px;padding:3px 8px;height:28px;width:130px">
      <option value="all">All Players</option>
    </select>

    <div class="fs-right">
      <span class="fs-count" id="strat-count"></span>
      <button class="fs-fullscreen-btn" id="print-btn">⎙ Print</button>
      <button class="fs-fullscreen-btn" id="fs-btn">⤢ Fullscreen</button>
      <a href="stratbook.html" style="font-size:11px;color:var(--muted);text-decoration:none;">✕ Close</a>
    </div>
  </div>

  <div class="fs-print-header" id="print-header"></div>
  <div class="fs-main-split">
    <div class="fs-strats-col" id="strat-body"></div>

    <!-- Antistrat panel -->
    <div class="fs-antistrat-panel">
      <div class="fs-panel-title">Antistrat</div>
      <select class="form-select" id="as-opponent-select" style="font-size:12px;padding:5px 8px">
        <option value="">— Select opponent —</option>
      </select>
      <div id="as-map-tabs" style="display:flex;flex-wrap:wrap;gap:4px"></div>
      <div id="as-panel-content" style="display:none" class="fs-panel-gameplan"></div>
      <div id="as-panel-empty" style="color:var(--muted);font-size:12px">Select an opponent to view their antistrat.</div>
    </div>
  </div>

<script type="module">
import { requireAuth } from './auth.js'
import { supabase, getTeamId } from './supabase.js'

await requireAuth()

let allStrats = []
let activeMap    = new URLSearchParams(location.search).get('map') || 'all'
let activeSide   = 'all'
let activePlayer = 'all'

function esc(s) { const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML }

// Set initial active map tab
document.querySelectorAll('#map-tabs .fs-tab').forEach(t => {
  t.classList.toggle('active', t.dataset.map === activeMap)
})

const [{ data }, { data: roster }] = await Promise.all([
  supabase.from('strats').select('*').eq('team_id', getTeamId()).order('side').order('type').order('name'),
  supabase.from('roster').select('username, nickname, role').eq('team_id', getTeamId()).order('username')
])
allStrats = data ?? []

// Populate player filter: roster first, then any strat player names not in roster
const playerSel = document.getElementById('player-filter')
const rosterNames = new Set()
;(roster ?? []).forEach(p => {
  const name = p.nickname || p.username
  rosterNames.add(name)
  const opt = document.createElement('option')
  opt.value = name
  opt.textContent = name + (p.role ? ` (${p.role})` : '')
  playerSel.appendChild(opt)
})
// Add player names found in strats that aren't in the roster
const stratPlayerNames = new Set()
;(allStrats ?? []).forEach(s => {
  ;(s.player_roles ?? []).forEach(r => {
    if (r.player && r.role?.trim() && !rosterNames.has(r.player)) stratPlayerNames.add(r.player)
  })
})
stratPlayerNames.forEach(name => {
  const opt = document.createElement('option')
  opt.value = name
  opt.textContent = name
  playerSel.appendChild(opt)
})
playerSel.addEventListener('change', e => { activePlayer = e.target.value; render() })

render()

function render() {
  const filtered = allStrats.filter(s =>
    (activeMap  === 'all' || s.map  === activeMap) &&
    (activeSide === 'all' || s.side === activeSide)
  )

  document.getElementById('strat-count').textContent = `${filtered.length} strat${filtered.length !== 1 ? 's' : ''}`

  const body = document.getElementById('strat-body')
  if (!filtered.length) {
    body.innerHTML = `<div class="fs-empty">No strats for this selection.</div>`
    return
  }

  body.innerHTML = filtered.map(s => {
    const allRoles = (s.player_roles ?? []).filter(r => r.role?.trim())
    const roles = activePlayer === 'all'
      ? allRoles
      : allRoles.filter(r => r.player === activePlayer)
    const sideKey = s.side === 't' ? 't' : 'ct'
    const p = name => name.replace('Player ', 'P').replace('player ', 'P')

    return `
      <div class="fs-card fs-card-${sideKey}">
        <div class="fs-card-top">
          <span class="fs-strat-name">${esc(s.name)}</span>
          <div class="fs-badges">
            <span class="fs-badge fs-badge-${sideKey}">${sideKey.toUpperCase()}</span>
            <span class="fs-badge fs-badge-type">${esc(s.type)}</span>
          </div>
        </div>
        ${roles.length ? `
        <div class="fs-roles">
          ${roles.map(r => `
            <div class="fs-role-row">
              ${activePlayer === 'all' ? `<span class="fs-role-player">${esc(p(r.player).slice(0,3).toUpperCase())}</span>` : ''}
              <span class="fs-role-name" style="${activePlayer !== 'all' ? 'font-size:12px' : ''}">${esc(r.role)}</span>
            </div>
          `).join('')}
        </div>` : `${activePlayer !== 'all' ? '<div class="fs-role-name" style="font-size:11px;color:var(--muted);padding:2px 0">No role assigned</div>' : ''}`}
      </div>
    `
  }).join('')
}

document.getElementById('map-tabs').addEventListener('click', e => {
  const t = e.target.closest('.fs-tab'); if (!t) return
  document.querySelectorAll('#map-tabs .fs-tab').forEach(x => x.classList.remove('active'))
  t.classList.add('active'); activeMap = t.dataset.map; render()
})
document.getElementById('side-tabs').addEventListener('click', e => {
  const t = e.target.closest('.fs-tab'); if (!t) return
  document.querySelectorAll('#side-tabs .fs-tab').forEach(x => x.classList.remove('active'))
  t.classList.add('active'); activeSide = t.dataset.side; render()
})

document.getElementById('fs-btn').addEventListener('click', () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen()
    document.getElementById('fs-btn').textContent = '⤡ Exit Fullscreen'
  } else {
    document.exitFullscreen()
    document.getElementById('fs-btn').textContent = '⤢ Fullscreen'
  }
})

// ── Print ─────────────────────────────────────────────────
document.getElementById('print-btn').addEventListener('click', () => {
  const mapLabel  = activeMap  === 'all' ? 'All Maps' : activeMap.charAt(0).toUpperCase() + activeMap.slice(1)
  const sideLabel = activeSide === 'all' ? 'Both Sides' : activeSide === 't' ? 'T-Side' : 'CT-Side'
  document.getElementById('print-header').textContent = `${mapLabel} — ${sideLabel}`
  window.print()
})

// ── Antistrat Panel ───────────────────────────────────────
const AS_MAPS = ['ancient','mirage','nuke','anubis','inferno','overpass','dust2']
const AS_MAP_LABELS = { ancient:'Ancient', mirage:'Mirage', nuke:'Nuke', anubis:'Anubis', inferno:'Inferno', overpass:'Overpass', dust2:'Dust2' }
const AS_GP_LABELS = { pistols:'PISTOLS', style:'STYLE', antiecos:'ANTIECOS', forces:'FORCES', tendencies:'TENDENCIES', exploits:'EXPLOITS', solutions:'SOLUTIONS' }
const AS_GP_CLASSES = { pistols:'pistols-label', style:'style-label', antiecos:'antiecos-label', forces:'forces-label', tendencies:'tendencies-label', exploits:'exploits-label', solutions:'solutions-label' }

let panelOpponents = []
let panelAntistrat = {}
let panelMaps = []
let panelMapIdx = 0

;(async () => {
  const { data } = await supabase.from('opponents').select('id,name,antistrat').eq('team_id', getTeamId()).order('name')
  panelOpponents = data ?? []
  const sel = document.getElementById('as-opponent-select')
  sel.innerHTML = '<option value="">— Select opponent —</option>'
    + panelOpponents.map(o => `<option value="${o.id}">${esc(o.name)}</option>`).join('')
})()

function renderAsPanel(opp) {
  const content = document.getElementById('as-panel-content')
  const empty   = document.getElementById('as-panel-empty')
  const tabsEl  = document.getElementById('as-map-tabs')

  if (!opp?.antistrat || !Object.keys(opp.antistrat).length) {
    content.style.display = 'none'; empty.style.display = 'block'
    empty.textContent = 'No antistrat data for this opponent.'; return
  }
  panelAntistrat = opp.antistrat
  panelMaps = Object.keys(panelAntistrat).filter(m => AS_MAPS.includes(m))
  if (!panelMaps.length) {
    content.style.display = 'none'; empty.style.display = 'block'
    empty.textContent = 'No maps in antistrat.'; return
  }
  empty.style.display = 'none'; content.style.display = 'block'
  panelMapIdx = 0

  tabsEl.innerHTML = panelMaps.map((m, i) => `
    <button class="review-map-tab ${i === 0 ? 'active' : ''}" data-i="${i}" style="font-size:10px;padding:3px 8px">
      ${esc(AS_MAP_LABELS[m] ?? m)}
    </button>
  `).join('')
  tabsEl.querySelectorAll('.review-map-tab').forEach(btn => btn.addEventListener('click', () => {
    tabsEl.querySelectorAll('.review-map-tab').forEach(b => b.classList.remove('active'))
    btn.classList.add('active')
    panelMapIdx = +btn.dataset.i
    renderAsMap(panelMaps[panelMapIdx])
  }))
  renderAsMap(panelMaps[0])
}

function asBlock(d, prefix, title, subtitle, titleClass) {
  const pairs = [['pistols','style'],['antiecos','forces']]
  const singles = ['tendencies','exploits','solutions']
  const plan = d?.[`${prefix}_plan`] ?? {}
  const posSide = prefix === 'ct' ? 't' : 'ct'
  const positions = d?.[`${posSide}_positions`] ?? {}
  const lineupStr = Object.entries(positions)
    .filter(([,v]) => v).map(([pos,val]) => `<span><b>${esc(pos)}</b>: ${esc(val)}</span>`).join(' · ')
    || '<span style="opacity:0.4">—</span>'

  return `<div class="gameplan-sheet">
    <div class="gameplan-title ${titleClass}" style="font-size:10px;padding:6px 10px">${esc(title)} <span style="opacity:0.6;font-weight:400">— ${esc(subtitle)}</span></div>
    <div style="padding:4px 10px 6px;font-size:10px">
      <div style="font-size:8px;font-weight:700;letter-spacing:1px;opacity:0.5;margin-bottom:3px">LINEUP</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px">${lineupStr}</div>
    </div>
    ${pairs.map(([a,b]) => `
      <div class="gameplan-split">
        <div class="gameplan-block">
          <div class="gameplan-section-label ${AS_GP_CLASSES[a]}" style="font-size:8px;padding:3px 8px">${AS_GP_LABELS[a]}</div>
          <div style="padding:4px 8px;font-size:10px;white-space:pre-wrap;word-break:break-word;min-height:20px">${esc(plan[a] ?? '') || '<span style="opacity:0.3">—</span>'}</div>
        </div>
        <div class="gameplan-block">
          <div class="gameplan-section-label ${AS_GP_CLASSES[b]}" style="font-size:8px;padding:3px 8px">${AS_GP_LABELS[b]}</div>
          <div style="padding:4px 8px;font-size:10px;white-space:pre-wrap;word-break:break-word;min-height:20px">${esc(plan[b] ?? '') || '<span style="opacity:0.3">—</span>'}</div>
        </div>
      </div>`).join('')}
    ${singles.map(f => `
      <div class="gameplan-section-label ${AS_GP_CLASSES[f]}" style="font-size:8px;padding:3px 8px">${AS_GP_LABELS[f]}</div>
      <div style="padding:4px 8px;font-size:10px;white-space:pre-wrap;word-break:break-word;min-height:20px">${esc(plan[f] ?? '') || '<span style="opacity:0.3">—</span>'}</div>`).join('')}
  </div>`
}

function renderAsMap(map) {
  const d = panelAntistrat[map]
  const el = document.getElementById('as-panel-content')
  if (!d) { el.innerHTML = '<div style="color:var(--muted);font-size:11px">No data for this map.</div>'; return }
  el.innerHTML = asBlock(d, 'ct', 'CT GAMEPLAN', 'vs their T side', 'ct-title')
               + asBlock(d, 't',  'T GAMEPLAN',  'vs their CT side', 't-title')
}

document.getElementById('as-opponent-select').addEventListener('change', e => {
  const opp = panelOpponents.find(o => o.id === e.target.value)
  if (!opp) {
    document.getElementById('as-panel-content').style.display = 'none'
    document.getElementById('as-panel-empty').style.display = 'block'
    document.getElementById('as-panel-empty').textContent = 'Select an opponent to view their antistrat.'
    document.getElementById('as-map-tabs').innerHTML = ''
    return
  }
  renderAsPanel(opp)
})
</script>
</body>
</html>
