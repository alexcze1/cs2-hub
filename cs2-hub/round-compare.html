<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="apple-touch-icon" href="images/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Round Compare — MIDROUND</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main-content">
    <div class="page-header">
      <div>
        <div class="page-kicker">Review</div>
        <div class="page-title">Round Compare</div>
        <div class="page-sub">Pick two demos to put side-by-side. Open each demo viewer in a tab to drill in.</div>
      </div>
    </div>

    <div class="rc-pickers">
      <div class="rc-picker">
        <label class="form-label">Demo A</label>
        <select id="rc-pick-a" class="form-select"><option value="">Pick a demo…</option></select>
      </div>
      <div class="rc-picker">
        <label class="form-label">Demo B</label>
        <select id="rc-pick-b" class="form-select"><option value="">Pick a demo…</option></select>
      </div>
    </div>

    <div class="rc-grid">
      <div class="rc-pane" id="rc-pane-a"><div class="rc-empty">Pick a demo on the left.</div></div>
      <div class="rc-pane" id="rc-pane-b"><div class="rc-empty">Pick a demo on the right.</div></div>
    </div>
  </main>
</div>
<script type="module" src="round-compare.js"></script>
</body>
</html>
