<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Roster — CS2 Hub</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main-content">
    <div class="page-header">
      <div>
        <div class="page-title">ROSTER</div>
        <div class="page-subtitle" id="roster-sub">Team players and staff</div>
      </div>
      <button class="btn btn-primary" id="add-player-btn">+ Add Player</button>
    </div>

    <div class="modal-backdrop" id="modal" style="display:none">
      <div class="modal" style="max-width:440px;width:100%">
        <div class="modal-header">
          <div class="modal-title" id="modal-title">Add Player</div>
          <button class="modal-close" id="modal-close">×</button>
        </div>
        <div class="form-group">
          <label class="form-label">Display Name</label>
          <input class="form-input" id="f-username" placeholder="e.g. Alex"/>
        </div>
        <div class="form-group">
          <label class="form-label">Ingame Nickname</label>
          <input class="form-input" id="f-nickname" placeholder="e.g. fl0m"/>
        </div>
        <div class="form-group">
          <label class="form-label">Role</label>
          <select class="form-select" id="f-role">
            <option value="">None</option>
            <option value="IGL">IGL</option>
            <option value="AWPer">AWPer</option>
            <option value="Entry">Entry</option>
            <option value="Support">Support</option>
            <option value="Lurker">Lurker</option>
            <option value="Coach">Coach</option>
            <option value="Manager">Manager</option>
          </select>
        </div>
        <div class="error-msg" id="modal-error" style="display:none"></div>
        <div class="modal-actions">
          <button class="btn btn-danger btn-sm" id="delete-player-btn" style="display:none;margin-right:auto">Remove</button>
          <button class="btn btn-ghost" id="cancel-btn">Cancel</button>
          <button class="btn btn-primary" id="save-player-btn">Save</button>
        </div>
      </div>
    </div>

    <div class="roster-grid" id="roster-grid"></div>
  </main>
</div>
<script type="module" src="roster.js"></script>
</body>
</html>
