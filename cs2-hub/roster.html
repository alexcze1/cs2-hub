<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="apple-touch-icon" href="images/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Roster — MIDROUND</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main-content">

    <section id="roster-hero" class="dx-hero"><div class="dx-hero-loading">Loading roster…</div></section>

    <!-- Inline add-player form (owner-only, hidden by default) -->
    <div id="ghost-form" class="rstr-addform" style="display:none">
      <div class="rstr-addform-head">
        <div class="rstr-addform-title">Add player</div>
        <div class="rstr-addform-sub">Create a stat-tracked roster slot. Steam ID links their demo performance.</div>
      </div>
      <div class="rstr-addform-grid">
        <div class="form-group">
          <label class="form-label">Nickname</label>
          <input class="form-input" id="g-nickname" placeholder="e.g. fl0m" autocomplete="off"/>
        </div>
        <div class="form-group">
          <label class="form-label">Steam64 ID</label>
          <input class="form-input" id="g-steam-id" placeholder="76561198…" autocomplete="off"/>
        </div>
        <div class="form-group">
          <label class="form-label">Role</label>
          <select class="form-select" id="g-role">
            <option value="Unassigned">Unassigned</option>
            <option value="IGL">IGL</option>
            <option value="AWPer">AWPer</option>
            <option value="Entry">Entry</option>
            <option value="Support">Support</option>
            <option value="Lurker">Lurker</option>
            <option value="Coach">Coach</option>
            <option value="Manager">Manager</option>
            <option value="Bench">Bench</option>
          </select>
        </div>
      </div>
      <div class="error-msg" id="ghost-error" style="display:none"></div>
      <div class="rstr-addform-actions">
        <button class="btn btn-ghost" id="ghost-cancel-btn">Cancel</button>
        <button class="btn btn-primary" id="ghost-save-btn">Add player</button>
      </div>
    </div>

    <div class="rstr-grid" id="roster-grid"></div>
  </main>
</div>
<script type="module" src="roster.js"></script>
</body>
</html>
