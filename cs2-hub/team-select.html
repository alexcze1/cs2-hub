<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Select Team — MIDROUND</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)">
  <div style="width:100%;max-width:420px;padding:24px">
    <img src="images/logo-lettering.png" alt="MIDROUND" style="width:160px;filter:invert(1);margin-bottom:16px;display:block"/>
    <div style="color:var(--muted);font-size:13px;margin-bottom:28px">Select or create a team to continue</div>

    <div id="teams-list" style="margin-bottom:24px"></div>

    <div style="border-top:1px solid var(--border);padding-top:20px;margin-bottom:20px">
      <div style="font-size:11px;font-weight:700;letter-spacing:1.5px;margin-bottom:12px;color:var(--muted)">JOIN WITH CODE</div>
      <div style="display:flex;gap:8px">
        <input class="form-input" id="f-join-code" placeholder="Enter 6-letter code" style="text-transform:uppercase;letter-spacing:2px;font-weight:700"/>
        <button class="btn btn-primary" id="join-btn" style="white-space:nowrap">Join</button>
      </div>
      <div class="form-group" style="margin-top:10px">
        <input class="form-input" id="f-join-display" placeholder="Your display name (e.g. Alex)"/>
      </div>
      <div class="form-group">
        <input class="form-input" id="f-join-nickname" placeholder="Your ingame nickname (e.g. fl0m)"/>
      </div>
      <div class="error-msg" id="join-error" style="display:none"></div>
    </div>

    <div style="border-top:1px solid var(--border);padding-top:20px">
      <div style="font-size:11px;font-weight:700;letter-spacing:1.5px;margin-bottom:12px;color:var(--muted)">CREATE NEW TEAM</div>
      <div class="form-group">
        <input class="form-input" id="f-team-name" placeholder="Team name"/>
      </div>
      <div class="form-group">
        <input class="form-input" id="f-display-name" placeholder="Your display name (e.g. Alex)"/>
      </div>
      <div class="form-group">
        <input class="form-input" id="f-nickname" placeholder="Your ingame nickname (e.g. fl0m)"/>
      </div>
      <div class="error-msg" id="create-error" style="display:none"></div>
      <button class="btn btn-primary" id="create-btn" style="width:100%">Create Team</button>
    </div>

    <button class="btn btn-ghost" id="signout-btn" style="width:100%;margin-top:12px">Sign Out</button>
  </div>
  <script type="module" src="team-select.js"></script>
</body>
</html>
