<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="images/logo-icon.png">
  <link rel="apple-touch-icon" href="images/logo-icon.png">
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Select Team — MIDROUND</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .ts-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
      background-color: var(--bg);
      background-image:
        linear-gradient(rgba(59,130,246,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.035) 1px, transparent 1px);
      background-size: 44px 44px;
    }

    .ts-wrap {
      width: 100%;
      max-width: 460px;
      animation: ts-enter 0.35s ease both;
    }

    @keyframes ts-enter {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .ts-brand {
      text-align: center;
      margin-bottom: 44px;
    }
    .ts-logo {
      width: 148px;
      filter: invert(1);
      display: block;
      margin: 0 auto 14px;
      opacity: 0.92;
    }
    .ts-tagline {
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
    }

    .ts-section-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      opacity: 0.55;
    }

    .ts-team-card {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 14px;
      text-align: left;
      font-family: inherit;
      color: inherit;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
      overflow: hidden;
    }
    .ts-team-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.15s;
    }
    .ts-team-card:hover {
      border-color: var(--accent);
      background: rgba(59,130,246,0.06);
    }
    .ts-team-card:hover::before { opacity: 1; }

    .ts-team-avatar {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: rgba(59,130,246,0.14);
      border: 1px solid rgba(59,130,246,0.28);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      font-weight: 800;
      color: var(--accent);
      flex-shrink: 0;
      text-transform: uppercase;
    }

    .ts-team-info { flex: 1; min-width: 0; }
    .ts-team-name {
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ts-team-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 3px;
    }
    .ts-team-role { color: var(--muted); font-size: 12px; }
    .ts-team-code {
      font-family: monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--accent);
      background: rgba(59,130,246,0.12);
      padding: 1px 7px;
      border-radius: 4px;
    }

    .ts-enter-arrow {
      color: var(--border);
      font-size: 16px;
      flex-shrink: 0;
      transition: color 0.15s, transform 0.15s;
    }
    .ts-team-card:hover .ts-enter-arrow {
      color: var(--accent);
      transform: translateX(3px);
    }

    .ts-empty {
      color: var(--muted);
      font-size: 13px;
      padding: 12px 0 4px;
    }

    .ts-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 28px 0;
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      opacity: 0.5;
    }
    .ts-divider::before,
    .ts-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .ts-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 20px;
    }
    .ts-tab {
      padding: 9px;
      border-radius: 7px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      background: none;
      border: none;
      color: var(--muted);
      font-family: inherit;
      transition: all 0.15s;
    }
    .ts-tab.active { background: var(--accent); color: #fff; }

    .ts-panel { display: none; }
    .ts-panel.active { display: block; }

    .ts-footer { text-align: center; margin-top: 24px; }
    .ts-signout {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.12s;
      letter-spacing: 0.5px;
      opacity: 0.6;
    }
    .ts-signout:hover { color: var(--text); opacity: 1; }
  </style>
</head>
<body>
  <div class="ts-page">
    <div class="ts-wrap">

      <div class="ts-brand">
        <img src="images/logo-lettering.png" alt="MIDROUND" class="ts-logo"/>
        <div class="ts-tagline">Team Hub</div>
      </div>

      <div id="teams-section" style="display:none">
        <div class="ts-section-label">Your Teams</div>
        <div id="teams-list"></div>
        <div class="ts-divider">or</div>
      </div>

      <div id="no-teams-divider" style="display:none">
        <div class="ts-divider">get started</div>
      </div>

      <div class="ts-tabs">
        <button class="ts-tab active" id="tab-join">Join Team</button>
        <button class="ts-tab" id="tab-create">Create Team</button>
      </div>

      <div class="ts-panel active" id="panel-join">
        <div class="form-group">
          <label class="form-label">Join Code</label>
          <input class="form-input" id="f-join-code" placeholder="ABC123"
            style="text-transform:uppercase;letter-spacing:4px;font-weight:700;font-size:18px;text-align:center"/>
        </div>
        <div class="form-row">
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">Display Name</label>
            <input class="form-input" id="f-join-display" placeholder="Alex"/>
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">Ingame Nick</label>
            <input class="form-input" id="f-join-nickname" placeholder="fl0m"/>
          </div>
        </div>
        <div class="error-msg" id="join-error" style="display:none;margin-top:10px"></div>
        <button class="btn btn-primary" id="join-btn" style="width:100%;margin-top:16px">Join Team</button>
      </div>

      <div class="ts-panel" id="panel-create">
        <div class="form-group">
          <label class="form-label">Team Name</label>
          <input class="form-input" id="f-team-name" placeholder="e.g. Phantom5"/>
        </div>
        <div class="form-row">
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">Display Name</label>
            <input class="form-input" id="f-display-name" placeholder="Alex"/>
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">Ingame Nick</label>
            <input class="form-input" id="f-nickname" placeholder="fl0m"/>
          </div>
        </div>
        <div class="error-msg" id="create-error" style="display:none;margin-top:10px"></div>
        <button class="btn btn-primary" id="create-btn" style="width:100%;margin-top:16px">Create Team</button>
      </div>

      <div class="ts-footer">
        <button class="ts-signout" id="signout-btn">Sign out</button>
      </div>
    </div>
  </div>

  <script>
    const tabJoin   = document.getElementById('tab-join');
    const tabCreate = document.getElementById('tab-create');
    const panelJoin = document.getElementById('panel-join');
    const panelCreate = document.getElementById('panel-create');

    tabJoin.addEventListener('click', () => {
      tabJoin.classList.add('active');    tabCreate.classList.remove('active');
      panelJoin.classList.add('active');  panelCreate.classList.remove('active');
    });
    tabCreate.addEventListener('click', () => {
      tabCreate.classList.add('active');  tabJoin.classList.remove('active');
      panelCreate.classList.add('active'); panelJoin.classList.remove('active');
    });
  </script>
  <script type="module" src="team-select.js"></script>
</body>
</html>
