<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="apple-touch-icon" href="images/favicon.png">
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Select Team — MIDROUND</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .ts-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
      background-color: var(--bg);
      background-image:
        radial-gradient(800px 500px at 50% 0%, rgba(139,109,255,0.10), transparent 60%),
        radial-gradient(600px 400px at 50% 100%, rgba(58,160,255,0.06), transparent 60%),
        linear-gradient(rgba(139,109,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(139,109,255,0.04) 1px, transparent 1px);
      background-size: auto, auto, 44px 44px, 44px 44px;
      position: relative;
      overflow: hidden;
    }
    .ts-page::before {
      content: '';
      position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      opacity: 0.025;
      pointer-events: none;
    }

    .ts-wrap {
      width: 100%;
      max-width: 480px;
      animation: ts-enter 0.5s var(--ease) both;
      position: relative;
      z-index: 1;
    }

    @keyframes ts-enter {
      from { opacity: 0; transform: translateY(14px) scale(0.985); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .ts-brand {
      text-align: center;
      margin-bottom: 44px;
    }
    .ts-logo {
      width: 148px;
      display: block;
      margin: 0 auto 14px;
      opacity: 0.95;
    }
    .ts-tagline {
      font-family: var(--display-font);
      font-size: 10px;
      letter-spacing: 0.36em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
    }

    .ts-section-label {
      font-family: var(--display-font);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      opacity: 0.7;
    }

    .ts-team-card {
      width: 100%;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: var(--r-md);
      padding: 14px 16px;
      margin-bottom: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 14px;
      text-align: left;
      font-family: inherit;
      color: inherit;
      transition:
        border-color var(--dur-2) var(--ease),
        background var(--dur-2) var(--ease),
        transform var(--dur-2) var(--ease),
        box-shadow var(--dur-2) var(--ease);
      position: relative;
      overflow: hidden;
    }
    .ts-team-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
      transform: scaleY(0);
      transform-origin: center;
      transition: transform var(--dur-2) var(--ease);
    }
    .ts-team-card:hover {
      border-color: rgba(139,109,255,0.30);
      background: rgba(139,109,255,0.05);
      transform: translateY(-1px);
      box-shadow: 0 8px 22px rgba(0,0,0,0.35), 0 0 18px rgba(139,109,255,0.08);
    }
    .ts-team-card:hover::before { transform: scaleY(1); }

    .ts-team-avatar {
      width: 42px;
      height: 42px;
      border-radius: var(--r-md);
      background: linear-gradient(135deg, rgba(139,109,255,0.20), rgba(139,109,255,0.06));
      border: 1px solid rgba(139,109,255,0.30);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--display-font);
      font-size: 17px;
      font-weight: 800;
      color: var(--accent);
      flex-shrink: 0;
      text-transform: uppercase;
    }

    .ts-team-info { flex: 1; min-width: 0; }
    .ts-team-name {
      font-family: var(--display-font);
      font-weight: 700;
      font-size: 15px;
      letter-spacing: -0.005em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ts-team-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }
    .ts-team-role { color: var(--muted); font-size: 12px; }
    .ts-team-code {
      font-family: monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--accent);
      background: rgba(139,109,255,0.12);
      padding: 1px 7px;
      border-radius: var(--r-sm);
    }

    .ts-enter-arrow {
      color: var(--border-solid);
      font-size: 16px;
      flex-shrink: 0;
      transition: color var(--dur-2) var(--ease), transform var(--dur-2) var(--ease);
    }
    .ts-team-card:hover .ts-enter-arrow {
      color: var(--accent);
      transform: translateX(4px);
    }

    .ts-empty {
      color: var(--muted);
      font-size: 13px;
      padding: 12px 0 4px;
    }

    .ts-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 28px 0;
      color: var(--muted);
      font-family: var(--display-font);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      opacity: 0.5;
    }
    .ts-divider::before,
    .ts-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-solid);
    }

    .ts-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: var(--r-md);
      padding: 4px;
      margin-bottom: 22px;
    }
    .ts-tab {
      padding: 10px;
      border-radius: var(--r-sm);
      font-family: var(--display-font);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      background: none;
      border: none;
      color: var(--muted);
      transition:
        background var(--dur-2) var(--ease),
        color var(--dur-2) var(--ease);
    }
    .ts-tab:hover { color: var(--text); }
    .ts-tab.active {
      background: var(--accent);
      color: var(--accent-on);
      box-shadow: 0 0 16px rgba(139,109,255,0.25);
    }

    .ts-panel { display: none; }
    .ts-panel.active { display: block; animation: ts-panel-fade 220ms var(--ease) both; }
    @keyframes ts-panel-fade {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .ts-footer { text-align: center; margin-top: 28px; }
    .ts-signout {
      background: none;
      border: none;
      color: var(--muted);
      font-family: var(--display-font);
      font-size: 11px;
      cursor: pointer;
      transition: color var(--dur-1) var(--ease);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      opacity: 0.6;
    }
    .ts-signout:hover { color: var(--text); opacity: 1; }
  </style>
</head>
<body>
  <div class="ts-page">
    <div class="ts-wrap">

      <div class="ts-brand">
        <img src="images/logo-lettering.png" alt="MIDROUND" class="ts-logo"/>
        <div class="ts-tagline">Team Hub</div>
      </div>

      <div id="teams-section" style="display:none">
        <div class="ts-section-label">Your Teams</div>
        <div id="teams-list"></div>
        <div class="ts-divider">or</div>
      </div>

      <div id="no-teams-divider" style="display:none">
        <div class="ts-divider">get started</div>
      </div>

      <div class="ts-tabs">
        <button class="ts-tab active" id="tab-join">Join Team</button>
        <button class="ts-tab" id="tab-create">Create Team</button>
      </div>

      <div class="ts-panel active" id="panel-join">
        <div class="form-group">
          <label class="form-label">Join Code</label>
          <input class="form-input" id="f-join-code" placeholder="ABC123"
            style="text-transform:uppercase;letter-spacing:4px;font-weight:700;font-size:18px;text-align:center"/>
        </div>
        <div class="form-group">
          <label class="form-label">Ingame Nick</label>
          <input class="form-input" id="f-join-nickname" placeholder="fl0m"/>
        </div>
        <div class="error-msg" id="join-error" style="display:none;margin-top:10px"></div>
        <button class="btn btn-primary" id="join-btn" style="width:100%;margin-top:16px">Join Team</button>
      </div>

      <div class="ts-panel" id="panel-create">
        <div class="form-group">
          <label class="form-label">Team Name</label>
          <input class="form-input" id="f-team-name" placeholder="e.g. Phantom5"/>
        </div>
        <div class="form-group">
          <label class="form-label">Ingame Nick</label>
          <input class="form-input" id="f-nickname" placeholder="fl0m"/>
        </div>
        <div class="error-msg" id="create-error" style="display:none;margin-top:10px"></div>
        <button class="btn btn-primary" id="create-btn" style="width:100%;margin-top:16px">Create Team</button>
      </div>

      <div class="ts-footer">
        <button class="ts-signout" id="signout-btn">Sign out</button>
      </div>
    </div>
  </div>

  <script>
    const tabJoin   = document.getElementById('tab-join');
    const tabCreate = document.getElementById('tab-create');
    const panelJoin = document.getElementById('panel-join');
    const panelCreate = document.getElementById('panel-create');

    tabJoin.addEventListener('click', () => {
      tabJoin.classList.add('active');    tabCreate.classList.remove('active');
      panelJoin.classList.add('active');  panelCreate.classList.remove('active');
    });
    tabCreate.addEventListener('click', () => {
      tabCreate.classList.add('active');  tabJoin.classList.remove('active');
      panelCreate.classList.add('active'); panelJoin.classList.remove('active');
    });
  </script>
  <script type="module" src="team-select.js"></script>
</body>
</html>
