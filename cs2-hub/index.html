<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MIDROUND — Login</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <img src="images/logo-lettering.png" alt="MIDROUND" style="width:180px;filter:invert(1);margin-bottom:12px;display:block;margin-left:auto;margin-right:auto"/>
    <div class="login-tagline">Team access only</div>

    <div class="form-group">
      <label class="form-label" for="email">Email</label>
      <input class="form-input" type="email" id="email" placeholder="player@team.gg" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <div id="error-msg" class="error-msg" style="display:none"></div>
    <button class="btn btn-primary" style="width:100%;margin-top:8px" id="login-btn">Sign In</button>
  </div>
</div>
<script type="module">
  import { signIn } from './auth.js'
  import { supabase } from './supabase.js'

  // Redirect if already logged in
  const { data: { session } } = await supabase.auth.getSession()
  if (session) {
    window.location.href = 'dashboard.html'
  } else {
    const btn = document.getElementById('login-btn')
    const errEl = document.getElementById('error-msg')

    btn.addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value
      errEl.style.display = 'none'
      btn.textContent = 'Signing in…'
      btn.disabled = true
      try {
        await signIn(email, password)
        window.location.href = 'dashboard.html'
      } catch (e) {
        errEl.textContent = e.message || 'Invalid email or password'
        errEl.style.display = 'block'
        btn.textContent = 'Sign In'
        btn.disabled = false
      }
    })

    // Allow Enter key
    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') btn.click()
    })
  }
</script>
</body>
</html>
