<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Opponent — CS2 Hub</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main-content">
    <div class="page-header">
      <div>
        <a href="opponents.html" style="color:var(--muted);font-size:13px;text-decoration:none">← Opponents</a>
        <div class="page-title" id="page-title" style="margin-top:6px">New Opponent</div>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-danger" id="delete-btn" style="display:none">Delete</button>
        <button class="btn btn-primary" id="save-btn">Save</button>
      </div>
    </div>

    <div style="max-width:820px">
      <div class="info-panel">
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">Team Name</label>
          <input class="form-input" id="f-name" placeholder="e.g. Natus Vincere"/>
        </div>
      </div>

      <div class="section-label" style="margin-top:24px">Maps</div>
      <div class="map-selector" id="map-selector"></div>

      <div id="antistrat-section" style="display:none;margin-top:28px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
          <div class="section-label" style="margin:0">Antistrat</div>
        </div>
        <div class="review-map-tabs" id="antistrat-map-tabs"></div>
        <div class="review-panel" id="positions-panel"></div>
        <div id="gameplan-panels"></div>
      </div>

      <div id="save-error" class="error-msg" style="display:none;margin-top:16px"></div>
    </div>
  </main>
</div>
<script type="module" src="opponent-detail.js"></script>
</body>
</html>
