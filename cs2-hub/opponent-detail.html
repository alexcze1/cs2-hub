<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Opponent — CS2 Hub</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main-content">
    <div class="page-header">
      <div>
        <a href="opponents.html" style="color:var(--muted);font-size:13px;text-decoration:none">← Opponents</a>
        <div class="page-title" id="page-title" style="margin-top:6px">New Opponent</div>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-danger" id="delete-btn" style="display:none">Delete</button>
        <button class="btn btn-primary" id="save-btn">Save</button>
      </div>
    </div>

    <div style="max-width:780px">
      <div class="form-group">
        <label class="form-label">Team Name</label>
        <input class="form-input" id="f-name" placeholder="e.g. Natus Vincere"/>
      </div>
      <div class="form-group">
        <label class="form-label">Favored Maps (comma-separated)</label>
        <input class="form-input" id="f-maps" placeholder="e.g. Mirage, Inferno"/>
      </div>

      <!-- CT Gameplan Sheet -->
      <div class="gameplan-sheet" style="margin-top:28px">
        <div class="gameplan-title ct-title">CT GAMEPLAN <span style="font-weight:400;opacity:0.7">— vs their T side</span></div>
        <div class="gameplan-split">
          <div class="gameplan-block">
            <div class="gameplan-section-label pistols-label">PISTOLS</div>
            <textarea class="form-textarea gameplan-textarea" id="ct-pistols" placeholder="How they play pistol on T side…"></textarea>
          </div>
          <div class="gameplan-block">
            <div class="gameplan-section-label style-label">STYLE</div>
            <textarea class="form-textarea gameplan-textarea" id="ct-style" placeholder="AWP player positioning, special roles…"></textarea>
          </div>
        </div>
        <div class="gameplan-split">
          <div class="gameplan-block">
            <div class="gameplan-section-label antiecos-label">ANTIECOS</div>
            <textarea class="form-textarea gameplan-textarea" id="ct-antiecos" placeholder="How they play anti-eco rounds…"></textarea>
          </div>
          <div class="gameplan-block">
            <div class="gameplan-section-label forces-label">FORCES</div>
            <textarea class="form-textarea gameplan-textarea" id="ct-forces" placeholder="How they force buy…"></textarea>
          </div>
        </div>
        <div class="gameplan-section-label tendencies-label">TENDENCIES AND TELLS</div>
        <textarea class="form-textarea gameplan-textarea" id="ct-tendencies" placeholder="Recurring patterns, giveaways, habits…" style="min-height:80px"></textarea>
        <div class="gameplan-section-label exploits-label">EXPLOITS</div>
        <textarea class="form-textarea gameplan-textarea" id="ct-exploits" placeholder="Gaps and weaknesses we can abuse…" style="min-height:80px"></textarea>
        <div class="gameplan-section-label solutions-label">SOLUTIONS</div>
        <textarea class="form-textarea gameplan-textarea" id="ct-solutions" placeholder="Our adjustments and counters…" style="min-height:80px"></textarea>
      </div>

      <!-- T Gameplan Sheet -->
      <div class="gameplan-sheet" style="margin-top:28px">
        <div class="gameplan-title t-title">T GAMEPLAN <span style="font-weight:400;opacity:0.7">— vs their CT side</span></div>
        <div class="gameplan-split">
          <div class="gameplan-block">
            <div class="gameplan-section-label pistols-label">PISTOLS</div>
            <textarea class="form-textarea gameplan-textarea" id="t-pistols" placeholder="How they play pistol on CT side…"></textarea>
          </div>
          <div class="gameplan-block">
            <div class="gameplan-section-label style-label">STYLE</div>
            <textarea class="form-textarea gameplan-textarea" id="t-style" placeholder="AWP setup, anchor positions…"></textarea>
          </div>
        </div>
        <div class="gameplan-split">
          <div class="gameplan-block">
            <div class="gameplan-section-label antiecos-label">ANTIECOS</div>
            <textarea class="form-textarea gameplan-textarea" id="t-antiecos" placeholder="Their anti-eco approach…"></textarea>
          </div>
          <div class="gameplan-block">
            <div class="gameplan-section-label forces-label">FORCES</div>
            <textarea class="form-textarea gameplan-textarea" id="t-forces" placeholder="Their force buy patterns…"></textarea>
          </div>
        </div>
        <div class="gameplan-section-label tendencies-label">TENDENCIES AND TELLS</div>
        <textarea class="form-textarea gameplan-textarea" id="t-tendencies" placeholder="Recurring patterns, giveaways, habits…" style="min-height:80px"></textarea>
        <div class="gameplan-section-label exploits-label">EXPLOITS</div>
        <textarea class="form-textarea gameplan-textarea" id="t-exploits" placeholder="Gaps and weaknesses we can abuse…" style="min-height:80px"></textarea>
        <div class="gameplan-section-label solutions-label">SOLUTIONS</div>
        <textarea class="form-textarea gameplan-textarea" id="t-solutions" placeholder="Our adjustments and counters…" style="min-height:80px"></textarea>
      </div>

      <div id="save-error" class="error-msg" style="display:none;margin-top:16px"></div>
    </div>
  </main>
</div>
<script type="module" src="opponent-detail.js"></script>
</body>
</html>
