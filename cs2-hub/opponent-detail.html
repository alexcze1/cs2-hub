<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="apple-touch-icon" href="images/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Anti-Strat — MIDROUND</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* ── Auto-fetched HLTV overview ─────────────────────────── */
    .opp-overview-status {
      font-size: 11px; color: var(--muted); letter-spacing: 0.06em;
      text-transform: uppercase; font-weight: 600;
    }
    .opp-overview-grid {
      display: grid; gap: 16px;
      grid-template-columns: minmax(0, 1.1fr) minmax(0, 1.4fr);
      grid-template-areas: "summary roster" "matches matches";
    }
    @media (max-width: 1000px) {
      .opp-overview-grid { grid-template-columns: 1fr; grid-template-areas: "summary" "roster" "matches"; }
    }
    .opp-summary-card  { grid-area: summary; }
    .opp-roster-card   { grid-area: roster; }
    .opp-matches-card  { grid-area: matches; }
    .opp-overview-card {
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      border-radius: var(--r-lg); padding: 16px; box-shadow: var(--shadow-card);
    }
    .opp-card-title {
      font-family: var(--display-font); font-size: 11px; font-weight: 700;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--text-variant); margin-bottom: 12px;
    }
    .opp-card-empty { color: var(--muted); font-size: 13px; padding: 8px 0; }

    /* Summary card */
    .opp-summary-row { display: flex; gap: 28px; align-items: baseline; margin-bottom: 14px; }
    .opp-summary-stat { display: flex; flex-direction: column; gap: 4px; }
    .opp-summary-num  {
      font-family: var(--display-font); font-size: 32px; font-weight: 700;
      color: var(--text); letter-spacing: -0.02em; line-height: 1;
    }
    .opp-summary-sep  { opacity: 0.4; margin: 0 6px; font-weight: 400; }
    .opp-summary-label { font-size: 11px; color: var(--muted);
      letter-spacing: 0.06em; text-transform: uppercase; font-weight: 600; }
    .opp-map-pool { display: flex; flex-direction: column; gap: 6px; }
    .opp-map-row {
      display: grid; grid-template-columns: 22px 1fr auto 80px;
      gap: 10px; align-items: center; font-size: 13px;
    }
    .opp-map-badge {
      width: 22px; height: 22px; border-radius: 4px; overflow: hidden;
      background: var(--surface); display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .opp-map-badge.sm { width: 18px; height: 18px; border-radius: 3px; }
    .opp-map-badge img { width: 100%; height: 100%; object-fit: cover; }
    .opp-map-name { color: var(--text); font-weight: 500; }
    .opp-map-record { color: var(--text-variant); font-variant-numeric: tabular-nums; font-size: 12px; }
    .opp-map-bar {
      height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden;
    }
    .opp-map-bar > div { height: 100%; background: var(--accent); border-radius: 2px; transition: width .3s; }

    /* Roster card */
    .opp-roster-table {
      width: 100%; border-collapse: collapse; font-size: 13px;
      font-variant-numeric: tabular-nums;
    }
    .opp-roster-table th {
      font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted); font-weight: 600; padding: 6px 8px;
      border-bottom: 1px solid var(--border); text-align: right;
    }
    .opp-roster-table th:first-child { text-align: left; }
    .opp-roster-table td {
      padding: 8px; color: var(--text); border-bottom: 1px solid var(--hairline);
      text-align: right;
    }
    .opp-roster-table td:first-child { text-align: left; }
    .opp-roster-table tbody tr:hover { background: rgba(255,255,255,0.02); }
    .opp-player-name { font-weight: 600; }

    /* Matches card */
    .opp-match-list { display: flex; flex-direction: column; gap: 4px; }
    .opp-match-row {
      display: grid;
      grid-template-columns: 110px 130px 1fr 100px 28px;
      gap: 14px; align-items: center;
      padding: 10px 12px; border-radius: var(--r-md);
      text-decoration: none; color: var(--text); font-size: 13px;
      border: 1px solid var(--hairline); background: rgba(255,255,255,0.015);
      transition: background var(--dur-2) var(--ease), border-color var(--dur-2) var(--ease);
    }
    .opp-match-row:hover { background: rgba(255,255,255,0.04); border-color: var(--border-solid); }
    .opp-match-date { color: var(--text-variant); font-size: 12px; }
    .opp-match-map  { display: flex; align-items: center; gap: 8px; color: var(--text); }
    .opp-match-vs   { color: var(--text-variant); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .opp-match-vs strong { color: var(--text); font-weight: 600; }
    .opp-match-score { text-align: center; font-variant-numeric: tabular-nums; font-weight: 600; }
    .opp-match-score-sep { opacity: 0.4; margin: 0 4px; font-weight: 400; }
    .opp-match-tag {
      width: 24px; height: 24px; border-radius: 50%; display: flex;
      align-items: center; justify-content: center; font-size: 11px; font-weight: 700;
    }
    .opp-match-win  .opp-match-tag { background: rgba(0,255,156,0.18); color: var(--success); }
    .opp-match-win  .opp-match-score-us { color: var(--success); }
    .opp-match-loss .opp-match-tag { background: rgba(255,77,77,0.18);  color: var(--danger); }
    .opp-match-loss .opp-match-score-them { color: var(--danger); }
    .opp-match-draw .opp-match-tag { background: rgba(255,179,71,0.18); color: var(--warning); }
  </style>
</head>
<body>
<div class="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main-content">
    <div class="page-header">
      <div>
        <a href="opponents.html" class="breadcrumb">Opponents</a>
        <div class="page-title" id="page-title">New Opponent</div>
      </div>
      <div class="page-header-actions">
        <button class="btn btn-danger" id="delete-btn" style="display:none">Delete</button>
        <button class="btn btn-secondary" id="print-btn" onclick="window.printAntistrat()">Print</button>
        <button class="btn btn-primary" id="save-btn">Save</button>
      </div>
    </div>

    <div class="detail-container">
      <div class="info-panel">
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">Team Name</label>
          <div style="display:flex;align-items:center;gap:12px">
            <div id="opp-logo-wrap" style="flex-shrink:0"></div>
            <div style="flex:1">
              <input class="form-input" id="f-name" placeholder="e.g. Natus Vincere" autocomplete="off"/>
            </div>
          </div>
        </div>
      </div>

      <div class="section-label" style="margin-top:24px">Maps</div>
      <div class="map-selector" id="map-selector"></div>

      <div id="opp-overview-section" style="margin-top:28px">
        <div class="section-row-meta">
          <div class="section-label">Auto-fetched from HLTV demos</div>
          <span class="opp-overview-status" id="opp-overview-status"></span>
        </div>
        <div id="opp-overview-slot"></div>
      </div>

      <div id="antistrat-section" style="display:none;margin-top:28px">
        <div class="section-row-meta">
          <div class="section-label">Antistrat</div>
        </div>
        <div class="review-map-tabs" id="antistrat-map-tabs"></div>
        <div id="gameplan-panels"></div>
      </div>

      <div id="save-error" class="error-msg" style="display:none;margin-top:16px"></div>
    </div>
  </main>
</div>
<script type="module" src="opponent-detail.js"></script>
</body>
</html>
