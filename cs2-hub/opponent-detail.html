<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="apple-touch-icon" href="images/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Opponent — MIDROUND</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main-content">
    <div class="page-header">
      <div>
        <a href="opponents.html" class="breadcrumb">Opponents</a>
        <div class="page-title" id="page-title">New Opponent</div>
      </div>
      <div class="page-header-actions">
        <button class="btn btn-danger" id="delete-btn" style="display:none">Delete</button>
        <button class="btn btn-secondary" id="print-btn" onclick="window.printAntistrat()">Print</button>
        <button class="btn btn-primary" id="save-btn">Save</button>
      </div>
    </div>

    <div class="detail-container">
      <div class="info-panel">
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">Team Name</label>
          <div style="display:flex;align-items:center;gap:12px">
            <div id="opp-logo-wrap" style="flex-shrink:0"></div>
            <div style="flex:1">
              <input class="form-input" id="f-name" placeholder="e.g. Natus Vincere" autocomplete="off"/>
            </div>
          </div>
        </div>
      </div>

      <div class="section-label" style="margin-top:24px">Maps</div>
      <div class="map-selector" id="map-selector"></div>

      <div id="antistrat-section" style="display:none;margin-top:28px">
        <div class="section-row-meta">
          <div class="section-label">Antistrat</div>
        </div>
        <div class="review-map-tabs" id="antistrat-map-tabs"></div>
        <div id="gameplan-panels"></div>
      </div>

      <div id="antistrat-tasks-section" style="margin-top:28px;display:none">
        <div class="section-row-meta">
          <div class="section-label">Tasks</div>
          <button type="button" class="btn btn-ghost btn-sm" id="antistrat-task-add">+ Add task</button>
        </div>
        <div id="antistrat-tasks-list"></div>
      </div>

      <div id="counter-strat-section" style="margin-top:28px;display:none">
        <div class="section-row-meta">
          <div class="section-label">Recommended Strats</div>
          <a href="stratbook.html" class="section-link">Stratbook</a>
        </div>
        <div id="counter-strat-list"></div>
      </div>

      <div id="scratchpad-section" style="margin-top:28px">
        <div class="section-row-meta">
          <div class="section-label">Scratchpad</div>
          <div class="scratchpad-tools">
            <button type="button" class="scratchpad-tool" data-tool="pen" title="Pen">✎</button>
            <button type="button" class="scratchpad-tool" data-tool="eraser" title="Eraser">⌫</button>
            <input type="color" class="scratchpad-color" id="scratchpad-color" value="#8B6DFF" title="Pen colour">
            <input type="range" class="scratchpad-size" id="scratchpad-size" min="1" max="20" value="3" title="Pen size">
            <button type="button" class="btn btn-ghost btn-sm" id="scratchpad-clear">Clear</button>
            <button type="button" class="btn btn-primary btn-sm" id="scratchpad-save">Save</button>
          </div>
        </div>
        <canvas id="scratchpad-canvas" width="900" height="380" class="scratchpad-canvas"></canvas>
      </div>

      <div id="save-error" class="error-msg" style="display:none;margin-top:16px"></div>
    </div>
  </main>
</div>
<script type="module" src="opponent-detail.js"></script>
</body>
</html>
