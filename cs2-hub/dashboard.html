<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="apple-touch-icon" href="images/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — MIDROUND</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main-content">
    <div class="page-header dash-header">
      <div>
        <div class="page-title" id="page-greeting">Dashboard</div>
        <div class="page-sub" id="date-sub"></div>
      </div>
      <div class="page-header-actions">
        <button type="button" class="density-toggle" id="share-public-btn"
                aria-label="Share public team profile" title="Copy public profile link">
          <span class="density-toggle-label">Share</span>
          <span class="density-toggle-value">Profile</span>
        </button>
        <button type="button" class="density-toggle" id="density-toggle"
                aria-label="Toggle density" title="Toggle density">
          <span class="density-toggle-label">Density</span>
          <span class="density-toggle-value" id="density-toggle-value">Comfy</span>
        </button>
      </div>
    </div>

    <div class="today-strip" id="today-strip"></div>

    <div id="goal-slot"></div>

    <div id="hero-slot"><div class="skeleton skeleton-hero"></div></div>

    <div class="dash-two-col">
      <div class="dash-col">
        <div class="section-row">
          <div class="section-label">Map Pool Readiness</div>
          <a href="stratbook.html" class="section-link">Stratbook</a>
        </div>
        <div id="map-pool-slot">
          <div class="skeleton-list">
            <div class="skeleton skeleton-row-tall"></div>
            <div class="skeleton skeleton-row-tall"></div>
            <div class="skeleton skeleton-row-tall"></div>
            <div class="skeleton skeleton-row-tall"></div>
            <div class="skeleton skeleton-row-tall"></div>
            <div class="skeleton skeleton-row-tall"></div>
            <div class="skeleton skeleton-row-tall"></div>
          </div>
        </div>
      </div>
      <div class="dash-col">
        <div class="section-row">
          <div class="section-label">What needs attention</div>
          <span class="section-link" id="attention-since"></span>
        </div>
        <div id="attention-slot">
          <div class="skeleton-list">
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="section-row">
      <div class="section-label">Roster Heat · last 30 days</div>
      <a href="roster.html" class="section-link">Roster</a>
    </div>
    <div id="player-heat-slot">
      <div class="skeleton-strip">
        <div class="skeleton skeleton-card" style="height:158px"></div>
        <div class="skeleton skeleton-card" style="height:158px"></div>
        <div class="skeleton skeleton-card" style="height:158px"></div>
        <div class="skeleton skeleton-card" style="height:158px"></div>
        <div class="skeleton skeleton-card" style="height:158px"></div>
      </div>
    </div>

    <div class="section-row">
      <div class="section-label">Next 7 Days</div>
      <a href="schedule.html" class="section-link">View schedule</a>
    </div>
    <div id="timeline-slot">
      <div class="skeleton-strip" style="grid-template-columns:repeat(7, 1fr)">
        <div class="skeleton skeleton-card" style="height:84px"></div>
        <div class="skeleton skeleton-card" style="height:84px"></div>
        <div class="skeleton skeleton-card" style="height:84px"></div>
        <div class="skeleton skeleton-card" style="height:84px"></div>
        <div class="skeleton skeleton-card" style="height:84px"></div>
        <div class="skeleton skeleton-card" style="height:84px"></div>
        <div class="skeleton skeleton-card" style="height:84px"></div>
      </div>
    </div>

    <div id="insight-slot"></div>

    <div class="stats-grid">
      <div class="stat-card stat-card-special">
        <div class="stat-label">Strats Saved</div>
        <div class="stat-value" id="stat-strats">—</div>
        <div class="stat-sub" id="stat-strats-sub">Loading…</div>
      </div>
      <div class="stat-card stat-card-success">
        <div class="stat-label">Match Record</div>
        <div class="stat-value stat-value-sm" id="stat-vods">—</div>
        <div class="form-dots" id="stat-vods-form"></div>
      </div>
      <div class="stat-card stat-card-muted" id="stat-issues-card">
        <div class="stat-label">Open Issues</div>
        <div class="stat-value" id="stat-issues">—</div>
        <div class="stat-sub" id="stat-issues-sub">Loading…</div>
      </div>
    </div>

    <div class="section-row">
      <div class="section-label">Team Economy · last 30 days</div>
      <a href="analysis.html" class="section-link">Analysis</a>
    </div>
    <div id="team-economy-slot"></div>

    <div class="section-row">
      <div class="section-label">Recently Added Strats</div>
      <a href="stratbook.html" class="section-link">View all</a>
    </div>
    <div id="recent-strats">
      <div class="skeleton-list">
        <div class="skeleton skeleton-row-tall"></div>
        <div class="skeleton skeleton-row-tall"></div>
        <div class="skeleton skeleton-row-tall"></div>
        <div class="skeleton skeleton-row-tall"></div>
        <div class="skeleton skeleton-row-tall"></div>
      </div>
    </div>

    <div class="section-row">
      <div class="section-label">Activity</div>
      <span class="section-link" id="activity-since">last 14 days</span>
    </div>
    <div id="activity-slot"></div>
  </main>
</div>
<script type="module" src="dashboard.js"></script>
</body>
</html>
