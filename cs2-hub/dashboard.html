<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="images/logo-icon.png">
  <link rel="apple-touch-icon" href="images/logo-icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — MIDROUND</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main-content">
    <div class="page-header">
      <div>
        <div class="page-title" id="page-greeting">Dashboard</div>
        <div class="page-sub" id="date-sub"></div>
      </div>
    </div>

    <div class="stats-grid" style="grid-template-columns:repeat(4,1fr)">
      <div class="stat-card" style="border-top:3px solid var(--accent)">
        <div class="stat-label">Next Event</div>
        <div class="stat-value" id="stat-next-event" style="font-size:15px;margin-top:4px">—</div>
        <div class="stat-sub" id="stat-next-date">No upcoming events</div>
      </div>
      <div class="stat-card" style="border-top:3px solid var(--special)">
        <div class="stat-label">Strats Saved</div>
        <div class="stat-value" id="stat-strats">—</div>
        <div class="stat-sub" id="stat-strats-sub">Loading…</div>
      </div>
      <div class="stat-card" style="border-top:3px solid var(--success)">
        <div class="stat-label">Match Record</div>
        <div class="stat-value" id="stat-vods" style="font-size:18px">—</div>
        <div class="form-dots" id="stat-vods-form" style="margin-top:6px"></div>
      </div>
      <div class="stat-card" id="stat-issues-card" style="border-top:3px solid var(--muted)">
        <div class="stat-label">Open Issues</div>
        <div class="stat-value" id="stat-issues">—</div>
        <div class="stat-sub" id="stat-issues-sub">Loading…</div>
      </div>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:24px;margin-bottom:8px">
      <div class="section-label" style="margin:0">Upcoming This Week</div>
      <a href="schedule.html" style="font-size:12px;color:var(--accent);text-decoration:none">View schedule →</a>
    </div>
    <div id="upcoming-events"><div class="loading">Loading…</div></div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:24px;margin-bottom:8px">
      <div class="section-label" style="margin:0">Recently Added Strats</div>
      <a href="stratbook.html" style="font-size:12px;color:var(--accent);text-decoration:none">View all →</a>
    </div>
    <div id="recent-strats"><div class="loading">Loading…</div></div>
  </main>
</div>
<script type="module" src="dashboard.js"></script>
</body>
</html>
