<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Match Result — CS2 Hub</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main-content">
    <div class="page-header">
      <div>
        <a href="vods.html" style="color:var(--muted);font-size:13px;text-decoration:none">← Match Results</a>
        <div class="page-title" id="page-title" style="margin-top:6px">New Match</div>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-danger" id="delete-btn" style="display:none">Delete</button>
        <button class="btn btn-primary" id="save-btn">Save</button>
      </div>
    </div>

    <div style="max-width:700px">
      <div class="form-row" style="grid-template-columns:2fr 1fr 1fr">
        <div class="form-group">
          <label class="form-label">Opponent</label>
          <input class="form-input" id="f-opponent" placeholder="e.g. NaVi, Team Vitality"/>
        </div>
        <div class="form-group">
          <label class="form-label">Match Type</label>
          <select class="form-select" id="f-match-type">
            <option value="scrim">Scrim</option>
            <option value="tournament">Tournament</option>
            <option value="pug">PUG</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Date</label>
          <input class="form-input" type="date" id="f-date"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Demo Link (optional)</label>
        <input class="form-input" id="f-demo-link" placeholder="https://…"/>
      </div>

      <div class="section-label" style="margin-top:28px">Maps Played</div>
      <div id="maps-list"></div>
      <button class="btn btn-ghost btn-sm" id="add-map-btn" style="margin-top:10px">+ Add Map</button>

      <div class="section-label" style="margin-top:28px">Match Notes</div>
      <div class="form-group">
        <textarea class="form-textarea" id="f-notes" rows="4" placeholder="Key observations, what worked, what to improve…"></textarea>
      </div>

      <div id="save-error" class="error-msg" style="display:none;margin-top:8px"></div>
    </div>
  </main>
</div>
<script type="module" src="vod-detail.js"></script>
</body>
</html>
