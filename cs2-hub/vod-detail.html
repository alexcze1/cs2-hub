<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Match Review — CS2 Hub</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main-content">

    <div class="page-header">
      <div>
        <a href="vods.html" style="color:var(--muted);font-size:13px;text-decoration:none">← Match Results</a>
        <div class="page-title" id="page-title" style="margin-top:6px">New Match</div>
      </div>
      <div style="display:flex;gap:10px;align-items:center">
        <button class="btn btn-danger" id="delete-btn" style="display:none">Delete</button>
        <button class="btn btn-primary" id="save-btn">Save Match</button>
      </div>
    </div>

    <div class="vod-split-layout">
    <div class="vod-split-left">

      <!-- Match Info -->
      <div class="info-panel">
        <div class="form-row" style="grid-template-columns:2fr 1fr 1fr">
          <div class="form-group">
            <label class="form-label">Opponent</label>
            <input class="form-input" id="f-opponent" placeholder="e.g. NaVi, Team Vitality"/>
          </div>
          <div class="form-group">
            <label class="form-label">Match Type</label>
            <select class="form-select" id="f-match-type">
              <option value="scrim">Scrim</option>
              <option value="tournament">Tournament</option>
              <option value="pug">PUG</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Date</label>
            <input class="form-input" type="date" id="f-date"/>
          </div>
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">Demo Link (optional)</label>
          <input class="form-input" id="f-demo-link" placeholder="https://…"/>
        </div>
      </div>

      <!-- Maps -->
      <div class="info-panel" style="margin-top:12px">
        <div class="info-panel-label">Maps Played</div>
        <div id="maps-list"></div>
        <button class="btn btn-ghost btn-sm" id="add-map-btn" style="margin-top:12px">+ Add Map</button>
      </div>

      <!-- Review Notes -->
      <div id="review-section" style="margin-top:24px;display:none">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
          <div class="section-label" style="margin:0">Match Review</div>
          <span id="notes-status" class="notes-status-label"></span>
        </div>

        <!-- Map selector tabs -->
        <div class="review-map-tabs" id="review-map-tabs"></div>

        <!-- Connected review panel -->
        <div class="review-panel">
          <!-- Overview -->
          <div class="review-pane">
            <div class="review-pane-label">
              <svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
                <rect x="2" y="1" width="10" height="12" rx="1.5"/>
                <line x1="4.5" y1="4.5" x2="9.5" y2="4.5"/>
                <line x1="4.5" y1="7" x2="9.5" y2="7"/>
                <line x1="4.5" y1="9.5" x2="7.5" y2="9.5"/>
              </svg>
              Overview
            </div>
            <textarea class="review-textarea" id="n-overview" placeholder="How did the match go overall? Key moments, scoreline context, team energy…"></textarea>
          </div>

          <div class="review-divider"></div>

          <!-- T + CT split -->
          <div class="review-split">
            <div class="review-pane">
              <div class="review-pane-label review-pane-label-t">
                <svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
                  <circle cx="7" cy="7" r="5.5"/>
                  <line x1="7" y1="1.5" x2="7" y2="0"/>
                  <line x1="7" y1="12.5" x2="7" y2="14"/>
                  <line x1="1.5" y1="7" x2="0" y2="7"/>
                  <line x1="12.5" y1="7" x2="14" y2="7"/>
                  <circle cx="7" cy="7" r="1.5" fill="currentColor" stroke="none"/>
                </svg>
                T-Side
              </div>
              <textarea class="review-textarea" id="n-t-side" placeholder="Executes, utility usage, entry frags, mid-round calls…"></textarea>
            </div>
            <div class="review-split-divider"></div>
            <div class="review-pane">
              <div class="review-pane-label review-pane-label-ct">
                <svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M7 1L1.5 3.5V8c0 2.8 2.2 4.5 5.5 5 3.3-.5 5.5-2.2 5.5-5V3.5L7 1z"/>
                </svg>
                CT-Side
              </div>
              <textarea class="review-textarea" id="n-ct-side" placeholder="Setups, rotations, AWP positioning, retakes…"></textarea>
            </div>
          </div>
        </div>
      </div>

      <div id="save-error" class="error-msg" style="display:none;margin-top:12px"></div>
    </div><!-- vod-split-left -->

    <!-- Antistrat Panel -->
    <div class="vod-split-right" id="antistrat-panel">
      <div class="section-label" style="margin-bottom:16px">ANTISTRAT</div>
      <div class="form-group" style="margin-bottom:16px">
        <label class="form-label">Select Opponent</label>
        <select class="form-select" id="antistrat-opponent-select">
          <option value="">— None —</option>
        </select>
      </div>
      <div id="antistrat-panel-content" style="display:none">
        <div class="antistrat-map-tabs-row" id="panel-map-tabs"></div>
        <div id="panel-gameplan-output"></div>
      </div>
      <div id="antistrat-panel-empty" style="color:var(--muted);font-size:13px">
        Select an opponent to view their antistrat.
      </div>
    </div>

    </div><!-- vod-split-layout -->

  </main>
</div>
<script type="module" src="vod-detail.js"></script>
</body>
</html>
