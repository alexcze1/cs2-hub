<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Match Review — CS2 Hub</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main-content">

    <div class="page-header">
      <div>
        <a href="vods.html" style="color:var(--muted);font-size:13px;text-decoration:none">← Match Results</a>
        <div class="page-title" id="page-title" style="margin-top:6px">New Match</div>
      </div>
      <div style="display:flex;gap:10px;align-items:center">
        <span class="autosave-status" id="autosave-status"></span>
        <button class="btn btn-danger" id="delete-btn" style="display:none">Delete</button>
        <button class="btn btn-primary" id="save-btn">Save Match</button>
      </div>
    </div>

    <!-- Match Info -->
    <div class="review-card" style="max-width:780px">
      <div class="review-card-label">Match Info</div>
      <div class="form-row" style="grid-template-columns:2fr 1fr 1fr">
        <div class="form-group">
          <label class="form-label">Opponent</label>
          <input class="form-input" id="f-opponent" placeholder="e.g. NaVi, Team Vitality"/>
        </div>
        <div class="form-group">
          <label class="form-label">Match Type</label>
          <select class="form-select" id="f-match-type">
            <option value="scrim">Scrim</option>
            <option value="tournament">Tournament</option>
            <option value="pug">PUG</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Date</label>
          <input class="form-input" type="date" id="f-date"/>
        </div>
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">Demo Link (optional)</label>
        <input class="form-input" id="f-demo-link" placeholder="https://…"/>
      </div>
    </div>

    <!-- Maps -->
    <div class="review-card" style="max-width:780px;margin-top:16px">
      <div class="review-card-label">Maps Played</div>
      <div id="maps-list"></div>
      <button class="btn btn-ghost btn-sm" id="add-map-btn" style="margin-top:12px">+ Add Map</button>
    </div>

    <!-- Match Review Notes -->
    <div id="review-section" style="max-width:780px;margin-top:16px;display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div class="section-label" style="margin:0">Match Review</div>
        <span class="autosave-label" id="notes-status"></span>
      </div>

      <!-- Overview -->
      <div class="review-card review-card-full">
        <div class="review-section-header">
          <span class="review-section-icon">📋</span>
          <span class="review-section-title">Overview</span>
          <span class="review-section-hint">General match impression and key observations</span>
        </div>
        <textarea class="review-textarea" id="n-overview" placeholder="How did the match go overall? Key moments, scoreline context, team energy…"></textarea>
      </div>

      <!-- T-Side / CT-Side -->
      <div class="review-two-col">
        <div class="review-card">
          <div class="review-section-header">
            <span class="review-section-icon review-icon-t">T</span>
            <span class="review-section-title">T-Side</span>
          </div>
          <textarea class="review-textarea" id="n-t-side" placeholder="Executes, utility usage, entry frags, mid-round calls…"></textarea>
        </div>
        <div class="review-card">
          <div class="review-section-header">
            <span class="review-section-icon review-icon-ct">CT</span>
            <span class="review-section-title">CT-Side</span>
          </div>
          <textarea class="review-textarea" id="n-ct-side" placeholder="Setups, rotations, AWP positioning, retakes…"></textarea>
        </div>
      </div>

      <!-- Economy / Action Items -->
      <div class="review-two-col">
        <div class="review-card">
          <div class="review-section-header">
            <span class="review-section-icon">💰</span>
            <span class="review-section-title">Economy</span>
          </div>
          <textarea class="review-textarea" id="n-economy" placeholder="Pistol rounds, eco decisions, force buys, anti-eco management…"></textarea>
        </div>
        <div class="review-card">
          <div class="review-section-header">
            <span class="review-section-icon">🎯</span>
            <span class="review-section-title">Action Items</span>
          </div>
          <textarea class="review-textarea" id="n-action-items" placeholder="What to practice this week, specific things to fix or drill…"></textarea>
        </div>
      </div>

      <!-- Per-Map Notes -->
      <div id="map-notes-section">
        <div class="review-card review-card-full">
          <div class="review-section-header" style="margin-bottom:12px">
            <span class="review-section-icon">🗺</span>
            <span class="review-section-title">Per-Map Notes</span>
            <span class="review-section-hint">Map-specific observations</span>
          </div>
          <div class="map-notes-tabs" id="map-notes-tabs"></div>
          <div id="map-notes-content"></div>
        </div>
      </div>
    </div>

    <div id="save-error" class="error-msg" style="display:none;max-width:780px;margin-top:12px"></div>

  </main>
</div>
<script type="module" src="vod-detail.js"></script>
</body>
</html>
