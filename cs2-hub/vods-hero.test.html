<!DOCTYPE html>
<html>
<body>
<div id="root"></div>
<script type="module">
import { computeHeroStats, renderHero, pickWeakestArea } from './vods-hero.js'

function assert(cond, msg) {
  if (!cond) { console.error('FAIL:', msg); return }
  console.log('PASS:', msg)
}

// ---- computeHeroStats: full data ----
{
  const vods = [
    { id: 'a', result: 'win',  match_date: '2026-05-10',
      maps: [{ map: 'mirage', score_us: 13, score_them: 8 }] },
    { id: 'b', result: 'loss', match_date: '2026-05-08',
      maps: [{ map: 'anubis', score_us: 7, score_them: 13 }] },
    { id: 'c', result: 'win',  match_date: '2026-05-05',
      maps: [
        { map: 'mirage', score_us: 13, score_them: 11 },
        { map: 'nuke',   score_us: 8,  score_them: 13 },
        { map: 'mirage', score_us: 13, score_them: 9 },
      ] },
    { id: 'd', result: 'draw', match_date: '2026-05-01',
      maps: [{ map: 'inferno', score_us: 12, score_them: 12 }] },
  ]
  const s = computeHeroStats(vods)
  assert(s.record.w === 2 && s.record.l === 1 && s.record.d === 1, 'record counts w/l/d')
  // totalRW = 13+7+13+8+13+12 = 66
  // totalRL = 8+13+11+13+9+12 = 66
  assert(s.totalRW === 66 && s.totalRL === 66, 'rounds sum across all maps')
  assert(s.roundWR === 50, '66/(66+66)=50%')
  assert(s.bestMap?.map === 'mirage', 'best map = mirage (3 plays, 100% WR)')
  assert(s.worstMap === null, 'worstMap null when only one map has 3+ plays (mirage is best AND only qualifier)')
  assert(s.sparkline.length === 4, 'sparkline = one entry per vod (no padding)')
  assert(s.sparkline[0].pct === Math.round(13/21 * 100), 'sparkline[0] pct from match a')
}

// ---- computeHeroStats: worstMap with 2+ qualifying maps ----
{
  // mirage 3 wins (100% wr) + anubis 3 losses (0% wr) → bestMap=mirage, worstMap=anubis
  const vods = [
    { id: 'a', result: 'win',  match_date: '2026-05-10', maps: [{ map: 'mirage', score_us: 13, score_them: 8 }] },
    { id: 'b', result: 'win',  match_date: '2026-05-09', maps: [{ map: 'mirage', score_us: 13, score_them: 9 }] },
    { id: 'c', result: 'win',  match_date: '2026-05-08', maps: [{ map: 'mirage', score_us: 13, score_them: 10 }] },
    { id: 'd', result: 'loss', match_date: '2026-05-07', maps: [{ map: 'anubis', score_us: 7,  score_them: 13 }] },
    { id: 'e', result: 'loss', match_date: '2026-05-06', maps: [{ map: 'anubis', score_us: 9,  score_them: 13 }] },
    { id: 'f', result: 'loss', match_date: '2026-05-05', maps: [{ map: 'anubis', score_us: 8,  score_them: 13 }] },
  ]
  const s = computeHeroStats(vods)
  assert(s.bestMap?.map === 'mirage',  'best = mirage (3 plays, 100% wr)')
  assert(s.worstMap?.map === 'anubis', 'worst = anubis (3 plays, 0% wr)')
}

// ---- computeHeroStats: best/worst require samples >= 3 ----
{
  const vods = [
    { id: 'a', result: 'win',  match_date: '2026-05-10', maps: [{ map: 'mirage', score_us: 13, score_them: 8 }] },
    { id: 'b', result: 'win',  match_date: '2026-05-09', maps: [{ map: 'mirage', score_us: 13, score_them: 10 }] },
  ]
  const s = computeHeroStats(vods)
  assert(s.bestMap === null,  'mirage with 2 plays → bestMap null (need 3+)')
  assert(s.worstMap === null, 'mirage with 2 plays → worstMap null')
}

// ---- computeHeroStats: empty vods ----
{
  const s = computeHeroStats([])
  assert(s.record.w === 0 && s.record.l === 0 && s.record.d === 0, 'empty → zero record')
  assert(s.roundWR === null, 'empty → roundWR null')
  assert(s.bestMap === null && s.worstMap === null, 'empty → no maps')
  assert(s.sparkline.length === 0, 'empty → empty sparkline')
}

// ---- renderHero: full data renders numerals ----
{
  const root = document.getElementById('root')
  root.innerHTML = ''
  const vods = [
    { id: 'a', result: 'win',  match_date: '2026-05-10', maps: [{ map: 'mirage', score_us: 13, score_them: 8 }] },
    { id: 'b', result: 'loss', match_date: '2026-05-08', maps: [{ map: 'anubis', score_us: 7,  score_them: 13 }] },
  ]
  renderHero(root, { vods, filterSlotId: 'rr-filter-slot' })

  const record = root.querySelector('.rr-hero-record').textContent
  assert(record.includes('1W'), 'record renders 1W')
  assert(record.includes('1L'), 'record renders 1L')
  assert(root.querySelector('#rr-filter-slot') !== null, 'filter slot present')
  assert(root.querySelector('.rr-add-match'), 'Add Match button rendered')
}

// ---- renderHero: empty state collapses to CTA only ----
{
  const root = document.getElementById('root')
  root.innerHTML = ''
  renderHero(root, { vods: [], filterSlotId: 'rr-filter-slot' })
  assert(root.querySelector('.rr-hero-empty'), 'empty hero has empty marker')
  assert(root.querySelector('.rr-add-match'), 'Add Match CTA still present in empty state')
  assert(root.querySelector('.rr-hero-record') === null, 'no record numerals in empty state')
}

// ---- pickWeakestArea: returns lowest WR area meeting sample threshold ----
{
  // pistols 4/10 = 40%, ct 50/80 = 62%, t 30/70 = 43%
  const agg = {
    pistols:   { wins: 4,  played: 10 },
    eco:       { wins: 0,  played: 0 },     // skipped: below sample
    anti_ecos: { wins: 5,  played: 6 },     // 83%
    full_buy:  { wins: 10, played: 20 },    // 50%
    ct:        { wins: 50, played: 80 },    // 62%
    t:         { wins: 30, played: 70 },    // 43%
  }
  const w = pickWeakestArea(agg)
  assert(w && w.label === 'Pistol rounds', 'weakest = Pistol rounds (40%)')
  assert(w.wr === 40, 'pistols WR = 40%')
}

// ---- pickWeakestArea: filters out under-sampled areas ----
{
  // Pistol with only 4 played → ineligible. T with 24 rounds → eligible.
  const agg = {
    pistols:   { wins: 0,  played: 4 },     // skipped
    eco:       { wins: 0,  played: 0 },
    anti_ecos: { wins: 0,  played: 0 },
    full_buy:  { wins: 0,  played: 0 },
    ct:        { wins: 14, played: 24 },    // 58%
    t:         { wins: 10, played: 24 },    // 42%
  }
  const w = pickWeakestArea(agg)
  assert(w && w.label === 'T side', 'T side wins (Pistol under-sampled)')
}

// ---- pickWeakestArea: returns null when nothing eligible ----
{
  const agg = {
    pistols:   { wins: 0, played: 0 },
    eco:       { wins: 0, played: 0 },
    anti_ecos: { wins: 0, played: 0 },
    full_buy:  { wins: 0, played: 0 },
    ct:        { wins: 0, played: 0 },
    t:         { wins: 0, played: 0 },
  }
  assert(pickWeakestArea(agg) === null, 'no samples → null')
  assert(pickWeakestArea(null) === null, 'null agg → null')
}

// ---- renderHero with teamStatsRows shows Weak callout ----
{
  const root = document.getElementById('root')
  root.innerHTML = ''
  const vods = [
    { id: 'a', result: 'win', match_date: '2026-05-10', maps: [{ map: 'mirage', score_us: 13, score_them: 8 }] },
  ]
  const teamStatsRows = [{
    pistol_wins: 1, pistol_played: 10,       // 10% pistol → weakest
    eco_wins: 0, eco_played: 0,
    anti_eco_wins: 5, anti_eco_played: 6,
    force_wins: 0, force_played: 0,
    full_buy_wins: 10, full_buy_played: 20,
    first_kills: 10, first_deaths: 8,
    five_v_four_wins: 0, five_v_four_played: 0,
    ct_round_wins: 50, ct_rounds_played: 80,
    t_round_wins: 40, t_rounds_played: 70,
  }]
  renderHero(root, { vods, filterSlotId: 'rr-filter-slot', teamStatsRows })
  const subgrid = root.querySelector('.rr-hero-subgrid').textContent
  assert(subgrid.includes('Pistol rounds'), 'Weak callout names Pistol rounds')
  assert(subgrid.includes('10%'),           'Weak callout shows 10% WR')
}

console.log('all done')
</script>
</body>
</html>
