<!DOCTYPE html>
<html>
<body>
<script type="module">
import { computePraccVodsToInsert, computePraccVodsToBackfill } from './pracc-sync.js'

function assert(condition, msg) {
  if (!condition) { console.error('FAIL:', msg); return; }
  console.log('PASS:', msg);
}

const TEAM = 'team-abc'

// Test 1: empty pracc events → empty payloads
{
  const out = computePraccVodsToInsert([], new Set(), TEAM)
  assert(Array.isArray(out) && out.length === 0, 'no pracc events yields empty array')
}

// Test 2: single pracc event with no existing vod → one payload
{
  const events = [{
    id: 'pracc-uid-1',
    title: 'Scrim vs NaVi',
    opponent: 'NaVi',
    date: '2026-05-10T18:00:00Z',
  }]
  const out = computePraccVodsToInsert(events, new Set(), TEAM)
  assert(out.length === 1, 'single new event yields one payload')
  assert(out[0].team_id === TEAM, 'team_id set')
  assert(out[0].external_uid === 'pracc-uid-1', 'external_uid copied from event id')
  assert(out[0].opponent === 'NaVi', 'opponent copied')
  assert(out[0].match_type === 'scrim', 'match_type is scrim')
  assert(out[0].match_date === '2026-05-10', 'match_date is YYYY-MM-DD')
  assert(Array.isArray(out[0].maps) && out[0].maps.length === 0, 'maps empty when event has no map')
}

// Test 2b: event with map → maps prefilled with one entry
{
  const events = [{
    id: 'pracc-uid-1m',
    title: 'NaVi',
    opponent: 'NaVi',
    map: 'mirage',
    date: '2026-05-10T18:00:00Z',
  }]
  const out = computePraccVodsToInsert(events, new Set(), TEAM)
  assert(out[0].maps.length === 1, 'maps has one entry when event has map')
  assert(out[0].maps[0].map === 'mirage', 'map name copied through')
  assert(out[0].maps[0].score_us === undefined, 'no score yet — fillable later')
}

// Test 3: existing UID is skipped
{
  const events = [
    { id: 'pracc-uid-1', title: 'A', opponent: 'A', date: '2026-05-10T18:00:00Z' },
    { id: 'pracc-uid-2', title: 'B', opponent: 'B', date: '2026-05-11T18:00:00Z' },
  ]
  const existing = new Set(['pracc-uid-1'])
  const out = computePraccVodsToInsert(events, existing, TEAM)
  assert(out.length === 1, 'only the new event yields a payload')
  assert(out[0].external_uid === 'pracc-uid-2', 'correct event passed through')
}

// Test 4: opponent falls back to title when null
{
  const events = [{
    id: 'pracc-uid-3',
    title: 'Practice block',
    opponent: null,
    date: '2026-05-12T18:00:00Z',
  }]
  const out = computePraccVodsToInsert(events, new Set(), TEAM)
  assert(out[0].opponent === 'Practice block', 'opponent falls back to title')
}

// Test 5: all UIDs already exist → empty
{
  const events = [{ id: 'pracc-uid-1', title: 'A', opponent: 'A', date: '2026-05-10T18:00:00Z' }]
  const out = computePraccVodsToInsert(events, new Set(['pracc-uid-1']), TEAM)
  assert(out.length === 0, 'all-existing yields empty array')
}

// Test 6: backfill — empty maps + event has map → update produced
{
  const events = [{ id: 'pracc-uid-1', map: 'mirage', date: '2026-05-10T18:00:00Z' }]
  const existing = [{ id: 'vod-1', external_uid: 'pracc-uid-1', maps: [] }]
  const out = computePraccVodsToBackfill(events, existing)
  assert(out.length === 1, 'backfill: empty maps gets update')
  assert(out[0].id === 'vod-1', 'backfill: vod id passed through')
  assert(out[0].maps[0].map === 'mirage', 'backfill: map filled in')
}

// Test 7: backfill — non-empty maps left alone (don't overwrite manual edits)
{
  const events = [{ id: 'pracc-uid-1', map: 'mirage', date: '2026-05-10T18:00:00Z' }]
  const existing = [{ id: 'vod-1', external_uid: 'pracc-uid-1', maps: [{ map: 'inferno', score_us: 13 }] }]
  const out = computePraccVodsToBackfill(events, existing)
  assert(out.length === 0, 'backfill: non-empty maps untouched')
}

// Test 8: backfill — event with no map yields no update
{
  const events = [{ id: 'pracc-uid-1', date: '2026-05-10T18:00:00Z' }]
  const existing = [{ id: 'vod-1', external_uid: 'pracc-uid-1', maps: [] }]
  const out = computePraccVodsToBackfill(events, existing)
  assert(out.length === 0, 'backfill: no map on event yields no update')
}

// Test 9: backfill — no matching vod yields no update
{
  const events = [{ id: 'pracc-uid-1', map: 'mirage', date: '2026-05-10T18:00:00Z' }]
  const existing = []
  const out = computePraccVodsToBackfill(events, existing)
  assert(out.length === 0, 'backfill: no existing vod yields no update')
}

// Test 10: backfill — null maps treated as empty
{
  const events = [{ id: 'pracc-uid-1', map: 'mirage', date: '2026-05-10T18:00:00Z' }]
  const existing = [{ id: 'vod-1', external_uid: 'pracc-uid-1', maps: null }]
  const out = computePraccVodsToBackfill(events, existing)
  assert(out.length === 1, 'backfill: null maps treated as empty')
}

console.log('All pracc-sync tests done')
</script>
</body>
</html>
