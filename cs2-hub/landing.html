<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>MIDROUND — The CS2 Team Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #05080f;
      --surface:    #0a0e1a;
      --border:     #151d33;
      --accent:     #3b82f6;
      --text:       #ffffff;
      --muted:      #6b7280;
      --muted-lt:   #9ca3af;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* Grain overlay */
    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    /* ── Nav ── */
    .site-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 48px;
      transition: background 0.3s, border-color 0.3s;
      border-bottom: 1px solid transparent;
    }
    .site-nav.scrolled {
      background: rgba(5,8,15,0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-color: rgba(255,255,255,0.06);
    }
    .nav-logo {
      width: 130px;
      filter: invert(1);
      opacity: 0.9;
      display: block;
    }
    .nav-cta {
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      padding: 9px 22px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3px;
      transition: opacity 0.15s;
    }
    .nav-cta:hover { opacity: 0.82; }

    /* ── Hero ── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;
      padding: 120px 24px 80px;
    }
    .hero-glow {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 55% at 50% 45%, rgba(59,130,246,0.13), transparent 70%);
      pointer-events: none;
    }
    .hero-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
      background-size: 44px 44px;
      pointer-events: none;
    }
    .hero-content { position: relative; z-index: 1; }
    .hero-logo {
      width: 200px;
      filter: invert(1);
      opacity: 0.9;
      display: block;
      margin: 0 auto 32px;
    }
    .hero-headline {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(40px, 6vw, 72px);
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      line-height: 1.05;
      margin-bottom: 22px;
    }
    .hero-sub {
      color: var(--muted-lt);
      font-size: 12px;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      margin-bottom: 40px;
    }
    .hero-cta {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      padding: 15px 36px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      transition: opacity 0.15s, transform 0.15s;
    }
    .hero-cta:hover { opacity: 0.86; transform: translateY(-2px); }
    .hero-chevron {
      position: absolute;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      color: var(--muted);
      animation: chevron-bounce 2.2s ease-in-out infinite;
    }
    @keyframes chevron-bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); opacity: 0.5; }
      50%       { transform: translateX(-50%) translateY(9px); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="grain"></div>

  <nav class="site-nav" id="site-nav">
    <img src="images/logo-lettering.png" alt="MIDROUND" class="nav-logo"/>
    <a href="#waitlist" class="nav-cta">Request Access</a>
  </nav>

  <section class="hero">
    <div class="hero-glow"></div>
    <div class="hero-grid"></div>
    <div class="hero-content">
      <img src="images/logo-lettering.png" alt="MIDROUND" class="hero-logo"/>
      <h1 class="hero-headline">THE PLATFORM SERIOUS<br>CS2 TEAMS USE.</h1>
      <p class="hero-sub">Stratbook &nbsp;·&nbsp; Antistrat &nbsp;·&nbsp; VOD Review &nbsp;·&nbsp; Schedule</p>
      <a href="#waitlist" class="hero-cta">Request Access →</a>
    </div>
    <div class="hero-chevron">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </div>
  </section>

  <script>
  const nav = document.getElementById('site-nav');
  window.addEventListener('scroll', () => {
    nav.classList.toggle('scrolled', window.scrollY > 60);
  }, { passive: true });
  </script>
</body>
</html>
