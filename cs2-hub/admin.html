<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="apple-touch-icon" href="images/favicon.png">
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Admin — MIDROUND</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .admin-team-card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: var(--r-md);
      margin-bottom: 10px;
      overflow: hidden;
      transition: border-color var(--dur-2) var(--ease), box-shadow var(--dur-2) var(--ease);
    }
    .admin-team-card:hover {
      border-color: rgba(0,255,156,0.20);
      box-shadow: 0 6px 18px rgba(0,0,0,0.30);
    }
    .admin-team-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      cursor: pointer;
    }
    .admin-team-header:hover { background: var(--hover-bg-accent); }
    .admin-team-name {
      font-family: var(--display-font);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.005em;
      flex: 1;
    }
    .admin-team-meta {
      font-family: var(--display-font);
      font-size: 11px;
      letter-spacing: 0.06em;
      color: var(--muted);
    }
    .admin-team-code {
      font-family: monospace;
      font-size: 11px;
      font-weight: 700;
      background: var(--input-bg);
      border: 1px solid var(--border-solid);
      border-radius: var(--r-sm);
      padding: 3px 9px;
      color: var(--accent);
      letter-spacing: 2px;
    }
    .admin-members {
      border-top: 1px solid var(--glass-border);
      padding: 10px 18px 14px;
      display: none;
      background: rgba(0,0,0,0.15);
    }
    .admin-members.open { display: block; }
    .admin-member-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--hairline);
    }
    .admin-member-row:last-child { border-bottom: none; }
    .admin-member-name { font-size: 13px; font-weight: 600; flex: 1; }
    .admin-member-meta {
      font-family: var(--display-font);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .admin-danger { color: var(--danger); border-color: var(--danger); }
    .admin-danger:hover { background: rgba(255,77,77,0.10); color: var(--danger); }
  </style>
</head>
<body>
<div class="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main-content">
    <div class="page-header">
      <div>
        <div class="page-title">ADMIN</div>
        <div class="page-subtitle">Manage all teams and members</div>
      </div>
      <button class="btn btn-primary" id="create-team-btn">+ New Team</button>
    </div>

    <div class="modal-backdrop" id="modal" style="display:none">
      <div class="modal" style="max-width:400px;width:100%">
        <div class="modal-header">
          <div class="modal-title">Create Team</div>
          <button class="modal-close" id="modal-close">×</button>
        </div>
        <div class="form-group">
          <label class="form-label">Team Name</label>
          <input class="form-input" id="f-team-name" placeholder="e.g. Team Liquid"/>
        </div>
        <div class="error-msg" id="modal-error" style="display:none"></div>
        <div class="modal-actions">
          <button class="btn btn-ghost" id="cancel-btn">Cancel</button>
          <button class="btn btn-primary" id="save-btn">Create</button>
        </div>
      </div>
    </div>

    <div id="teams-list"><div class="loading">Loading teams</div></div>
  </main>
</div>
<script type="module" src="admin.js"></script>
</body>
</html>
